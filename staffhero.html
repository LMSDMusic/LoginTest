<script>
// ─── SESSION & SCORE SUBMISSION ───────────────────────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx_REo7dnRZo3fny_xv3uyhCUlImo4-4RM3x8W9Nu0JQHvBNv3HYRlzquLzm-PVCxzg/exec';

// Redirect to login if no session
const _sessionNumber = sessionStorage.getItem('studentNumber');
if (!_sessionNumber) { window.location.href = 'index.html'; throw new Error('No session'); }

const _urlParams    = new URLSearchParams(window.location.search);
const _urlLevel     = parseInt(_urlParams.get('level')) || 1;
const _urlMenu      = _urlParams.get('menu') === 'true';
const _maxLevel     = parseInt(_urlParams.get('maxLevel')) || null;
const _bestLevel    = parseInt(_urlParams.get('bestLevel')) || 0;
const _sessionInstr = sessionStorage.getItem('studentInstrument') || 'Violin';

// Tracks the status of the auto-submit call displayed on score cards
let scoreSubmitStatus = 'idle'; // 'idle' | 'saving' | 'saved' | 'error'

async function autoSubmitScore() {
  const studentNumber = sessionStorage.getItem('studentNumber');
  if (!studentNumber) return;
  scoreSubmitStatus = 'saving';
  const total   = notesAttempted;
  const percent = total > 0 ? Math.round((notesCorrect / total) * 100) : 0;
  const missed  = [...new Set(missedNotes)].join(',');
  const levelVal = ucActive ? 99 : currentLevel;
  try {
    const res = await fetch(SCRIPT_URL, {
      method:   'POST',
      headers:  { 'Content-Type': 'text/plain' },
      body:     JSON.stringify({
        action:          'logAttempt',
        studentNumber,
        moduleId:        'staff_hero',
        level:           levelVal,
        score,
        percent,
        durationSeconds: Math.round(finalTime),
        missedItems:     missed
      }),
      redirect: 'follow'
    });
    const data = await res.json();
    scoreSubmitStatus = data.success ? 'saved' : 'error';
  } catch(e) {
    scoreSubmitStatus = 'error';
  }
}

function exitToMenu() {
  window.location.href = 'dashboard.html';
}

function hideSubmitPanel() {} // no-op — kept for any remaining call sites


// ─── SETTINGS & INPUT MODE ────────────────────────────────────────────────────
let inputMode = 'noteNames'; // 'noteNames' | 'mic'
let malletOctave = 'high';   // 'high' | 'low' — only used for Mallet Percussion

const MIC_SETTINGS = {
  yinThreshold:    { label: 'YIN threshold',      value: 0.15,  min: 0.05, max: 0.50, step: 0.01 },
  minFreq:         { label: 'Min frequency (Hz)',  value: 60,    min: 30,   max: 300,  step: 1    },
  maxFreq:         { label: 'Max frequency (Hz)',  value: 1200,  min: 300,  max: 4000, step: 10   },
  rmsThreshold:    { label: 'RMS threshold',       value: 0.001, min: 0.001,max: 0.2,  step: 0.001},
  gateRelease:     { label: 'Gate release (ms)',   value: 10,    min: 10,   max: 1000, step: 10   },
  medianWindow:    { label: 'Median window',       value: 1,     min: 1,    max: 15,   step: 1    },
  noteHold:        { label: 'Note hold (ms)',      value: 20,    min: 20,   max: 500,  step: 10   },
  legatoThreshold: { label: 'Legato threshold (st)',value: 0.7,  min: 0.1,  max: 2.0,  step: 0.05 },
  a4ref:           { label: 'A4 reference (Hz)',   value: 440,   min: 415,  max: 466,  step: 0.5  },
  transpose:       { label: 'Transpose (st)',      value: 0,     min: -12,  max: 12,   step: 1    },
};

function buildSettingsFields() {
  const container = document.getElementById('settingsFields');
  container.innerHTML = '';
  Object.entries(MIC_SETTINGS).forEach(([key, s]) => {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;margin-bottom:8px;gap:10px;';
    row.innerHTML = `
      <label style="flex:1;font-size:7px;color:#fff;">${s.label}</label>
      <input type="range" min="${s.min}" max="${s.max}" step="${s.step}" value="${s.value}"
        style="flex:1;" oninput="MIC_SETTINGS['${key}'].value=parseFloat(this.value);document.getElementById('sv_${key}').textContent=this.value;">
      <span id="sv_${key}" style="font-size:7px;min-width:40px;text-align:right;color:#aaffaa;">${s.value}</span>
    `;
    container.appendChild(row);
  });
}

function updateModeButtons() {
  document.getElementById('modeNoteNames').style.cssText +=
    inputMode === 'noteNames' ? ';background:#ffe066;color:#000;border:none;' : ';background:#1a1a3a;color:#fff;border:1px solid #ffe066;';
  document.getElementById('modeMic').style.cssText +=
    inputMode === 'mic' ? ';background:#ffe066;color:#000;border:none;' : ';background:#1a1a3a;color:#fff;border:1px solid #ffe066;';
  document.getElementById('micParams').style.display = inputMode === 'mic' ? 'block' : 'none';
}

function setInputMode(mode) {
  inputMode = mode;
  updateModeButtons();
  if (mode === 'mic') startMicPipeline();
  else stopMicPipeline();
}

function openSettings() {
  buildSettingsFields();
  updateModeButtons();
  document.getElementById('settingsOverlay').style.display = 'flex';
}
document.getElementById('settingsClose').addEventListener('click', () => {
  document.getElementById('settingsOverlay').style.display = 'none';
});

// ─── MIC METER ───────────────────────────────────────────────────────────────
let meterWaveform = new Float32Array(372); // one sample per pixel
let meterWavePos = 0;
let meterRmsVal = 0;
let meterAnimFrame = null;

function updateMeterLoop() {
  if (!micActive) return;
  const canvas = document.getElementById('meterCanvas');
  if (!canvas) { meterAnimFrame = requestAnimationFrame(updateMeterLoop); return; }
  const mctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  mctx.fillStyle = '#000';
  mctx.fillRect(0, 0, W, H);

  // RMS bar background
  mctx.fillStyle = '#111';
  mctx.fillRect(0, H - 10, W, 10);

  // RMS bar
  const rmsNorm = Math.min(1, meterRmsVal / 0.5);
  const rmsColor = rmsNorm < MIC_SETTINGS.rmsThreshold.value / 0.5 ? '#555' : '#44ff88';
  mctx.fillStyle = rmsColor;
  mctx.fillRect(0, H - 10, Math.floor(rmsNorm * W), 10);

  // Waveform
  mctx.strokeStyle = '#44ff88';
  mctx.lineWidth = 1;
  mctx.beginPath();
  const wH = H - 12;
  for (let i = 0; i < W; i++) {
    const idx = (meterWavePos + i) % W;
    const y = (1 - (meterWaveform[idx] + 1) / 2) * wH;
    if (i === 0) mctx.moveTo(i, y); else mctx.lineTo(i, y);
  }
  mctx.stroke();

  // Threshold line
  const threshY = (1 - MIC_SETTINGS.rmsThreshold.value / 0.5) * wH;
  mctx.strokeStyle = '#ff4444';
  mctx.setLineDash([4, 4]);
  mctx.beginPath();
  mctx.moveTo(0, H - 10 - (MIC_SETTINGS.rmsThreshold.value / 0.5) * 10);
  mctx.lineTo(W, H - 10 - (MIC_SETTINGS.rmsThreshold.value / 0.5) * 10);
  mctx.stroke();
  mctx.setLineDash([]);

  // Update text readouts
  const freqEl = document.getElementById('meterFreq');
  const noteEl = document.getElementById('meterNote');
  const rmsEl  = document.getElementById('meterRms');
  if (freqEl) freqEl.textContent = detectedPitch ? detectedPitch.toFixed(1) + ' Hz' : '-- Hz';
  if (noteEl) noteEl.textContent = rawDetectedNote || '--';
  if (rmsEl)  rmsEl.textContent  = 'RMS: ' + meterRmsVal.toFixed(3);

  meterAnimFrame = requestAnimationFrame(updateMeterLoop);
}

// ─── YIN PITCH DETECTION ──────────────────────────────────────────────────────
let micStream = null;
let micSource = null;
let micProcessor = null;
let micActive = false;

// ─── MIDI ────────────────────────────────────────────────────────────────────
let midiAccess = null;       // Web MIDI API access object
let midiEnabled = false;     // true once MIDI access granted
let midiStatus = 'idle';     // 'idle' | 'requesting' | 'granted' | 'denied' | 'unavailable'

function midiNoteToName(note) {
  // Convert MIDI note number to pitch name e.g. 60 → 'C4'
  const names = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const octave = Math.floor(note / 12) - 1;
  const name = names[note % 12];
  return name + octave;
}

function onMidiMessage(msg) {
  const [status, note, velocity] = msg.data;
  const type = status & 0xf0;
  // Note On (0x90) with velocity > 0
  if (type === 0x90 && velocity > 0) {
    const pitch = midiNoteToName(note);
    if (gameState === 'playing' && !gameOver && !levelComplete && !countIn &&
        selectedInstrument === 'Piano') {
      handlePitchInput(pitch);
      // Also light up the key visually
      hoveredBtn = 'PIANO_' + pitch;
      setTimeout(() => { if (hoveredBtn === 'PIANO_' + pitch) hoveredBtn = null; }, 150);
    }
  }
}

function connectMidiInputs() {
  if (!midiAccess) return;
  midiAccess.inputs.forEach(input => {
    input.onmidimessage = onMidiMessage;
  });
  midiAccess.onstatechange = (e) => {
    if (e.port.type === 'input') {
      if (e.port.state === 'connected') e.port.onmidimessage = onMidiMessage;
    }
  };
}

async function requestMidiAccess() {
  if (!navigator.requestMIDIAccess) {
    midiStatus = 'unavailable';
    return;
  }
  midiStatus = 'requesting';
  try {
    midiAccess = await navigator.requestMIDIAccess();
    midiEnabled = true;
    midiStatus = 'granted';
    connectMidiInputs();
  } catch (e) {
    midiStatus = 'denied';
  }
}
let detectedPitch = null;   // Hz or null
let detectedNote = null;    // closest game pitch or null
let rawDetectedNote = null; // chromatic note name always shown in meter
let lastDetectedNote = null;
let noteHoldTimer = null;
let gateTimer = null;
let pitchHistory = [];      // median filter buffer

function yinDetect(buf, sampleRate) {
  const threshold = MIC_SETTINGS.yinThreshold.value;
  const N = buf.length;
  const half = Math.floor(N / 2);
  const diff = new Float32Array(half);

  // Difference function
  for (let tau = 1; tau < half; tau++) {
    let s = 0;
    for (let i = 0; i < half; i++) {
      const d = buf[i] - buf[i + tau];
      s += d * d;
    }
    diff[tau] = s;
  }

  // Cumulative mean normalised difference
  const cmnd = new Float32Array(half);
  cmnd[0] = 1;
  let runSum = 0;
  for (let tau = 1; tau < half; tau++) {
    runSum += diff[tau];
    cmnd[tau] = runSum === 0 ? 0 : diff[tau] * tau / runSum;
  }

  // Absolute threshold — find first dip below threshold
  let tau = -1;
  for (let t = 2; t < half; t++) {
    if (cmnd[t] < threshold) {
      while (t + 1 < half && cmnd[t + 1] < cmnd[t]) t++;
      tau = t;
      break;
    }
  }
  if (tau === -1) return -1;

  // Parabolic interpolation
  const x0 = tau > 1 ? tau - 1 : tau;
  const x2 = tau + 1 < half ? tau + 1 : tau;
  if (x0 === tau) return sampleRate / (tau <= cmnd[x2] ? tau : x2);
  if (x2 === tau) return sampleRate / tau;
  const s0 = cmnd[x0], s1 = cmnd[tau], s2 = cmnd[x2];
  const refined = tau + (s2 - s0) / (2 * (2 * s1 - s2 - s0));
  return sampleRate / refined;
}

function rms(buf) {
  let sum = 0;
  for (let i = 0; i < buf.length; i++) sum += buf[i] * buf[i];
  return Math.sqrt(sum / buf.length);
}

function freqToPitch(freq) {
  const a4 = MIC_SETTINGS.a4ref.value;
  const transpose = MIC_SETTINGS.transpose.value;
  const semitones = 12 * Math.log2(freq / a4) + 69 + transpose;
  return semitones;
}

function midiToName(midi) {
  const names = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const octave = Math.floor(midi / 12) - 1;
  return names[midi % 12] + octave;
}

// Map a raw detected midi note name to a game pitch string
function midiNameToGamePitch(midiName) {
  // Normalise enharmonics and map to game pitch names
  const enharmonic = {
    'C#2':'C#2','Db2':'C#2','D#2':'D#2','Eb2':'Eb2',
    'F#2':'F#2','Gb2':'F#2','G#2':'Ab2','Ab2':'Ab2',
    'A#2':'Bb2','Bb2':'Bb2',
    'C#3':'C#3','Db3':'C#3','D#3':'Eb3','Eb3':'Eb3',
    'F#3':'F#3','Gb3':'F#3','G#3':'Ab3','Ab3':'Ab3',
    'A#3':'Bb3','Bb3':'Bb3',
    'C#4':'C#4','Db4':'C#4','D#4':'Eb4','Eb4':'Eb4',
    'F#4':'F#4','Gb4':'F#4','G#4':'Ab4','Ab4':'Ab4',
    'A#4':'Bb4','Bb4':'Bb4',
    'C#5':'C#5','Db5':'C#5','D#5':'Eb5','Eb5':'Eb5',
    'F#5':'F#5','Gb5':'F#5','G#5':'Ab5','Ab5':'Ab5',
    'A#5':'Bb5','Bb5':'Bb5',
  };
  return enharmonic[midiName] || midiName;
}

function medianOf(arr) {
  const s = [...arr].sort((a,b) => a-b);
  const m = Math.floor(s.length / 2);
  return s.length % 2 ? s[m] : (s[m-1] + s[m]) / 2;
}

function onPitchDetected(gamePitch) {
  if (!micActive || gameState !== 'playing' || gameOver || levelComplete || countIn) return;
  if (hero.state !== 'idle' && hero.state !== 'bounce') return;
  if (currentNoteIdx >= notes.length) return;

  const currentNote = notes[currentNoteIdx];
  if (gamePitch === currentNote.pitch) {
    resolveInput(true, currentNote);
  }
}

// Find the game pitch closest in semitones to a given frequency (diatonic match)
function closestGamePitch(freq) {
  const levelDef = getActiveLevelDef();
  if (!levelDef) return null;

  // Build a unique set of pitches to compare against:
  // Use the actual notes array (upcoming notes) so UC works correctly across key changes.
  // For transposing instruments, compare against concert pitch.
  const concertPitches = levelDef.concertPitches;

  // Collect unique sounding pitches from upcoming notes (current + a few ahead)
  let candidates;
  if (gameState === 'playing' && notes && notes.length > 0) {
    const upcoming = notes.slice(currentNoteIdx, currentNoteIdx + 8);
    const pitchSet = new Map(); // pitch → lookup freq
    for (const n of upcoming) {
      if (pitchSet.has(n.pitch)) continue;
      let lookupPitch = n.pitch;
      if (concertPitches) {
        const idx = levelDef.pitches.indexOf(n.pitch);
        if (idx >= 0) lookupPitch = concertPitches[idx];
      }
      pitchSet.set(n.pitch, lookupPitch);
    }
    candidates = Array.from(pitchSet.entries()); // [[writtenPitch, lookupPitch], ...]
  } else {
    // Fallback: use level def pitches
    const written = levelDef.pitches;
    candidates = written.map((p, i) => [p, concertPitches ? concertPitches[i] : p]);
  }

  let best = null, bestDist = Infinity;
  for (const [writtenPitch, lookupPitch] of candidates) {
    const cFreq = NOTE_FREQ[lookupPitch];
    if (!cFreq) continue;
    const dist = Math.abs(12 * Math.log2(freq / cFreq));
    if (dist < bestDist) { bestDist = dist; best = writtenPitch; }
  }
  return bestDist <= 0.5 ? best : null;
}



function processMicAudio(e) {
  const buf = e.inputBuffer.getChannelData(0);
  const sRate = e.inputBuffer.sampleRate; // from micAudioCtx
  const s = MIC_SETTINGS;

  // Gate: silence check
  // Feed meter waveform (downsample buf to 372 pixels)
  const step = Math.max(1, Math.floor(buf.length / 372));
  for (let i = 0; i < 372; i++) {
    meterWaveform[meterWavePos] = buf[Math.min(i * step, buf.length - 1)];
    meterWavePos = (meterWavePos + 1) % 372;
  }
  meterRmsVal = rms(buf);

  const level = rms(buf);
  if (level < s.rmsThreshold.value) {
    clearTimeout(gateTimer);
    gateTimer = setTimeout(() => {
      detectedPitch = null;
      detectedNote = null;
      rawDetectedNote = null;
      pitchHistory = [];
    }, s.gateRelease.value);
    return;
  }
  clearTimeout(gateTimer);

  const freq = yinDetect(buf, sRate);
  if (freq < s.minFreq.value || freq > s.maxFreq.value || freq < 0) {
    detectedPitch = null;
    return;
  }

  detectedPitch = freq;
  pitchHistory.push(freq);
  if (pitchHistory.length > s.medianWindow.value) pitchHistory.shift();

  const smoothed = medianOf(pitchHistory);
  // Find the closest game pitch by semitone distance
  const gamePitch = closestGamePitch(smoothed);
  detectedNote = gamePitch; // closest level pitch (for game logic)

  // Raw chromatic note for meter display — always show what's being played
  const rawMidi = Math.round(freqToPitch(smoothed));
  rawDetectedNote = midiToName(rawMidi);

  if (!gamePitch) return;

  const detectedMidi = freqToPitch(smoothed);
  const prevMidi = lastDetectedNote && NOTE_FREQ[lastDetectedNote]
    ? freqToPitch(NOTE_FREQ[lastDetectedNote])
    : -999;
  const semDelta = Math.abs(detectedMidi - prevMidi);

  if (semDelta >= s.legatoThreshold.value) {
    lastDetectedNote = gamePitch;
    clearTimeout(noteHoldTimer);
    noteHoldTimer = setTimeout(() => {
      onPitchDetected(gamePitch);
    }, s.noteHold.value);
  }
}

let micAudioCtx = null;

async function startMicPipeline() {
  if (micActive) return;
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }, video: false });
    micAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    micSource = micAudioCtx.createMediaStreamSource(micStream);
    micProcessor = micAudioCtx.createScriptProcessor(2048, 1, 1);
    micProcessor.onaudioprocess = processMicAudio;
    micSource.connect(micProcessor);
    // Connect to a silent gain node (not destination) to keep processor alive without feedback
    const silentGain = micAudioCtx.createGain();
    silentGain.gain.value = 0;
    micProcessor.connect(silentGain);
    silentGain.connect(micAudioCtx.destination);
    micActive = true;
    updateMeterLoop();
  } catch(err) {
    alert('Microphone access denied or not available.');
    inputMode = 'noteNames';
    updateModeButtons();
  }
}

function stopMicPipeline() {
  micActive = false;
  clearTimeout(gateTimer);
  clearTimeout(noteHoldTimer);
  pitchHistory = [];
  detectedPitch = null;
  detectedNote = null;
  lastDetectedNote = null;
  if (micProcessor) { micProcessor.disconnect(); micProcessor = null; }
  if (micSource) { micSource.disconnect(); micSource = null; }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  if (micAudioCtx) { micAudioCtx.close(); micAudioCtx = null; }
}

// ─── CANVAS SETUP ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 920, H = 520;
canvas.width = W;
canvas.height = H;

// ─── STAFF LAYOUT ─────────────────────────────────────────────────────────────
// Staff: 5 lines, each LINE_SPACING px apart.
// staffLines[0] = top line, staffLines[4] = bottom line.
//
// TREBLE CLEF lines bottom→top: E4, G4, B4, D5, F5
// ALTO CLEF   lines bottom→top: F3, A3, C4, E4, G4
//   Middle C (C4) sits on the MIDDLE line (staffLines[2])

const LINE_SPACING = 21;
const STAFF_TOP = 90;
const staffLines = [
  STAFF_TOP,
  STAFF_TOP + LINE_SPACING,
  STAFF_TOP + LINE_SPACING * 2,
  STAFF_TOP + LINE_SPACING * 3,
  STAFF_TOP + LINE_SPACING * 4,
];
const STAFF_BOTTOM = staffLines[4];

// ── Treble clef note Y positions ──────────────────────────────────────────────
// Lines (bottom→top): E4 G4 B4 D5 F5
// Spaces (bottom→top): F4 A4 C5 E5
const NOTE_Y_TREBLE = {
  // Clarinet low register — below G3 (deep ledger lines)
  'C3':  STAFF_BOTTOM + LINE_SPACING * 4.5, // space below 4th ledger
  'D3':  STAFF_BOTTOM + LINE_SPACING * 4.0, // 4th ledger line below staff
  'E3':  STAFF_BOTTOM + LINE_SPACING * 3.5, // space below 3rd ledger

// Returns the correct Y map for the active instrument
function getNoteYMap() {
  if (selectedInstrument === 'Viola') return NOTE_Y_ALTO;
  if (selectedInstrument === 'Cello' || selectedInstrument === 'Bass' || selectedInstrument === 'Baritone' || selectedInstrument === 'Trombone') return NOTE_Y_BASS;
  return NOTE_Y_TREBLE; // Violin, Flute, Clarinet, Trumpet use treble clef
}

// Convenience — Y for a single pitch given current instrument
function getNoteY(pitch) { return getNoteYMap()[pitch]; }

let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playNoteSound(pitch, big = false) {
  const levelDef = getActiveLevelDef();
  let soundPitch = pitch;
  // Transposing instruments — use concert pitch for playback
  if (levelDef && levelDef.concertPitches) {
    const idx = levelDef.pitches.indexOf(pitch);
    if (idx >= 0) soundPitch = levelDef.concertPitches[idx];
  }
  // Non-transposing: pitch is already the sounding pitch (e.g. 'F#4', 'G#3') — use directly
  const freq = NOTE_FREQ[soundPitch];
  if (!freq) return;
  const ac = getAudioCtx();

  // Primary sawtooth — the note's actual pitch
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(freq, ac.currentTime);
  gain.gain.setValueAtTime(0, ac.currentTime);
  gain.gain.linearRampToValueAtTime(big ? 0.32 : 0.28, ac.currentTime + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + (big ? 0.38 : 0.22));
  osc.connect(gain);
  gain.connect(ac.destination);
  osc.start(ac.currentTime);
  osc.stop(ac.currentTime + 0.4);

  // On a big hit: add the same pitch one octave down
  if (big) {
    const osc2 = ac.createOscillator();
    const gain2 = ac.createGain();
    osc2.type = 'sawtooth';
    osc2.frequency.setValueAtTime(freq / 2, ac.currentTime);
    gain2.gain.setValueAtTime(0, ac.currentTime);
    gain2.gain.linearRampToValueAtTime(0.22, ac.currentTime + 0.015);
    gain2.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 0.45);
    osc2.connect(gain2);
    gain2.connect(ac.destination);
    osc2.start(ac.currentTime);
    osc2.stop(ac.currentTime + 0.5);
  }
}

// ─── BACKING TRACK ────────────────────────────────────────────────────────────
// Pattern: tonic-fifth-tonic'-fifth looping as eighth notes at 84 BPM
const BPM            = 84;
const EIGHTH_DUR     = 60 / BPM / 2;          // ~0.357s per eighth note
const LOOKAHEAD_MS   = 25.0;
const SCHEDULE_AHEAD = 0.1;

// Backing patterns per key signature: [tonic, fifth, tonic-octave-up, fifth]
const BACKING_PATTERNS = {
  'D':  [293.66, 440.00, 587.33, 440.00], // D4, A4, D5, A4
  'G':  [196.00, 293.66, 392.00, 293.66], // G3, D4, G4, D4
  'Bb': [233.08, 349.23, 466.16, 349.23], // Bb3, F4, Bb4, F4
  'Eb': [311.13, 466.16, 622.25, 466.16], // Eb4, Bb4, Eb5, Bb4 (treble)
  // Note: baritone uses same Eb pattern but getBackingFreqs picks by keySig
  'C':  [261.63, 392.00, 523.25, 392.00], // C4, G4, C5, G4
  'F':  [174.61, 261.63, 349.23, 261.63], // F3, C4, F4, C4
  'A':  [220.00, 329.63, 440.00, 329.63], // A3, E4, A4, E4
};

function getBackingFreqs() {
  const levelDef = getActiveLevelDef(); // uses UC stage def when ucActive
  const keySig = levelDef ? (levelDef.concertKeySig || levelDef.keySig) : 'D';
  return BACKING_PATTERNS[keySig] || BACKING_PATTERNS['D'];
}

let backingActive    = false;
let backingNoteIdx   = 0;
let nextNoteTime     = 0;
let backingInterval  = null;
let currentBackingFreqs = BACKING_PATTERNS['D'];
let floatingLabels = []; // Array to hold {x, y, text, color, vx, vy, life}	

function playClickSound(beat, time) {
  // Percussive tick-tock — white noise burst, no pitch, won't interfere with mic
  const ac = getAudioCtx();
  const bufSize = Math.floor(ac.sampleRate * 0.03);
  const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);

  const source = ac.createBufferSource();
  source.buffer = buf;

  // Bandpass — higher for tick (beat 1), lower for tock (beat 2)
  const bp = ac.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = beat === 0 ? 2200 : 1100;
  bp.Q.value = 0.8;

  const gain = ac.createGain();
  gain.gain.setValueAtTime(beat === 0 ? 0.5 : 0.3, time);
  gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.025);

  source.connect(bp);
  bp.connect(gain);
  gain.connect(ac.destination);
  source.start(time);
  source.stop(time + 0.03);
}

function scheduleBackingNote(freq, time) {
  const ac = getAudioCtx();

  const osc  = ac.createOscillator();
  const gain = ac.createGain();
  // Sine wave — warm, unobtrusive underneath the player's sawtooth zaps
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, time);

  const noteDur = EIGHTH_DUR * 0.75; // slight staccato so notes separate
  gain.gain.setValueAtTime(0, time);
  gain.gain.linearRampToValueAtTime(0.10, time + 0.008);
  gain.gain.exponentialRampToValueAtTime(0.0001, time + noteDur);

  osc.connect(gain);
  gain.connect(ac.destination);
  osc.start(time);
  osc.stop(time + noteDur + 0.01);
}

function backingScheduler() {
  const ac = getAudioCtx();
  while (nextNoteTime < ac.currentTime + SCHEDULE_AHEAD) {
    scheduleBackingNote(currentBackingFreqs[backingNoteIdx % currentBackingFreqs.length], nextNoteTime);
    backingNoteIdx++;
    nextNoteTime += EIGHTH_DUR;
  }
}

function startBackingTrack() {
  if (backingActive) return;
  backingActive  = true;
  backingNoteIdx = 0;
  currentBackingFreqs = getBackingFreqs();
  nextNoteTime   = getAudioCtx().currentTime + 0.02;
  backingInterval = setInterval(backingScheduler, LOOKAHEAD_MS);
}

function stopBackingTrack() {
  backingActive = false;
  if (backingInterval) { clearInterval(backingInterval); backingInterval = null; }
  // Close and null the AudioContext — kills all queued scheduled nodes immediately.
  // getAudioCtx() will create a fresh one next time it's needed.
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
}

function isOnBeat() {
  if (!backingActive) return false;
  const ac = getAudioCtx();
  const now = ac.currentTime;
  // How far into the current eighth-note interval are we?
  // nextNoteTime is always the NEXT scheduled note, so the last beat was nextNoteTime - EIGHTH_DUR
  const lastBeat = nextNoteTime - EIGHTH_DUR;
  const phase = now - lastBeat;               // 0 = right on the beat, EIGHTH_DUR = next beat
  // Distance to nearest beat (could be the last or the upcoming one)
  const distToNearest = Math.min(phase, EIGHTH_DUR - phase);
  // Mic mode needs a wider window to account for audio buffer + noteHold latency (~66ms)
  const tolerance = EIGHTH_DUR * (inputMode === 'mic' ? 0.35 : 0.12);
  return distToNearest < tolerance;
}

// Returns semitone distance between two pitches using NOTE_FREQ
// Falls back to a large number if either pitch is not in NOTE_FREQ
function semitoneDist(pitchA, pitchB) {
  const fA = NOTE_FREQ[pitchA];
  const fB = NOTE_FREQ[pitchB];
  if (!fA || !fB) return 0; // unknown — allow it
  return Math.abs(12 * Math.log2(fA / fB));
}

// Filter a pitch list to those within a 5th (7 semitones) of lastPitch
// Uses 7.01 to handle floating point precision (e.g. A4 from D4 = exactly 7.0)
// Falls back to closest available if nothing qualifies
function filterByInterval(pitches, lastPitch, maxSemitones) {
  if (!lastPitch) return pitches.filter(p => p !== lastPitch);
  const near = pitches.filter(p => p !== lastPitch && semitoneDist(p, lastPitch) <= maxSemitones + 0.01);
  if (near.length > 0) return near;
  // Fallback: pick the closest pitch(es) to lastPitch
  const withDist = pitches.filter(p => p !== lastPitch)
    .map(p => ({ p, d: semitoneDist(p, lastPitch) }))
    .sort((a, b) => a.d - b.d);
  if (withDist.length === 0) return pitches;
  // Return all pitches tied for the minimum distance
  const minDist = withDist[0].d;
  return withDist.filter(x => x.d <= minDist + 0.5).map(x => x.p);
}

function generateUcNote(lastPitch) {
  const pitches = getUcPitches();
  const pool = filterByInterval(pitches, lastPitch, 7);
  const pitch = pool[Math.floor(Math.random() * pool.length)];
  const idx = (notes.length);
  // Use ucStageIdx (generation stage) directly — not ucDisplayStageIdx
  const genLevelDef = getLevelSet()[ucStages[ucStageIdx]];
  const spIdx = genLevelDef && genLevelDef.pitches ? genLevelDef.pitches.indexOf(pitch) : -1;
  const staffPos = (spIdx >= 0 && genLevelDef && genLevelDef.staffPos) ? genLevelDef.staffPos[spIdx] : pitch.replace(/[#b]/g, '').replace(/(\d)$/, '$1');
  return {
    pitch,
    staffPos,
    name: pitch.replace(/\d+$/, ''),
    x: CLEF_WIDTH + 70 + idx * NOTE_SPACING + ucXOffset,
    y: getNoteY(staffPos),
    answered: false,
  };
}

function generateLevel() {
  const levelSet = getLevelSet();
  const levelDef = levelSet[currentLevel];
  const pitches = levelDef.pitches;
  const tonic = levelDef.tonic;
  const notes = [];
  let lastPitch = null;
  for (let i = 0; i < LEVEL_LENGTH; i++) {
    let pitch;
    if (i === LEVEL_LENGTH - 1) {
      // Last note must be tonic — but only if it's within a 5th; else pick closest to tonic
      if (lastPitch === tonic) {
        const alt = filterByInterval(pitches.filter(p => p !== tonic), lastPitch, 7);
        pitch = alt[Math.floor(Math.random() * alt.length)];
      } else if (semitoneDist(lastPitch, tonic) <= 7.01) {
        pitch = tonic;
      } else {
        // Tonic is too far — step toward it (pick closest available to tonic)
        const sorted = pitches.filter(p => p !== lastPitch)
          .map(p => ({ p, d: semitoneDist(p, tonic) }))
          .sort((a, b) => a.d - b.d);
        pitch = sorted[0] ? sorted[0].p : tonic;
      }
    } else if (i === LEVEL_LENGTH - 2) {
      // Second-to-last must not be the tonic
      const base = pitches.filter(p => p !== tonic);
      const available = filterByInterval(base, lastPitch, 7);
      pitch = available[Math.floor(Math.random() * available.length)];
    } else {
      const available = filterByInterval(pitches, lastPitch, 7);
      pitch = available[Math.floor(Math.random() * available.length)];
    }
    lastPitch = pitch;
    const sp = levelDef.staffPos ? levelDef.staffPos[levelDef.pitches.indexOf(pitch)] : pitch;
    const staffPos = sp || pitch;
    notes.push({
      pitch,                // sounding pitch — buttons, playback, mic, answer checking
      staffPos,             // visual position — Y coordinate, ledger lines
      name: pitch.replace(/\d+$/, ''), // pitch without octave e.g. 'F#', 'Bb'
      x: CLEF_WIDTH + 70 + i * NOTE_SPACING,
      y: getNoteY(staffPos),
      answered: false,
    });
  }
  return notes;
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  const cs = Math.floor((s % 1) * 100);
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
}

// ─── HERO ─────────────────────────────────────────────────────────────────────
// Hero state
const HERO_W = 18, HERO_H = 36;
const HERO_GAP = 12; // px above the notehead centre

// For notes below the staff, land the hero on the bottom staff line instead
const BELOW_STAFF_TREBLE = new Set(['G3','A3','B3','C4','C3','D3','E3','F3']); // staffPos values
const BELOW_STAFF_ALTO   = new Set(['C3','D3']);
const BELOW_STAFF_BASS   = new Set(['C2','D2','E2']);

function heroLandingY(note) {
  let belowStaff = false;
  if (selectedInstrument === 'Viola') {
    belowStaff = BELOW_STAFF_ALTO.has(note.staffPos || note.pitch);
  } else if (selectedInstrument === 'Cello' || selectedInstrument === 'Bass' || selectedInstrument === 'Baritone' || selectedInstrument === 'Trombone') {
    belowStaff = BELOW_STAFF_BASS.has(note.staffPos || note.pitch);
  } else {
    belowStaff = BELOW_STAFF_TREBLE.has(note.staffPos || note.pitch); // Violin and Flute
  }
  return belowStaff ? staffLines[4] : note.y;
}

// ─── PIXEL ART HERO ──────────────────────────────────────────────────────────
// Each cell = 2px. Sprite is 16 cols × 24 rows = drawn at 2× = 32×48 display
// We'll draw at natural size, each "pixel" = 2 screen pixels
const PX = 2;

// Color palette
const C = {
  skin:   '#f5c99a',
  hair:   '#3a1a00',
  shirt:  '#3355cc',
  pants:  '#222266',
  shoe:   '#331100',
  eye:    '#000',
  white:  '#fff',
  mouth:  '#cc4444',
  note:   '#ffe066',
  outline:'#111',
  empty:  null,
};

// Using single characters: S=skin, H=hair, B=shirt, P=pants, K=shoe, E=eye, W=white, M=mouth, _=empty
const SPRITE_IDLE = [
  '___HWH_HWH_HWH__', // Row 00: Three Turret Tops
  '___HWH_HWH_HWH__', // Row 01: Three Turret Tops
  '___HHHHHHHHHHH__', // Row 02: Top bridge (connecting the turrets)
  '___HWWWWWWWWWH__', // Row 03: Top crown highlight
  '___HHHHHHHHHHH__', // Row 04: Crown base
  '____HHHHHHHHH___', // Row 05: Neck compression
  '____HWWWWWWWH___', // Row 06: Pillar start
  '____HWWWWWWWH___', // Row 07: Pillar
  '____HWWWWWWWH___', // Row 08: Pillar
  '____HWWWWWWWH___', // Row 09: Pillar
  '___HHHHHHHHHHH__', // Row 10: Base flare start
  '___HWWWWWWWWWH__', // Row 11: Base highlight
  '__HHHHHHHHHHHHH_', // Row 12: Lower tier
  '__HWWWWWWWWWWWH_', // Row 13: Lower tier highlight
  '_HHHHHHHHHHHHHHH', // Row 14: Bottom foundation
  '________________', // Row 15: Ground contact
];

const SPRITE_WALK = [
  '_____HHHH___HWH_', // Row 00: Distant Turret (L) and Front Turret (R) top
  '_____HWHH___HWH_', // Row 01: Connects to slightly hidden center turret
  '__HHHHHHHHHHHHWH', // Row 02: Main top bridge, heavily skewed right
  '__HWWWWWWWWWWWH_', // Row 03: Top highlight follows the skew
  '___HHHHHHHHHHHH_', // Row 04: Top base, compressed on the left side
  '____HHHHHHHHHH__', // Row 05: Neck compression, shifted right
  '____HWWWWWWWH___', // Row 06: Pillar start
  '___HWWWWWWWH____', // Row 07: Pillar, tilting left (meaning top is right)
  '___HWWWWWWWH____', // Row 08: Pillar
  '__HWWWWWWWH_____', // Row 09: Pillar, base pulling backward (left)
  '_HHHHHHHHHHH____', // Row 10: Base flare starts, angled
  '_HWWWWWWWWWH____', // Row 11: Base highlight
  'HHHHHHHHHHH_____', // Row 12: Lower tier foundation (far right element)
  'WWWWWWWWWH______', // Row 13: Ground effect/thrust hint
  '________________', // Row 14: Clear air/motion blur
  '________________', // Row 15: Clear air
];

const colorMap = { S:'skin', H:'hair', B:'shirt', P:'pants', K:'shoe', E:'eye', W:'white', M:'mouth', _:null };

function drawSprite(sprite, cx, cy, flipX = false) {
  const cols = sprite[0].length;
  const rows = sprite.length;
  const drawW = cols * PX;
  const drawH = rows * PX;
  ctx.save();
  if (flipX) {
    ctx.translate(cx + drawW / 2, cy);
    ctx.scale(-1, 1);
    ctx.translate(-drawW / 2, 0);
  } else {
    ctx.translate(cx, cy);
  }
  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const ch = sprite[row][col];
      const key = colorMap[ch];
      if (!key) continue;
      ctx.fillStyle = C[key];
      ctx.fillRect(col * PX, row * PX, PX, PX);
    }
  }
  ctx.restore();
}

// ─── HEART DRAWING ────────────────────────────────────────────────────────────
function drawHeart(x, y, full, half) {
  const size = 10;
  ctx.save();
  ctx.translate(x, y);
  // outline
  ctx.fillStyle = '#440000';
  drawHeartShape(size + 1);
  if (full) {
    ctx.fillStyle = '#ff2222';
    drawHeartShape(size);
  } else if (half) {
    // Clip to left half — rect from far left to center (x=0), full height
    ctx.fillStyle = '#ff2222';
    ctx.beginPath();
    ctx.rect(-size - 2, -size, size + 2, size * 3);
    ctx.clip();
    drawHeartShape(size);
  } else {
    ctx.fillStyle = '#333';
    drawHeartShape(size);
  }
  ctx.restore();
}

function drawHeartShape(size) {
  ctx.beginPath();
  ctx.moveTo(0, size * 0.3);
  ctx.bezierCurveTo(-size, -size * 0.3, -size, size * 0.8, 0, size);
  ctx.bezierCurveTo(size, size * 0.8, size, -size * 0.3, 0, size * 0.3);
  ctx.fill();
}

// ─── TREBLE CLEF DRAWING ──────────────────────────────────────────────────────
function drawTrebleClef(x) {
  ctx.save();
  ctx.fillStyle = '#ffe066';
  const clefHeight = LINE_SPACING * 7.5;
  ctx.font = `${clefHeight}px serif`;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('𝄞', x, staffLines[3] + LINE_SPACING * 1.2);
  ctx.restore();
}

// ─── ALTO CLEF DRAWING ────────────────────────────────────────────────────────
// Unicode 𝄡 is the B clef — the notch must sit exactly on staffLines[2] (C4/middle line).
// The glyph's visual centre sits above its typographic middle, so we nudge down manually.
function drawAltoClef(x) {
  ctx.save();
  ctx.fillStyle = '#ffe066';
  const clefHeight = LINE_SPACING * 5.9;
  ctx.font = `${clefHeight}px serif`;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  // Offset: push the glyph down so its visual notch aligns with the middle staff line.
  // The 𝄡 glyph centre sits roughly 18% above typographic middle — nudge down to compensate.
  const nudge = clefHeight * 0.09;
  ctx.fillText('𝄡', x - 15, staffLines[2] + nudge);
  ctx.restore();
}

// ─── BASS CLEF DRAWING ────────────────────────────────────────────────────────
// Unicode 𝄢 — the two dots straddle the F3 line (staffLines[1] in bass clef).
// staffLines[1] = STAFF_TOP + LINE_SPACING = 2nd line from top = A3 line.
// We position the glyph so its F-dot notch aligns with staffLines[1].
function drawBassClef(x) {
  ctx.save();
  ctx.fillStyle = '#ffe066';
  const clefHeight = LINE_SPACING * 4.2 * 1.1576;
  ctx.font = `${clefHeight}px serif`;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  // 𝄢 visual center sits roughly at the F line; nudge so it aligns with staffLines[1]
  ctx.fillText('𝄢', x - 15, staffLines[1] + LINE_SPACING * 0.1 + 19);
  ctx.restore();
}

function drawClef(x) {
  if (selectedInstrument === 'Viola') drawAltoClef(x);
  else if (selectedInstrument === 'Cello' || selectedInstrument === 'Bass' || selectedInstrument === 'Baritone' || selectedInstrument === 'Trombone') drawBassClef(x);
  else drawTrebleClef(x);
}

// ─── KEY SIGNATURE ────────────────────────────────────────────────────────────
// D Major (levels 1-3): F# and C#. G Major (violin level 4): F# only. Bb Major (flute): Bb and Eb.
function drawKeySignatureForKeySig(x, keySig) {
  // Draw key signature for an explicit keySig string (used for scrolling UC key changes)
  _drawKeySignatureImpl(x, keySig);
}

function drawKeySignature(x) {
  const levelDef = getActiveLevelDef();
  const keySig = levelDef ? levelDef.keySig : 'D';
  _drawKeySignatureImpl(x, keySig);
}

function _drawKeySignatureImpl(x, keySig) {
  ctx.save();
  ctx.fillStyle = '#ffe066';
  ctx.font = `${LINE_SPACING * 2.2}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';

  const isBassClef  = ['Cello','Bass','Baritone','Trombone'].includes(selectedInstrument);
  const isAltoClef  = selectedInstrument === 'Viola';

  if (keySig === 'C') {
    // C major — no sharps or flats

  } else if (isBassClef) {
    // ── Bass clef ─────────────────────────────────────────────────────────────
    if (keySig === 'Bb') {
      ctx.fillText('♭', x,      staffLines[3] + LINE_SPACING * 0.75 - 10); // Bb
      ctx.fillText('♭', x + 14, staffLines[1] + LINE_SPACING * 0.75);      // Eb
    } else if (keySig === 'Eb') {
      ctx.fillText('♭', x,      staffLines[3] + LINE_SPACING * 0.75 - 10); // Bb
      ctx.fillText('♭', x + 14, staffLines[1] + LINE_SPACING * 0.75);      // Eb
      ctx.fillText('♭', x + 33, staffLines[3] - LINE_SPACING * 0.25 - 15 + 20); // Ab
    } else if (keySig === 'F') {
      ctx.fillText('♭', x,      staffLines[3] + LINE_SPACING * 0.75 - 5); // Bb
    } else if (keySig === 'A') {
      // Bass clef A major — 3 sharps: F#, C#, G#
      ctx.fillText('♯', x,      staffLines[1] + LINE_SPACING * 0.57);      // F#
      ctx.fillText('♯', x + 19, staffLines[2] + LINE_SPACING * 0.9 + 3);       // C#
      ctx.fillText('♯', x + 34, staffLines[2] + LINE_SPACING * 0.2 - 25);       // G#
    } else {
      // Bass clef sharps (D/G major)
      ctx.fillText('♯', x,      staffLines[1] + LINE_SPACING * 0.57);      // F#
      if (keySig !== 'G') ctx.fillText('♯', x + 15, staffLines[2] + LINE_SPACING * 0.9 + 3); // C#
    }

  } else if (isAltoClef) {
    // ── Alto clef ─────────────────────────────────────────────────────────────
    ctx.fillText('♯', x,      staffLines[0] + LINE_SPACING * 0.9 + 5);         // F#
    if (keySig === 'A') {
      ctx.fillText('♯', x + 14, staffLines[2] - LINE_SPACING * 0.1 + LINE_SPACING * 0.6 + 4); // C#
      ctx.fillText('♯', x + 28, staffLines[1] + LINE_SPACING * 0.5 - 20);       // G#
    } else if (keySig !== 'G') {
      ctx.fillText('♯', x + 14, staffLines[2] - LINE_SPACING * 0.1 + LINE_SPACING * 0.6); // C#
    }

  } else {
    // ── Treble clef ───────────────────────────────────────────────────────────
    if (keySig === 'Eb') {
      ctx.fillText('♭', x,      staffLines[2] + LINE_SPACING * 0.75 - 5);  // Bb
      ctx.fillText('♭', x + 20, staffLines[0] + LINE_SPACING * 0.5 + 8);   // Eb
      ctx.fillText('♭', x + 39, staffLines[3] + LINE_SPACING * 0.75 - 17 + 20); // Ab
    } else if (keySig === 'Bb') {
      ctx.fillText('♭', x,      staffLines[2] + LINE_SPACING * 0.75 - 5);  // Bb
      ctx.fillText('♭', x + 19, staffLines[0] + LINE_SPACING * 0.75 + 1);  // Eb
    } else if (keySig === 'F') {
      ctx.fillText('♭', x,      staffLines[2] + LINE_SPACING * 0.75 - 5);  // Bb
    } else if (keySig === 'A') {
      // A major treble — 3 sharps: F#, C#, G#
      ctx.fillText('♯', x,      staffLines[0] + LINE_SPACING * 0.4 + 5);       // F#
      ctx.fillText('♯', x + 14, staffLines[2] - LINE_SPACING * 0.6 + LINE_SPACING * 0.6 + 3); // C#
      ctx.fillText('♯', x + 28, staffLines[1] + LINE_SPACING * 0.4 + 3);       // G#
    } else {
      // Treble clef sharps (D/G major)
      ctx.fillText('♯', x,      staffLines[0] + LINE_SPACING * 0.4 + 5);       // F#
      if (keySig !== 'G') ctx.fillText('♯', x + 14, staffLines[2] - LINE_SPACING * 0.6 + LINE_SPACING * 0.6 + 3); // C#
    }
  }
  ctx.restore();
}

// ─── NOTE DRAWING ─────────────────────────────────────────────────────────────
function drawNote(note, camX) {
  const sx = note.x - camX;
  const sy = note.y;
  if (sx < -30 || sx > W + 30) return;

  // Ledger lines below staff for violin level 4 (G3, A3, B3, C4)
  if (!['Viola','Cello','Bass','Baritone','Trombone'].includes(selectedInstrument)) {
    const bottomLine = staffLines[4]; // E4 line
    const col = note.answered ? '#555' : '#ffe066';
    ctx.strokeStyle = col;
    ctx.lineWidth = 1.5;
    const LL = LINE_SPACING;
    // Draw ledger lines based on how far below the staff the note sits
    if (['C4','B3'].includes(note.staffPos||note.pitch)) {
      ctx.beginPath(); ctx.moveTo(sx-16, bottomLine+LL); ctx.lineTo(sx+16, bottomLine+LL); ctx.stroke();
    }
    if (['A3'].includes(note.staffPos||note.pitch)) {
      ctx.beginPath(); ctx.moveTo(sx-16, bottomLine+LL);   ctx.lineTo(sx+16, bottomLine+LL);   ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx-16, bottomLine+LL*2); ctx.lineTo(sx+16, bottomLine+LL*2); ctx.stroke();
    }
    if (['G3'].includes(note.staffPos||note.pitch)) {
      ctx.beginPath(); ctx.moveTo(sx-16, bottomLine+LL);   ctx.lineTo(sx+16, bottomLine+LL);   ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx-16, bottomLine+LL*2); ctx.lineTo(sx+16, bottomLine+LL*2); ctx.stroke();
    }
    if (['F3'].includes(note.staffPos||note.pitch)) {
      [1,2,3].forEach(n => { ctx.beginPath(); ctx.moveTo(sx-16, bottomLine+LL*n); ctx.lineTo(sx+16, bottomLine+LL*n); ctx.stroke(); });
    }
    if (['E3'].includes(note.staffPos||note.pitch)) {
      [1,2,3].forEach(n => { ctx.beginPath(); ctx.moveTo(sx-16, bottomLine+LL*n); ctx.lineTo(sx+16, bottomLine+LL*n); ctx.stroke(); });
    }
    if (['D3'].includes(note.staffPos||note.pitch)) {
      [1,2,3,4].forEach(n => { ctx.beginPath(); ctx.moveTo(sx-16, bottomLine+LL*n); ctx.lineTo(sx+16, bottomLine+LL*n); ctx.stroke(); });
    }
    if (['C3'].includes(note.staffPos||note.pitch)) {
      [1,2,3,4].forEach(n => { ctx.beginPath(); ctx.moveTo(sx-16, bottomLine+LL*n); ctx.lineTo(sx+16, bottomLine+LL*n); ctx.stroke(); });
    }
  }

  // Ledger lines above the treble staff (flute: Ab5/Bb5; violin: A5)
  if (selectedInstrument === 'Violin' || selectedInstrument === 'Flute') {
    const topLine = staffLines[0]; // F5 line
    const col = note.answered ? '#555' : '#ffe066';
    ctx.strokeStyle = col;
    ctx.lineWidth = 1.5;
    const needsLedger1 = ['A5'].includes(note.staffPos||note.pitch);
    if (needsLedger1) {
      const ly = topLine - LINE_SPACING;
      ctx.beginPath(); ctx.moveTo(sx - 16, ly); ctx.lineTo(sx + 16, ly); ctx.stroke();
    }
    if ((note.staffPos||note.pitch) === 'B5') { // Bb5 is in space above 1st ledger — still draw that ledger
      const ly = topLine - LINE_SPACING;
      ctx.beginPath(); ctx.moveTo(sx - 16, ly); ctx.lineTo(sx + 16, ly); ctx.stroke();
    }
  }

  // Ledger lines BELOW alto staff for viola level 6 (C3, D3 need ledger lines)
  if (selectedInstrument === 'Viola') {
    const altoBtm = staffLines[4]; // F3 bottom line
    const colA = note.answered ? '#555' : '#ffe066';
    ctx.strokeStyle = colA;
    ctx.lineWidth = 1.5;
    if ((note.staffPos||note.pitch) === 'D3') { // 1st ledger below
      ctx.beginPath(); ctx.moveTo(sx - 16, altoBtm + LINE_SPACING); ctx.lineTo(sx + 16, altoBtm + LINE_SPACING); ctx.stroke();
    }
    if ((note.staffPos||note.pitch) === 'C3') { // space below 1st ledger
      ctx.beginPath(); ctx.moveTo(sx - 16, altoBtm + LINE_SPACING); ctx.lineTo(sx + 16, altoBtm + LINE_SPACING); ctx.stroke();
    }
  }

  // Ledger lines for alto clef notes above the staff
  if (selectedInstrument === 'Viola') {
    const topLine = staffLines[0]; // G4 line
    const col = note.answered ? '#555' : '#ffe066';
    ctx.strokeStyle = col;
    ctx.lineWidth = 1.5;
    // B4 sits ON the first ledger line above
    if ((note.staffPos||note.pitch) === 'B4') {
      const ly = topLine - LINE_SPACING;
      ctx.beginPath(); ctx.moveTo(sx - 16, ly); ctx.lineTo(sx + 16, ly); ctx.stroke();
    }
    // G#4 sits in the space just above the alto staff top line
    if (note.pitch === 'G#4') {
      const ly = topLine - LINE_SPACING * 0.5;
      // G#4 is in first space above, no ledger needed — but B4 above needs one
    }
    // C#5/C5 sits in the space ABOVE the first ledger — ledger must still be shown
    if ((note.staffPos||note.pitch) === 'C5') {
      const ly = topLine - LINE_SPACING;
      ctx.beginPath(); ctx.moveTo(sx - 16, ly); ctx.lineTo(sx + 16, ly); ctx.stroke();
    }
    // D5 sits ON the second ledger line — draw both ledgers
    if ((note.staffPos||note.pitch) === 'D5') {
      const ly1 = topLine - LINE_SPACING;
      const ly2 = topLine - LINE_SPACING * 2;
      ctx.beginPath(); ctx.moveTo(sx - 16, ly1); ctx.lineTo(sx + 16, ly1); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx - 16, ly2); ctx.lineTo(sx + 16, ly2); ctx.stroke();
    }
  }

  // Ledger lines BELOW bass staff for cello level 6 (C2, D2, E2) and bass level 6 (E2)
  if (selectedInstrument === 'Cello' || selectedInstrument === 'Bass') {
    const bassBtm = staffLines[4]; // G2 bottom line
    const colB = note.answered ? '#555' : '#ffe066';
    ctx.strokeStyle = colB;
    ctx.lineWidth = 1.5;
    if ((note.staffPos||note.pitch) === 'E2') {
      ctx.beginPath(); ctx.moveTo(sx - 16, bassBtm + LINE_SPACING); ctx.lineTo(sx + 16, bassBtm + LINE_SPACING); ctx.stroke();
    }
    if ((note.staffPos||note.pitch) === 'D2') {
      ctx.beginPath(); ctx.moveTo(sx - 16, bassBtm + LINE_SPACING); ctx.lineTo(sx + 16, bassBtm + LINE_SPACING); ctx.stroke();
    }
    if ((note.staffPos||note.pitch) === 'C2') {
      ctx.beginPath(); ctx.moveTo(sx - 16, bassBtm + LINE_SPACING); ctx.lineTo(sx + 16, bassBtm + LINE_SPACING); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx - 16, bassBtm + LINE_SPACING * 2); ctx.lineTo(sx + 16, bassBtm + LINE_SPACING * 2); ctx.stroke();
    }
  }

  // Ledger lines for bass clef notes above the staff
  if (selectedInstrument === 'Cello' || selectedInstrument === 'Bass') {
    const topLine = staffLines[0]; // A3 top line of bass staff
    const col = note.answered ? '#555' : '#ffe066';
    ctx.strokeStyle = col;
    ctx.lineWidth = 1.5;
    // C4 (C#) sits ON the first ledger line above
    if ((note.staffPos||note.pitch) === 'C4') {
      const ly = topLine - LINE_SPACING;
      ctx.beginPath(); ctx.moveTo(sx - 16, ly); ctx.lineTo(sx + 16, ly); ctx.stroke();
    }
    // D4 sits in the space above the first ledger — ledger still shown
    if ((note.staffPos||note.pitch) === 'D4') {
      const ly = topLine - LINE_SPACING;
      ctx.beginPath(); ctx.moveTo(sx - 16, ly); ctx.lineTo(sx + 16, ly); ctx.stroke();
    }
  }

  // Solid notehead (oval)
  ctx.save();
  ctx.fillStyle = note.answered ? '#555' : '#ffe066';
  ctx.strokeStyle = note.answered ? '#333' : '#cc9900';
  ctx.lineWidth = 1;
  ctx.translate(sx, sy);
  ctx.rotate(-0.4);
  ctx.beginPath();
  ctx.ellipse(0, 0, 13, 9, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.restore();
}

// ─── STAFF DRAWING ────────────────────────────────────────────────────────────
function drawStaff(camX) {
  // In UC mode staff runs the full canvas width; otherwise ends at the double bar
  const staffEnd = ucActive ? W : Math.max(20, DOUBLE_BAR_X - camX) + 10;
  ctx.strokeStyle = '#ffe066';
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.moveTo(0, staffLines[i]);
    ctx.lineTo(staffEnd, staffLines[i]);
    ctx.stroke();
  }
}

// ─── HUD ──────────────────────────────────────────────────────────────────────
function drawHUD() {
  // Score
  ctx.fillStyle = '#ffe066';
  ctx.font = '8px "Press Start 2P"';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top'; // Standardize the baseline for the top bar
  ctx.fillText(`SCORE: ${score}`, 10, 8);

  // Timer (top center)
  ctx.textAlign = 'center';
  ctx.fillStyle = '#aaffaa';
  ctx.fillText(formatTime(levelComplete || gameOver ? finalTime : elapsedTime), W / 2, 8);

  // Note counter (below timer)
  ctx.fillStyle = '#ffe066';
  ctx.font = '7px "Press Start 2P"';
  ctx.fillText(`NOTE ${Math.min(currentNoteIdx + 1, LEVEL_LENGTH)} / ${LEVEL_LENGTH}`, W / 2, 22);

  // Hearts
  const heartStartX = W - 20;
  const totalHearts = 3;
  for (let i = 0; i < totalHearts; i++) {
    const hx = heartStartX - i * 26;
    const halfHeartsForThis = hearts - (totalHearts - 1 - i) * 2;
    const full = halfHeartsForThis >= 2;
    const half = halfHeartsForThis === 1;
    drawHeart(hx, 10, full, half);
  }

  // Mic mode indicator
  if (inputMode === 'mic') {
    const micColor = micActive ? '#44ff88' : '#ff4444';
    ctx.fillStyle = micColor;
    ctx.font = '7px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(detectedNote ? `♪ ${detectedNote}` : '🎤', W / 2, 30);
  }

  // MIDI status indicator during Piano play
  if (selectedInstrument === 'Piano') {
    const col = midiStatus === 'granted' ? '#44ff88' : '#ff8844';
    const msg = midiStatus === 'granted' ? '🎹 MIDI' : 'NO MIDI';
    ctx.fillStyle = col;
    ctx.font = '6px "Press Start 2P"';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'top';
    ctx.fillText(msg, W - 8, 24);
  }

  // In-game MENU / END GAME button (below score, top-left)
  if (!gameOver && !levelComplete) {
    const mbW = ucActive ? 90 : 60, mbH = 20;
    const mbX = 10, mbY = 24;
    const mbLabel = ucActive ? 'END GAME' : 'DASHBOARD';
    drawNesButton(mbLabel, mbX, mbY, mbW, mbH, hoveredBtn === 'MENU_INGAME', false);
    inGameMenuBtn = { x: mbX, y: mbY, w: mbW, h: mbH };
  }

  // Note buttons or piano keyboard
  if (!gameOver && !levelComplete && currentNoteIdx < notes.length && inputMode === 'noteNames') {
    if (selectedInstrument === 'Piano') {
      drawPianoKeyboard();
    } else {
      drawNoteButtons();
    }
  }
}

// ─── PIANO KEYBOARD ──────────────────────────────────────────────────────────
const PIANO_WHITE_KEYS = ['C3','D3','E3','F3','G3','A3','B3',
                           'C4','D4','E4','F4','G4','A4','B4',
                           'C5','D5','E5','F5','G5'];
const PIANO_BLACK_KEYS = [
  // [pitch, whiteKeyIndex (the white key to its left)]
  ['C#3',0],['D#3',1],['F#3',3],['G#3',4],['A#3',5],
  ['C#4',7],['D#4',8],['F#4',10],['G#4',11],['A#4',12],
  ['C#5',14],['D#5',15],['F#5',17],['G#5',18],
];
const PIANO_WK_W  = 46;  // white key width
const PIANO_WK_G  = 1;   // gap between white keys
const PIANO_BK_W  = 28;  // black key width
const PIANO_WK_H  = 100; // white key height
const PIANO_BK_H  = 62;  // black key height

let pianoBtns = []; // [{pitch, x, y, w, h, isBlack}]

function pianoKeyboardX() {
  const totalW = PIANO_WHITE_KEYS.length * PIANO_WK_W + (PIANO_WHITE_KEYS.length - 1) * PIANO_WK_G;
  return Math.floor((W - totalW) / 2);
}

function pianoKeyY() { return H - PIANO_WK_H - 8; }

function drawPianoKeyboard() {
  const startX = pianoKeyboardX();
  const ky = pianoKeyY();
  const levelDef = getActiveLevelDef();
  const activePitches = new Set(levelDef ? levelDef.pitches : []);
  const currentPitch = notes[currentNoteIdx] ? notes[currentNoteIdx].pitch : null;

  pianoBtns = [];

  // Draw white keys first
  PIANO_WHITE_KEYS.forEach((pitch, i) => {
    const kx = startX + i * (PIANO_WK_W + PIANO_WK_G);
    const inLevel   = activePitches.has(pitch);
    const isCurrent = pitch === currentPitch;
    const isHovered = hoveredBtn === 'PIANO_' + pitch;
    const isAnswered = notes[currentNoteIdx - 1] && notes[currentNoteIdx - 1].pitch === pitch && notes[currentNoteIdx - 1].answered;

    // Key fill
    ctx.fillStyle = isHovered ? '#d4eeff' : '#fff';
    ctx.fillRect(kx, ky, PIANO_WK_W, PIANO_WK_H);

    // Border
    ctx.strokeStyle = inLevel ? '#ffe066' : '#666';
    ctx.lineWidth = inLevel ? 2 : 1;
    ctx.strokeRect(kx, ky, PIANO_WK_W, PIANO_WK_H);

    // Note name label at bottom
    if (inLevel) {
      ctx.fillStyle = '#000';
      ctx.font = '7px "Press Start 2P"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(pitch.replace(/\d/, ''), kx + PIANO_WK_W/2, ky + PIANO_WK_H - 4);
    }

    // Octave marker (small dot at C keys)
    if (pitch.startsWith('C')) {
      ctx.fillStyle = '#999';
      ctx.beginPath();
      ctx.arc(kx + PIANO_WK_W/2, ky + PIANO_WK_H - 16, 3, 0, Math.PI*2);
      ctx.fill();
    }

    pianoBtns.push({ pitch, x: kx, y: ky, w: PIANO_WK_W, h: PIANO_WK_H, isBlack: false });
  });

  // Draw black keys on top
  PIANO_BLACK_KEYS.forEach(([pitch, wi]) => {
    const baseX = startX + wi * (PIANO_WK_W + PIANO_WK_G);
    const kx = baseX + PIANO_WK_W - PIANO_BK_W / 2;
    const inLevel   = activePitches.has(pitch);
    const isHovered = hoveredBtn === 'PIANO_' + pitch;

    ctx.fillStyle = isHovered ? '#555' : '#111';
    ctx.fillRect(kx, ky, PIANO_BK_W, PIANO_BK_H);
    ctx.strokeStyle = inLevel ? '#ffe066' : '#333';
    ctx.lineWidth = inLevel ? 2 : 1;
    ctx.strokeRect(kx, ky, PIANO_BK_W, PIANO_BK_H);

    if (inLevel) {
      ctx.fillStyle = '#ffe066';
      ctx.font = '6px "Press Start 2P"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(pitch.replace(/\d/,''), kx + PIANO_BK_W/2, ky + PIANO_BK_H - 3);
    }

    pianoBtns.push({ pitch, x: kx, y: ky, w: PIANO_BK_W, h: PIANO_BK_H, isBlack: true });
  });
}

// Hit test piano — black keys take priority (drawn on top)
function hitTestPiano(pos) {
  // Check black keys first (they're on top)
  for (const btn of pianoBtns) {
    if (btn.isBlack && pos.x >= btn.x && pos.x <= btn.x + btn.w &&
        pos.y >= btn.y && pos.y <= btn.y + btn.h) return btn.pitch;
  }
  // Then white keys
  for (const btn of pianoBtns) {
    if (!btn.isBlack && pos.x >= btn.x && pos.x <= btn.x + btn.w &&
        pos.y >= btn.y && pos.y <= btn.y + btn.h) return btn.pitch;
  }
  return null;
}

// ─── NOTE BUTTONS ─────────────────────────────────────────────────────────────

function hitTestCircle(pos, btn) {
  const dx = pos.x - btn.cx;
  const dy = pos.y - btn.cy;
  return dx * dx + dy * dy <= btn.r * btn.r;
}

function isHalfStep(pitchA, pitchB) {
  // Now using sounding pitches directly — half step = 1 semitone apart
  return Math.abs(semitoneDist(pitchA, pitchB) - 1) < 0.1;
}

// Convert a staffPos to its sounding pitch using the current level's pitch array
function staffPosToPitch(staffPos) {
  // In UC mode, scan the upcoming notes to find the sounding pitch for this staffPos.
  // This ensures buttons always match the actual notes on the staff, even during
  // key changes when ucDisplayStageIdx and ucStageIdx may differ.
  if (ucActive && notes && notes.length > 0) {
    const upcoming = notes.slice(Math.max(0, currentNoteIdx - 1), currentNoteIdx + 10);
    for (const n of upcoming) {
      if (n.staffPos === staffPos) return n.pitch;
    }
  }
  // Regular levels: use the active level def
  const levelDef = getActiveLevelDef();
  if (!levelDef || !levelDef.staffPos) return staffPos;
  const idx = levelDef.staffPos.indexOf(staffPos);
  if (idx >= 0 && levelDef.pitches[idx]) return levelDef.pitches[idx];
  return staffPos;
}

// Compute x positions for a row given variable spacing
function rowXPositions(rowPitches, r, halfGap, wholeGap) {
  // G# row: Nut → (halfGap) → G# → (halfGap) → A → (wholeGap) → B → (wholeGap) → C#
  // Normal rows start at 0; G# row starts at halfGap so nut-to-G# = half step
  const firstPitch = staffPosToPitch(rowPitches[0]);
  // Half steps from the nut need extra space (15px) vs halfGap (6px).
  // Applies when G# is first (A major G string) or C# is first (A major C string — viola/cello).
  const leadOffset = (/^G#\d/.test(firstPitch) || /^C#\d/.test(firstPitch)) ? 15 : 0;
  const positions = [leadOffset];
  for (let i = 1; i < rowPitches.length; i++) {
    const spA = staffPosToPitch(rowPitches[i-1]);
    const spB = staffPosToPitch(rowPitches[i]);
    const gap = isHalfStep(spA, spB) ? halfGap : wholeGap;
    positions.push(positions[i-1] + r * 2 + gap);
  }
  return positions;
}

function drawNoteButtons() {
  const levelDef = getActiveLevelDef();
  if (!levelDef) return;

  const BAND_INSTRUMENTS = ['Flute','Clarinet','Trumpet','Alto Sax','Trombone','Baritone','Mallet Perc'];
  const isBand = BAND_INSTRUMENTS.includes(selectedInstrument);

  // Band instruments: single flat row of unique pitch names, no labels
  let rows, rowLabels;
  if (isBand) {
    // Deduplicate pitches by display name (e.g. Bb3 and Bb4 both show "Bb" — keep first)
    const seen = new Set();
    const flat = (levelDef.pitches || []).filter(p => {
      const label = getPitchDisplay(p);
      if (seen.has(label)) return false;
      seen.add(label);
      return true;
    });
    rows = [flat];
    rowLabels = [];
  } else {
    rows = levelDef.rows || [levelDef.pitches];
    rowLabels = levelDef.rowLabels || [];
  }

  const r = 25;
  const halfGap = 6;   // gap between half-step circles
  const wholeGap = 20; // gap between whole-step circles (double)
  const rowH = r * 2 + 12;
  const totalRows = rows.length;

  const bottomPad = 16;
  const gridH = (totalRows - 1) * rowH + r * 2;
  const gridTop = H - bottomPad - gridH;

  noteBtns = [];


  // Calculate x positions for each row
  const rowPositions = rows.map(rp => rowXPositions(rp, r, halfGap, wholeGap));

  // Widest row total span (last x position of each row)
  const maxRowW = Math.max(...rowPositions.map(pos => pos[pos.length - 1] || 0));

  // Left-align: anchor all rows so first circle aligns left
  const nutX = (W - maxRowW) / 2;
  const startX = nutX;

  // Nut: vertical line connecting top and bottom string lines
  const topStringY    = gridTop + r;
  const bottomStringY = gridTop + r + (totalRows - 1) * rowH;
  ctx.strokeStyle = '#ffe066';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(startX - r - 6, topStringY);
  ctx.lineTo(startX - r - 6, bottomStringY);
  ctx.stroke();

  rows.forEach((rowPitches, rowIdx) => {
    const cy = gridTop + r + rowIdx * rowH;
    const xPos = rowPositions[rowIdx];

    // String line — from nut to end of this row's last circle
    const lineLeft  = startX - r - 6;
    const lineRight = startX + (xPos[xPos.length - 1] || 0) + r + 6;
    ctx.strokeStyle = '#ffe066';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(lineLeft, cy);
    ctx.lineTo(lineRight, cy);
    ctx.stroke();

    // Row label to the left of the nut
    if (rowLabels[rowIdx]) {
      ctx.fillStyle = '#aaddff';
      ctx.font = '8px "Press Start 2P"';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      ctx.fillText(rowLabels[rowIdx], lineLeft - 8, cy);
    }

    // Circles
    rowPitches.forEach((pitch, colIdx) => {
      const cx = startX + xPos[colIdx];
      const soundPitch = staffPosToPitch(pitch);
      const label = getPitchDisplay(soundPitch);
      const hovered = hoveredBtn === `NOTE_${soundPitch}`;

      // Shadow
      ctx.beginPath();
      ctx.arc(cx + 2, cy + 2, r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fill();

      // Body
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = hovered ? '#4466ee' : '#1a1a3a';
      ctx.fill();

      // Border
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.strokeStyle = '#ffe066';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Label
      ctx.fillStyle = '#fff';
      ctx.font = '11px "Press Start 2P"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, cx, cy);

      noteBtns.push({ pitch: soundPitch, name: soundPitch[0], cx, cy, r });
    });
  });
}

// ─── DOUBLE BAR LINE ──────────────────────────────────────────────────────────
function drawDoubleBarLine(camX) {
  // Pin to left edge once the bar scrolls into view — never let it go further left than x=20
  const sx = Math.max(20, DOUBLE_BAR_X - camX);
  if (DOUBLE_BAR_X - camX > W + 10) return; // not yet visible
  ctx.save();
  ctx.strokeStyle = '#ffe066';
  // Thin bar
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(sx, staffLines[0]);
  ctx.lineTo(sx, staffLines[4]);
  ctx.stroke();
  // Thick bar
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(sx + 7, staffLines[0]);
  ctx.lineTo(sx + 7, staffLines[4]);
  ctx.stroke();
  ctx.restore();
}

// ─── PARTICLE SYSTEM ──────────────────────────────────────────────────────────
// Each particle: { x, y, vx, vy, life, maxLife, size, color }
let particles = [];

const PARTICLE_COLORS = [
  '#ffe066', '#ffcc00', '#ffffff', '#cc99ff', '#9933ff', '#bb66ff', '#fff4cc'
];

function spawnExplosion(worldX, worldY, big = false) {
  const count = big ? 42 : 22;
  const speedMult = big ? 1.6 : 1.0;
  const sizeMult  = big ? 1.8 : 1.0;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.4;
    const speed = (60 + Math.random() * 120) * speedMult;
    const life   = (big ? 0.55 : 0.45) + Math.random() * 0.3;
    particles.push({
      x:       worldX,
      y:       worldY,
      vx:      Math.cos(angle) * speed,
      vy:      Math.sin(angle) * speed - (big ? 50 : 30),
      life,
      maxLife: life,
      size:    (2 + Math.floor(Math.random() * 3) * 2) * sizeMult,
      color:   PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)],
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x    += p.vx * dt;
    p.y    += p.vy * dt;
    p.vy   += 220 * dt;   // gravity
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles(camX) {
  for (const p of particles) {
    const sx = p.x - camX;
    if (sx < -20 || sx > W + 20) continue;
    const alpha = Math.max(0, p.life / p.maxLife);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(sx - p.size / 2, p.y - p.size / 2, p.size, p.size);
    ctx.restore();
  }
}
function updateAndDrawLabels(dt, camX) {
  for (let i = floatingLabels.length - 1; i >= 0; i--) {
    const l = floatingLabels[i];
    // Move label
    l.x += l.vx * dt;
    l.y += l.vy * dt;
    l.vy += 400 * dt; // Gravity pulls it down
    l.life -= dt;

    if (l.life <= 0) {
      floatingLabels.splice(i, 1);
      continue;
    }

    // Draw label
    ctx.save();
    ctx.globalAlpha = Math.min(1, l.life * 2);
    ctx.fillStyle = l.color;
    ctx.font = 'bold 12px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.fillText(l.text, l.x - camX, l.y);
    ctx.restore();
  }
}
	
// ─── NES BUTTON HELPER ────────────────────────────────────────────────────────
function drawNesButton(label, x, y, w, h, hovered, selected) {
  ctx.save();
  // Shadow
  ctx.fillStyle = '#000';
  ctx.fillRect(x + 3, y + 3, w, h);
  // Body
  ctx.fillStyle = selected ? '#ffe066' : hovered ? '#4466ee' : '#1a1a3a';
  ctx.fillRect(x, y, w, h);
  // Border
  ctx.strokeStyle = selected ? '#fff' : '#ffe066';
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, w, h);
  // Label
  ctx.fillStyle = selected ? '#000' : '#fff';
  ctx.font = '9px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w / 2, y + h / 2);
  ctx.restore();
}

const instrColorMap = { W:'W', D:'D', L:'L', N:'N', G:'G', S:'S', I:'I', C:'C', B:'B', R:'R', _:null };

function drawInstrumentSprite(sprite, cx, cy) {
  const cols = sprite[0].length;
  const rows = sprite.length;
  const drawW = cols * PX;
  ctx.save();
  ctx.translate(cx - drawW / 2, cy);
  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const ch = sprite[row][col];
      if (ch === '_') continue;
      ctx.fillStyle = IC[ch] || '#fff';
      ctx.fillRect(col * PX, row * PX, PX, PX);
    }
  }
  ctx.restore();
}



// ─── SHARED MINI STAFF DRAWING ────────────────────────────────────────────────
// Draws staff + clef + key sig + lowest & highest noteheads joined by a line.
function drawMiniStaff(instrument, levelDef, staffCX, staffMidY, LS) {
  if (!levelDef) return;
  const pitches = levelDef.pitches;
  const keySig  = levelDef.keySig || 'D';

  const psl = [
    staffMidY - LS * 2,
    staffMidY - LS,
    staffMidY,
    staffMidY + LS,
    staffMidY + LS * 2,
  ];

  const pNoteY_treble = {
    'G3': psl[4]+LS*2.5, 'G#3': psl[4]+LS*2.5, 'A3': psl[4]+LS*2, 'B3': psl[4]+LS*1.5,
    'C4': psl[4]+LS, 'D4': psl[4]+LS*.5, 'E4': psl[4],
    'F4': psl[4]-LS*.5, 'G4': psl[4]-LS,  'G#4': psl[4]-LS, 'Ab4': psl[4]-LS*1.5,
    'A4': psl[4]-LS*1.5, 'Bb4': psl[4]-LS*2, 'B4': psl[4]-LS*2,
    'C#5': psl[4]-LS*2.5, 'C5': psl[4]-LS*2.5, 'D5': psl[4]-LS*3,
    'Eb5': psl[4]-LS*3.5, 'E5': psl[4]-LS*3.5,
    'F5': psl[4]-LS*4, 'F#5': psl[4]-LS*4,
    'G5': psl[4]-LS*4.5, 'Ab5': psl[4]-LS*5, 'A5': psl[4]-LS*5,
    'Bb5': psl[4]-LS*5.5,
  };
  const pNoteY_alto = {
    'C3': psl[4]+LS*1.5, 'C#3': psl[4]+LS*1.5,
    'D3': psl[4]+LS, 'E3': psl[4]+LS*.5,
    'F3': psl[4], 'F#3': psl[4],
    'G3': psl[3]+LS*.5, 'G#3': psl[3]+LS*.5,
    'A3': psl[3], 'Bb3': psl[2]+LS*.5, 'B3': psl[2]+LS*.5,
    'C4': psl[2], 'C#4': psl[2],
    'D4': psl[2]-LS*.5, 'E4': psl[2]-LS,
    'F4': psl[2]-LS*1.5, 'F#4': psl[2]-LS*1.5,
    'G4': psl[2]-LS*2, 'G#4': psl[2]-LS*2,
    'A4': psl[2]-LS*2.5, 'Bb4': psl[2]-LS*3, 'B4': psl[2]-LS*3,
    'C#5': psl[2]-LS*3.5, 'C5': psl[2]-LS*3.5, 'D5': psl[2]-LS*4,
  };
  const pNoteY_bass = {
    'G#2': psl[4]-LS*.5,  'Ab2': psl[4]-LS*.5, 'C#2': psl[4]+LS*2,
    'Bb2': psl[3],  'F#3': psl[2]+LS*.5, 'G#3': psl[2]-LS*.5,
    'C#3': psl[3]+LS*.5, 'C#4': psl[1]+LS*.5,
    'Eb3': psl[2]-LS*.5, 'Ab3': psl[2]-LS*2, 'Bb3': psl[2]-LS*2.5,
    'C2': psl[4]+LS*2, 'D2': psl[4]+LS*1.5, 'E2': psl[4]+LS, 'F2': psl[4]+LS*.5,
    'F#2': psl[4]+LS*.5, 'G2': psl[4], 'A2': psl[4]-LS*.5, 'B2': psl[3],
    'C3': psl[3]-LS*.5, 'D3': psl[2], 'E3': psl[2]-LS*.5, 'F3': psl[2]-LS,
    'G3': psl[2]-LS*1.5, 'A3': psl[2]-LS*2, 'B3': psl[2]-LS*2.5,
    'C4': psl[2]-LS*3, 'D4': psl[2]-LS*3.5,
  };
  const pNoteY = instrument === 'Viola' ? pNoteY_alto
               : (instrument === 'Cello' || instrument === 'Bass' || instrument === 'Baritone' || instrument === 'Trombone') ? pNoteY_bass
               : pNoteY_treble;

  // Staff geometry
  const CLEF_W = 44, NOTE_PAD = 20;
  const staffW = CLEF_W + NOTE_PAD * 2 + 60; // fixed width — just two notes
  const staffLeft  = staffCX - staffW / 2;
  const staffRight = staffLeft + staffW;
  const loX = staffLeft + CLEF_W + NOTE_PAD;
  const hiX = staffRight - NOTE_PAD;
  const kx  = staffLeft + 18;

  // Staff lines
  ctx.strokeStyle = '#ffe066';
  ctx.lineWidth = 1;
  for (let li = 0; li < 5; li++) {
    ctx.beginPath();
    ctx.moveTo(staffLeft, psl[li]);
    ctx.lineTo(staffRight, psl[li]);
    ctx.stroke();
  }

  // Clef
  ctx.save();
  ctx.fillStyle = '#ffe066';
  ctx.textAlign = 'left';
  if (instrument === 'Viola') {
    ctx.font = `${LS * 5.2}px serif`;
    ctx.textBaseline = 'middle';
    ctx.fillText('𝄡', staffLeft + 1, psl[2] + 2);
  } else if (instrument === 'Cello' || instrument === 'Bass') {
    ctx.font = `${LS * 4.2 * 1.1576}px serif`;
    ctx.textBaseline = 'middle';
    ctx.fillText('𝄢', staffLeft + 1, psl[1] + LS * 0.1 + 7);
  } else {
    ctx.font = `${LS * 7.5}px serif`;
    ctx.textBaseline = 'alphabetic';
    ctx.fillText('𝄞', staffLeft + 1, psl[3] + LS * 1.2);
  }
  ctx.restore();

  // Key signature
  ctx.save();
  ctx.fillStyle = '#ffe066';
  ctx.font = `bold ${LS * 1.9}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  if (keySig === 'Bb') {
    ctx.fillText('♭', kx,     psl[2] + LS * 0.75);
    ctx.fillText('♭', kx + 9, psl[0] + LS * 0.75);
  } else if (keySig === 'G') {
    if (instrument === 'Viola')                         ctx.fillText('♯', kx, psl[0] + LS * 0.9);
    else if (instrument === 'Cello' || instrument === 'Bass') ctx.fillText('♯', kx, psl[1] + LS * 0.57);
    else                                                ctx.fillText('♯', kx, psl[0] + LS * 0.4);
  } else if (keySig === 'D') {
    if (instrument === 'Viola') {
      ctx.fillText('♯', kx, psl[0]+LS*0.9); ctx.fillText('♯', kx+9, psl[2]-LS*0.1+LS*0.6);
    } else if (instrument === 'Cello' || instrument === 'Bass') {
      ctx.fillText('♯', kx, psl[1]+LS*0.57); ctx.fillText('♯', kx+10, psl[2]+LS*0.9);
    } else {
      ctx.fillText('♯', kx, psl[0]+LS*0.4); ctx.fillText('♯', kx+9, psl[2]-LS*0.6+LS*0.6);
    }
  }
  ctx.restore();

  // Draw lowest and highest notes only
  const loPitch = pitches[0];
  const hiPitch = pitches[pitches.length - 1];
  const loY = pNoteY[loPitch];
  const hiY = pNoteY[hiPitch];
  if (loY === undefined || hiY === undefined) return;

  // Ledger lines helper
  function ledger(x, y) {
    // Draw a ledger line at y if it's outside the staff
    if (y > psl[4] + LS * 0.4 || y < psl[0] - LS * 0.4) {
      ctx.strokeStyle = '#ffe066';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x - 9, y);
      ctx.lineTo(x + 9, y);
      ctx.stroke();
    }
    // Second ledger if needed
    if (y > psl[4] + LS * 1.6) {
      ctx.beginPath(); ctx.moveTo(x-9, psl[4]+LS); ctx.lineTo(x+9, psl[4]+LS); ctx.stroke();
    }
    if (y < psl[0] - LS * 1.6) {
      ctx.beginPath(); ctx.moveTo(x-9, psl[0]-LS); ctx.lineTo(x+9, psl[0]-LS); ctx.stroke();
    }
  }

  ledger(loX, loY);
  ledger(hiX, hiY);

  // Connecting line between the two noteheads
  ctx.strokeStyle = '#ffe066';
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  ctx.moveTo(loX + 7, loY);
  ctx.lineTo(hiX - 7, hiY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Noteheads
  [{ x: loX, y: loY }, { x: hiX, y: hiY }].forEach(({ x, y }) => {
    ctx.save();
    ctx.fillStyle = '#ffe066';
    ctx.strokeStyle = '#cc9900';
    ctx.lineWidth = 1;
    ctx.translate(x, y);
    ctx.rotate(-0.3);
    ctx.beginPath();
    ctx.ellipse(0, 0, 7, 4.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  });
}

// ─── OCTAVE SELECT SCREEN ────────────────────────────────────────────────────
function drawOctaveSelectScreen() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);
  for (let sy = 0; sy < H; sy += 4) {
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(0, sy, W, 2);
  }

  // Title
  ctx.fillStyle = '#ffe066';
  ctx.font = '12px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('MALLET PERCUSSION', W / 2, H / 2 - 90);

  ctx.fillStyle = '#aaddff';
  ctx.font = '8px "Press Start 2P"';
  ctx.fillText('CHOOSE YOUR OCTAVE', W / 2, H / 2 - 58);

  // Two large buttons
  const btnW = 200, btnH = 64, gap = 32;
  const totalW = btnW * 2 + gap;
  const startX = W / 2 - totalW / 2;
  const btnY = H / 2 - 20;

  drawNesButton('HIGH OCTAVE', startX,          btnY, btnW, btnH, hoveredBtn === 'OCTAVE_HIGH', malletOctave === 'high');
  drawNesButton('LOW OCTAVE',  startX + btnW + gap, btnY, btnW, btnH, hoveredBtn === 'OCTAVE_LOW',  malletOctave === 'low');
  octaveHighBtn = { x: startX,          y: btnY, w: btnW, h: btnH };
  octaveLowBtn  = { x: startX + btnW + gap, y: btnY, w: btnW, h: btnH };

  // Range hint below each button
  ctx.fillStyle = '#888';
  ctx.font = '6px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('Bb4 – Bb5', startX + btnW / 2,           btnY + btnH + 14);
  ctx.fillText('Bb3 – Bb4', startX + btnW + gap + btnW / 2, btnY + btnH + 14);

  // Back button
  const bbW = 120, bbH = 28;
  const bbX = W / 2 - bbW / 2, bbY = H - 50;
  drawNesButton('BACK', bbX, bbY, bbW, bbH, hoveredBtn === 'OCTAVE_BACK', false);
  octaveBackBtn = { x: bbX, y: bbY, w: bbW, h: bbH };
}

// ─── LEVEL SELECT SCREEN ──────────────────────────────────────────────────────
function displayPitch(pitch, keySig) {
  // pitch is now the sounding pitch — strip octave number for display
  return pitch.replace(/\d+$/, '');
}

function getLevelRangeStr(levelDef) {
  if (!levelDef) return '';
  const p = levelDef.pitches;
  const keySig = levelDef.keySig || 'D';
  if (p.length === 0) return '';
  if (p.length === 1) return displayPitch(p[0], keySig);
  const first = displayPitch(p[0], keySig);
  const last  = displayPitch(p[p.length - 1], keySig);
  // Strip octave digits for display, add octave only when ambiguous
  const p0oct = p[0].replace(/[^0-9]/g, '');
  const pNOct = p[p.length - 1].replace(/[^0-9]/g, '');
  const firstFull = first + p0oct;
  const lastFull  = last  + pNOct;
  return firstFull + ' – ' + lastFull;
}

// Draws a yellow padlock on the canvas — used for locked level cards
function drawLockIcon(cx, cy, size) {
  const s = size;
  ctx.save();
  ctx.globalAlpha = 0.55;

  // Shackle (arc on top)
  ctx.beginPath();
  ctx.arc(cx, cy - s * 0.35, s * 0.38, Math.PI, 0, false);
  ctx.strokeStyle = '#ffe066';
  ctx.lineWidth   = s * 0.18;
  ctx.lineCap     = 'round';
  ctx.stroke();

  // Body (rounded rect)
  const bW = s * 0.9, bH = s * 0.65;
  const bX = cx - bW / 2, bY = cy - s * 0.1;
  const r  = s * 0.12;
  ctx.beginPath();
  ctx.moveTo(bX + r, bY);
  ctx.lineTo(bX + bW - r, bY);
  ctx.quadraticCurveTo(bX + bW, bY, bX + bW, bY + r);
  ctx.lineTo(bX + bW, bY + bH - r);
  ctx.quadraticCurveTo(bX + bW, bY + bH, bX + bW - r, bY + bH);
  ctx.lineTo(bX + r, bY + bH);
  ctx.quadraticCurveTo(bX, bY + bH, bX, bY + bH - r);
  ctx.lineTo(bX, bY + r);
  ctx.quadraticCurveTo(bX, bY, bX + r, bY);
  ctx.closePath();
  ctx.fillStyle = '#ffe066';
  ctx.fill();

  // Keyhole circle
  ctx.beginPath();
  ctx.arc(cx, bY + bH * 0.38, s * 0.1, 0, Math.PI * 2);
  ctx.fillStyle = '#0a0a1a';
  ctx.fill();

  // Keyhole stem
  ctx.beginPath();
  ctx.moveTo(cx, bY + bH * 0.45);
  ctx.lineTo(cx, bY + bH * 0.72);
  ctx.strokeStyle = '#0a0a1a';
  ctx.lineWidth   = s * 0.1;
  ctx.lineCap     = 'round';
  ctx.stroke();

  ctx.restore();
}

function drawLevelSelectScreen() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);
  for (let sy = 0; sy < H; sy += 4) {
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(0, sy, W, 2);
  }

  // Header
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffe066';
  ctx.font = '16px "Press Start 2P"';
  ctx.fillText(selectedInstrument.toUpperCase(), W / 2, 42);
  ctx.fillStyle = '#aaddff';
  ctx.font = '7px "Press Start 2P"';
  ctx.fillText('SELECT A LEVEL', W / 2, 64);

  // Divider
  ctx.strokeStyle = '#ffe066';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(60, 76); ctx.lineTo(W - 60, 76);
  ctx.stroke();

  // Level cards
  const levels = getLevelSet();
  const levelNums = Object.keys(levels).map(Number).sort((a,b) => a - b);
  const cols = Math.min(levelNums.length, 3);  // max 3 columns → 2 rows for 6 levels
  const rows = Math.ceil(levelNums.length / cols);
  const cardW = 230, cardH = 62, cardGapX = 14, cardGapY = 12;
  const gridW = cols * cardW + (cols - 1) * cardGapX;
  const gridH = rows * cardH + (rows - 1) * cardGapY;
  const gridX = W / 2 - gridW / 2;
  // Total content: grid + gap + ucCard + gap + backBtn
  const ucCardH_est = 54; // estimated UC card height
  const bbH_est = 30;     // back button height
  const totalContentH = gridH + 8 + ucCardH_est + 10 + bbH_est;
  // Start grid so all content fits between the divider (96px) and bottom of screen
  const topMargin = 96 + 8;
  const availH = H - topMargin;
  const startY = availH > totalContentH
    ? topMargin + (availH - totalContentH) / 2  // centre if room
    : topMargin;                                  // pin to top if tight
  const gridY = startY;

  levelSelectBtns = [];

  levelNums.forEach((lvl, idx) => {
    const col = idx % cols;
    const row = Math.floor(idx / cols);
    const cx = gridX + col * (cardW + cardGapX);
    const cy = gridY + row * (cardH + cardGapY);
    const hovered = hoveredBtn === `LVLSEL_${lvl}`;
    const levelDef = levels[lvl];
    const keySigName = !levelDef ? '' :
      levelDef.keySig === 'G'  ? 'G Major' :
      levelDef.keySig === 'A'  ? 'A Major' :
      levelDef.keySig === 'F'  ? 'F Major'  :
      levelDef.keySig === 'Bb' ? 'Bb Major' :
      levelDef.keySig === 'Eb' ? 'Eb Major' :
      levelDef.keySig === 'C'  ? 'C Major' : 'D Major';

    // Shadow
    ctx.fillStyle = '#000';
    ctx.fillRect(cx + 3, cy + 3, cardW, cardH);
    // Body
    ctx.fillStyle = hovered ? '#1e2a5a' : '#1a1a3a';
    ctx.fillRect(cx, cy, cardW, cardH);
    // Border
    ctx.strokeStyle = hovered ? '#fff' : '#ffe066';
    ctx.lineWidth = 2;
    ctx.strokeRect(cx, cy, cardW, cardH);

    // Level number (top left)
    ctx.fillStyle = '#ffe066';
    ctx.font = '9px "Press Start 2P"';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(`Level ${lvl}`, cx + 10, cy + 8);

    // Key sig (top right)
    ctx.fillStyle = '#aaddff';
    ctx.font = '6px "Press Start 2P"';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'top';
    ctx.fillText(keySigName, cx + cardW - 10, cy + 10);

    // Level title centred in card
    if (levelDef && levelDef.title) {
      ctx.fillStyle = '#fff';
      ctx.font = '9px "Press Start 2P"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(levelDef.title, cx + cardW / 2, cy + cardH / 2 + 4);
    }

    levelSelectBtns.push({ level: lvl, x: cx, y: cy, w: cardW, h: cardH, locked: _maxLevel && lvl > _maxLevel });

    // Draw lock overlay if level is locked
    if (_maxLevel && lvl > _maxLevel) {
      ctx.fillStyle = 'rgba(255, 224, 102, 0.12)';
      ctx.fillRect(cx, cy, cardW, cardH);
      drawLockIcon(cx + cardW / 2, cy + cardH / 2 - 2, 26);
    }
  });

  // Back button — positioned directly below last level card row
  const bbW = 120, bbH = 30;
  const bbX = W / 2 - bbW / 2;
  const bbY = gridY + rows * (cardH + cardGapY) + 18;
  drawNesButton('BACK', bbX, bbY, bbW, bbH, hoveredBtn === 'LVLSEL_BACK', false);
  levelSelectBackBtn = { x: bbX, y: bbY, w: bbW, h: bbH };


}

  const maxStringSpriteH = Math.max(...strings.map(n => spriteMap[n].length * PX));
  const maxWindSpriteH   = Math.max(...winds.map(n => spriteMap[n].length * PX));
  const cardH     = padding + labelH + padding + maxStringSpriteH + padding;       // string cards

  const row2Y = row1Y + cardH + 14;

    ...winds.map((name, i)   => ({ name, bx: row2StartX + i*(windBtnW+gap), by: row2Y, isWind: true  })),
    ...pianoRow.map((name, i) => ({ name, bx: pianoStartX + i*(pianoBtnW+gap), by: row3Y, isWind: 'piano' })),
  ];

  allRows.forEach(({ name, bx, by: rowY, isWind }) => {

    ctx.strokeRect(bx, rowY, cardW, thisCardH);

    ctx.font = '8px "Press Start 2P"';
    ctx.textAlign = 'center';

      ctx.fillText('Mallet', bx + cardW / 2, rowY + padding);
      ctx.fillText('Perc',   bx + cardW / 2, rowY + padding + 12);
