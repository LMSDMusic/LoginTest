// ─── LEVEL PREVIEW SCREEN ────────────────────────────────────────────────────
function drawLevelPreviewScreen() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);

  for (let sy = 0; sy < H; sy += 4) {
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(0, sy, W, 2);
  }

  // Header
  ctx.textAlign = 'center';
  ctx.fillStyle = '#44ff88';
  ctx.font = '22px "Press Start 2P"';
  ctx.fillText(`LEVEL  ${currentLevel}`, W / 2, 36);

  ctx.fillStyle = '#aaddff';
  ctx.font = '12px "Press Start 2P"';
  const clefName = selectedInstrument === 'Viola' ? 'ALTO CLEF' : (selectedInstrument === 'Cello' || selectedInstrument === 'Bass' || selectedInstrument === 'Baritone' || selectedInstrument === 'Trombone') ? 'BASS CLEF' : 'TREBLE CLEF';
  const _previewLS = getLevelSet()[currentLevel];
  const _keySigName = !_previewLS ? 'D MAJOR' :
    _previewLS.keySig === 'G'  ? 'G MAJOR' :
    _previewLS.keySig === 'A'  ? 'A MAJOR' :
    _previewLS.keySig === 'F'  ? 'F MAJOR'  :
    _previewLS.keySig === 'Bb' ? 'Bb MAJOR' :
    _previewLS.keySig === 'Eb' ? 'Eb MAJOR' :
    _previewLS.keySig === 'C'  ? 'C MAJOR' : 'D MAJOR';
  ctx.fillText(`${selectedInstrument.toUpperCase()}  ·  ${clefName}  ·  ${_keySigName}`, W / 2, 70);

  // ── Mini staff ──────────────────────────────────────────────────────────────
  const LS = 14;
  const staffMidY = 152;
  const psl = [ // preview staff lines top→bottom: F5,D5,B4,G4,E4
    staffMidY - LS * 2,
    staffMidY - LS,
    staffMidY,
    staffMidY + LS,
    staffMidY + LS * 2,
  ];
  // Note Y positions — scaled to preview staff, instrument-aware
  // psl[2] = middle line. Each step = LS/2.
  const pNoteY_treble = {
    // Low mallet perc / clarinet low register
    'C3':  psl[4] + LS * 4.5,
    'D3':  psl[4] + LS * 4.0,
    'E3':  psl[4] + LS * 3.5,
    'F3':  psl[4] + LS * 3.0,
    'Ab3': psl[4] + LS * 2.0, // same as A3
    'G3':  psl[4] + LS * 2.5,
    'A3':  psl[4] + LS * 2.0,
    'Bb3': psl[4] + LS * 1.5, // same as B3
    'G#3': psl[4] + LS * 2.0, // same as A3
    'C#4': psl[4] + LS * 1.0, // same as C4
    'G#4': psl[4] - LS * 1.5, // same as Ab4
    'G#5': psl[4] - LS * 5.0, // same as Ab5
    'B3':  psl[4] + LS * 1.5,
    'C4':  psl[4] + LS * 1.0,
    'D4':  psl[4] + LS / 2,
    'Eb4': psl[4],             // same as E4
    'E4':  psl[4],
    'F4':  psl[4] - LS / 2,
    'F#4': psl[4] - LS / 2,   // same as F4
    'G4':  psl[4] - LS,
    'Ab4': psl[4] - LS * 1.5,
    'A4':  psl[4] - LS * 1.5,
    'Bb4': psl[4] - LS * 2,
    'B4':  psl[4] - LS * 2,
    'C#5': psl[4] - LS * 2.5,
    'C5':  psl[4] - LS * 2.5,
    'D5':  psl[4] - LS * 3,
    'Eb5': psl[4] - LS * 3.5,
    'E5':  psl[4] - LS * 3.5,
    'F5':  psl[4] - LS * 4,
    'F#5': psl[4] - LS * 4,
    'G5':  psl[4] - LS * 4.5,
    'Ab5': psl[4] - LS * 5,
    'A5':  psl[4] - LS * 5,
    'Bb5': psl[4] - LS * 5.5,
  };
  const pNoteY_alto = {
    'C3': psl[4] + LS * 1.5,   // space below 1st ledger below alto staff
    'C#3': psl[4] + LS * 1.5,  // same as C3
    'D3': psl[4] + LS * 1.0,   // 1st ledger line below alto staff
    'E3': psl[4] + LS * 0.5,   // space below bottom line (F3)
    'Bb3': psl[3] - LS * 0.5,  // same as B3 in alto
    'F3': psl[4],               // bottom line of alto staff
    'F#3': psl[4],              // same position as F3
    'G3': psl[3] + LS * 0.5,   //
    'G#3': psl[3] + LS * 0.5,  // same as G3 space below A3 line
    'A3': psl[3],               // 2nd line from bottom (A3)
    'B3': psl[2] + LS * 0.5,   // space between A3 and C4
    'C4': psl[2],               // middle line (C4)
    'C#4': psl[2],             // same as C4 in alto
    'D4': psl[2] - LS * 0.5,   // 2nd space from bottom
    'E4': psl[2] - LS * 1.0,   // 4th line
    'F4': psl[2] - LS * 1.5,
    'F#4': psl[2] - LS * 1.5,  // same as F4   // 4th space
    'G4': psl[2] - LS * 2.0,
    'G#4': psl[2] - LS * 2.0,  // same as G4   // top line
    'A4': psl[2] - LS * 2.5,   // space above top line
    'Bb4': psl[2] - LS * 2.5,  // same as A4 space
    'B4': psl[2] - LS * 3.0,   // first ledger above
    'C#5': psl[2] - LS * 3.5,  // space above first ledger
    'C5':  psl[2] - LS * 3.5,
    'D5': psl[2] - LS * 4.0,   // second ledger above
  };
  // Bass clef preview: bottom line psl[4]=G2, psl[3]=B2, psl[2]=D3, psl[1]=F3, psl[0]=A3
  const pNoteY_bass = {
    'C2':  psl[4] + LS * 2.0,  'D2':  psl[4] + LS * 1.5,
    'E2':  psl[4] + LS * 1.0,  'F2':  psl[4] + LS * 0.5,
    'F#2': psl[4] + LS * 0.5,
    'G#2': psl[4] - LS * 0.5,   // same as Ab2
    'C#2': psl[4] + LS * 0.5,   // same as C2
    'Ab2': psl[4] - LS * 0.5,  // same position as A2
    'G2':  psl[4],              'A2':  psl[4] - LS * 0.5,
    'Bb2': psl[3],              // same position as B2
    'B2':  psl[3],
    'C3':  psl[3] - LS * 0.5,  'D3':  psl[2],
    'Eb3': psl[2] - LS * 0.5,  // same as E3
    'E3':  psl[2] - LS * 0.5,  'F3':  psl[2] - LS * 1.0,
    'G3':  psl[2] - LS * 1.5,
    'Ab3': psl[2] - LS * 2.0,  // same as A3
    'A3':  psl[2] - LS * 2.0,
    'Bb3': psl[2] - LS * 2.5,  // same as B3
    'B3':  psl[2] - LS * 2.5,
    'C4':  psl[2] - LS * 3.0,  'D4':  psl[2] - LS * 3.5,
  };
  const pNoteY = selectedInstrument === 'Viola' ? pNoteY_alto
               : (selectedInstrument === 'Cello' || selectedInstrument === 'Bass' || selectedInstrument === 'Baritone' || selectedInstrument === 'Trombone') ? pNoteY_bass
               : pNoteY_treble;

  // Size staff to fit notes — clef+keysig need ~80px on the left, 36px padding on the right
  const _previewLevelSet = getLevelSet();
  const _previewPitches   = _previewLevelSet[currentLevel].pitches;
  const _previewStaffPos  = _previewLevelSet[currentLevel].staffPos || _previewPitches;
  const _previewNoteGap = _previewPitches.length <= 5 ? 36 : 28;
  const _previewTotalW = (_previewPitches.length - 1) * _previewNoteGap;
  const CLEF_KEYSIG_W = 125;
  const NOTE_PADDING = 36;
  const staffWidth = CLEF_KEYSIG_W + _previewTotalW + NOTE_PADDING;
  const staffLeft = W / 2 - staffWidth / 2;
  const _previewNotesStartX = staffLeft + CLEF_KEYSIG_W;
  const _previewLastNoteX = _previewNotesStartX + (_previewPitches.length - 1) * _previewNoteGap;
  const staffRight = _previewLastNoteX + NOTE_PADDING;

  // Staff lines
  ctx.strokeStyle = '#ffe066';
  ctx.lineWidth = 1.2;
  for (let li = 0; li < 5; li++) {
    ctx.beginPath();
    ctx.moveTo(staffLeft, psl[li]);
    ctx.lineTo(staffRight, psl[li]);
    ctx.stroke();
  }

  // Clef — treble, alto, or bass
  ctx.save();
  ctx.fillStyle = '#ffe066';
  if (selectedInstrument === 'Viola') {
    ctx.font = `${LS * 5.2}px serif`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText('𝄡', staffLeft + 4, psl[2] + 5);
  } else if (selectedInstrument === 'Cello' || selectedInstrument === 'Bass' || selectedInstrument === 'Baritone' || selectedInstrument === 'Trombone') {
    ctx.font = `${LS * 4.2 * 1.1576}px serif`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    // Bass clef: position so the F-dot aligns with psl[1] (2nd line from top = A3)
    ctx.fillText('𝄢', staffLeft + 4, psl[1] + LS * 0.1 + 11);
  } else {
    ctx.font = `${LS * 7.5}px serif`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText('𝄞', staffLeft + 4, psl[3] + LS * 1.2);
  }
  ctx.restore();

  // Key signature sharps — per-instrument, matching drawKeySignature() positions
  // Preview uses LS=14 vs game LINE_SPACING=18; x anchor is staffLeft+54 (≈ clefX+64 equivalent)
  ctx.save();
  ctx.fillStyle = '#ffe066';
  ctx.font = `bold ${LS * 1.9}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  const kx = staffLeft + 54; // base x for first sharp
  const _previewKeySig = (_previewLevelSet[currentLevel] && _previewLevelSet[currentLevel].keySig) || 'D';
  if (_previewKeySig === 'C') {
    // C major — no sharps or flats
  } else if (selectedInstrument === 'Baritone') {
    // Bass clef flat key signatures for Baritone
    if (_previewKeySig === 'Bb') {
      ctx.fillText('♭', kx,      psl[3] + LS * 0.75 - 5); // Bb
      ctx.fillText('♭', kx + 14, psl[1] + LS * 0.75); // Eb
    } else if (_previewKeySig === 'Eb') {
      ctx.fillText('♭', kx,      psl[3] + LS * 0.75 - 5); // Bb (B2, 2nd line)
      ctx.fillText('♭', kx + 14, psl[1] + LS * 0.75); // Eb (4th line)
      ctx.fillText('♭', kx + 28, psl[3] - LS * 0.25 - 10); // Ab (space above Bb)
    } else if (_previewKeySig === 'F') {
      ctx.fillText('♭', kx,      psl[3] + LS * 0.75 - 5); // Bb
    }
  } else if (_previewKeySig === 'Eb') {
    ctx.fillText('♭', kx,      psl[2] + LS * 0.75 - 5); // Bb (B4, 3rd line)
    ctx.fillText('♭', kx + 14, psl[0] + LS * 0.5);  // Eb (top space)
    ctx.fillText('♭', kx + 28, psl[3] + LS * 0.75 - 10); // Ab (G4, 2nd line)
  } else if (_previewKeySig === 'Bb') {
    ctx.fillText('♭', kx,      psl[2] + LS * 0.75 - 5); // Bb on middle line (treble)
    ctx.fillText('♭', kx + 14, psl[0] + LS * 0.75); // Eb on top space (treble)
  } else if (_previewKeySig === 'F') {
    // F major treble clef — one flat (Bb) on middle line
    ctx.fillText('♭', kx,      psl[2] + LS * 0.75 - 5); // Bb
  } else if (selectedInstrument === 'Viola') {
    ctx.fillText('♯', kx,      psl[0] + LS * 0.9);
    if (_previewKeySig === 'A') {
      ctx.fillText('♯', kx + 14, psl[2] - LS * 0.1 + LS * 0.6); // C#
      ctx.fillText('♯', kx + 28, psl[1] + LS * 0.5 - 20);       // G#
    } else if (_previewKeySig !== 'G') {
      ctx.fillText('♯', kx + 14, psl[2] - LS * 0.1 + LS * 0.6); // C#
    }
  } else if (selectedInstrument === 'Cello' || selectedInstrument === 'Bass' || selectedInstrument === 'Baritone' || selectedInstrument === 'Trombone') {
    if (_previewKeySig === 'Bb') {
      ctx.fillText('♭', kx,      psl[3] + LS * 0.75 - 5); // Bb
      ctx.fillText('♭', kx + 14, psl[1] + LS * 0.75); // Eb
    } else if (_previewKeySig === 'Eb') {
      ctx.fillText('♭', kx,      psl[3] + LS * 0.75 - 5); // Bb
      ctx.fillText('♭', kx + 14, psl[1] + LS * 0.75); // Eb
      ctx.fillText('♭', kx + 28, psl[3] + LS * 0.25 - 10); // Ab
    } else if (_previewKeySig === 'F') {
      ctx.fillText('♭', kx,      psl[3] + LS * 0.75 - 5); // Bb
    } else if (_previewKeySig === 'A') {
      ctx.fillText('♯', kx,      psl[1] + LS * 0.57);       // F#
      ctx.fillText('♯', kx + 15, psl[2] + LS * 0.9);        // C#
      ctx.fillText('♯', kx + 30, psl[2] + LS * 0.2);        // G#
    } else {
      ctx.fillText('♯', kx,      psl[1] + LS * 0.57); // F# always
      if (_previewKeySig !== 'G') ctx.fillText('♯', kx + 15, psl[2] + LS * 0.9); // C# only D major
    }
  } else if (_previewKeySig === 'A') {
    ctx.fillText('♯', kx,      psl[0] + LS * 0.4);        // F#
    ctx.fillText('♯', kx + 14, psl[2] - LS * 0.6 + LS * 0.6); // C#
    ctx.fillText('♯', kx + 28, psl[1] + LS * 0.4);        // G#
  } else {
    ctx.fillText('♯', kx,      psl[0] + LS * 0.4);
    if (_previewKeySig !== 'G') ctx.fillText('♯', kx + 14, psl[2] - LS * 0.6 + LS * 0.6);
  }
  ctx.restore();

  // Notes for this level — use positions already calculated above
  const levelSet2 = _previewLevelSet;
  const levelPitches = _previewPitches;
  const NOTE_GAP = _previewNoteGap;
  const notesStartX = _previewNotesStartX;

  levelPitches.forEach((pitch, i) => {
    const nx = notesStartX + i * NOTE_GAP;
    const sp = _previewStaffPos[i] || pitch;

    // Ledger lines BELOW alto staff for viola level 6 in preview
    if (selectedInstrument === 'Viola') {

    }

    // Ledger lines for alto clef notes above the staff in preview

      }
      if (sp === 'C5') {
        const ly = psl[0] - LS;
        ctx.beginPath(); ctx.moveTo(nx - 10, ly); ctx.lineTo(nx + 10, ly); ctx.stroke();
      }
      if (sp === 'D5') {
        [psl[0] - LS, psl[0] - LS * 2].forEach(ly => {
          ctx.beginPath(); ctx.moveTo(nx - 10, ly); ctx.lineTo(nx + 10, ly); ctx.stroke();
        });
      }
    }
    // Ledger lines above staff for flute (Ab5, Bb5) and violin (A5)
    if (selectedInstrument === 'Violin') {
      ctx.strokeStyle = '#ffe066';
      ctx.lineWidth = 1;
      if (['Ab5','Bb5','A5','G#5'].includes(pitch) || ['A5'].includes(sp)) {
        const ly = psl[0] - LS;

    }

    // Ledger lines below staff for violin level 4 (G3, A3, B3, C4)
    if (selectedInstrument === 'Violin' || selectedInstrument === null || (!['Viola','Cello','Bass'].includes(selectedInstrument))) {
      ctx.strokeStyle = '#ffe066';

        ctx.beginPath(); ctx.moveTo(nx - 10, pBottomLine + LS); ctx.lineTo(nx + 10, pBottomLine + LS); ctx.stroke();
      }
      if (sp === 'A3' || sp === 'G3') {
        ctx.beginPath(); ctx.moveTo(nx - 10, pBottomLine + LS); ctx.lineTo(nx + 10, pBottomLine + LS); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(nx - 10, pBottomLine + LS * 2); ctx.lineTo(nx + 10, pBottomLine + LS * 2); ctx.stroke();
      }
    }

    // Ledger lines BELOW bass staff for cello/bass level 6 in preview
    if (selectedInstrument === 'Cello' || selectedInstrument === 'Bass') {
      ctx.strokeStyle = '#ffe066';
      ctx.lineWidth = 1;
      if (sp === 'E2' || sp === 'D2') {
        ctx.beginPath(); ctx.moveTo(nx - 10, psl[4] + LS); ctx.lineTo(nx + 10, psl[4] + LS); ctx.stroke();
      }
      if (sp === 'C2') {
        ctx.beginPath(); ctx.moveTo(nx - 10, psl[4] + LS); ctx.lineTo(nx + 10, psl[4] + LS); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(nx - 10, psl[4] + LS * 2); ctx.lineTo(nx + 10, psl[4] + LS * 2); ctx.stroke();
      }
    }

    // Ledger lines for bass clef notes above the staff in preview
    if (selectedInstrument === 'Cello' || selectedInstrument === 'Bass') {
      ctx.strokeStyle = '#ffe066';
      ctx.lineWidth = 1;
      if (pitch === 'C4' || pitch === 'D4') {

        ctx.beginPath(); ctx.moveTo(nx - 10, ly); ctx.lineTo(nx + 10, ly); ctx.stroke();
      }
    }

    // Notehead
    ctx.save();
    ctx.fillStyle = '#ffe066';
    ctx.strokeStyle = '#cc9900';
    ctx.lineWidth = 1;
    ctx.translate(nx, ny);

    ctx.textAlign = 'center';
    ctx.fillText(getPitchDisplay(pitch), nx, Math.max(psl[4], ny) + LS * 1.8);
  });

  // Double bar at right end
  ctx.save();
  ctx.strokeStyle = '#ffe066';
  const dbx = staffRight - 6;
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(dbx, psl[0]); ctx.lineTo(dbx, psl[4]); ctx.stroke();

  // START button — centred, top row
  const sbW = 200, sbH = 42, sbY = H - 100;
  drawNesButton('START', W / 2 - sbW / 2, sbY, sbW, sbH, hoveredBtn === 'START', false);

  // OTHER LEVELS + BACK buttons — equal width, bottom row

  previewBackBtn = { x: bkX, y: rowY, w: rowBtnW, h: rowBtnH };



  // MIDI status indicator for Piano
  if (selectedInstrument === 'Piano') {
    const midiCol = midiStatus === 'granted' ? '#44ff88' :
                    midiStatus === 'denied'   ? '#ff4444' :
                    midiStatus === 'unavailable' ? '#ff8844' : '#aaddff';

                    midiStatus === 'unavailable'  ? '⚠ MIDI NOT SUPPORTED IN THIS BROWSER' :

                    'MIDI KEYBOARD OPTIONAL — CLICK ALLOW IF PROMPTED';

    ctx.font = '6px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.fillText(midiMsg, W / 2, sbY + sbH + rowBtnH + 38);
  }

  // ── Secret level-jump panel (Shift+Cmd+L) ──────────────────────────────────
  if (devMenuOpen) {
    const activeLevels = getLevelSet();
    const levelNums = Object.keys(activeLevels).map(Number);
    const dbW = 60, dbH = 28, dbGap = 10;
    const totalDbW = levelNums.length * dbW + (levelNums.length - 1) * dbGap;

    // Panel background
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(dbStartX - 14, dbY - 10, totalDbW + 28, dbH + 28);
    ctx.strokeStyle = '#ff44bb';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(dbStartX - 14, dbY - 10, totalDbW + 28, dbH + 28);

    // Label
    ctx.fillStyle = '#ff44bb';
    ctx.font = '6px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.fillText('DEV: JUMP TO LEVEL', W / 2, dbY + dbH + 14);
    ctx.restore();

    devLevelBtns = [];
    levelNums.forEach((lvl, i) => {
      const bx = dbStartX + i * (dbW + dbGap);
      const hov = hoveredBtn === `DEV_LVL_${lvl}`;
      const sel = lvl === currentLevel;
      drawNesButton(`L${lvl}`, bx, dbY, dbW, dbH, hov, sel);
      devLevelBtns.push({ level: lvl, x: bx, y: dbY, w: dbW, h: dbH });
    });
  }
}
function lerp(a, b, t) { return a + (b - a) * t; }
function easeInOut(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }

// Parabolic arc between two points
function arcY(startY, endY, t, arcHeight) {
  const base = lerp(startY, endY, t);
  return base - arcHeight * Math.sin(Math.PI * t);
}

// ─── UC BEAT GAME OVERLAY ────────────────────────────────────────────────────
function drawBeatGameOverlay() {
  const t = ucBeatAnimT;
  const fadeIn = Math.min(1, t * 1.5);

  // Dark overlay
  ctx.fillStyle = `rgba(0,0,10,${0.88 * fadeIn})`;
  ctx.fillRect(0, 0, W, H);

  // Spinning star burst
  ctx.save();
  ctx.translate(W / 2, H / 2 - 60);
  const rays = 16;
  for (let i = 0; i < rays; i++) {
    const angle = (i / rays) * Math.PI * 2 + t * 0.5;
    const len = 60 + 20 * Math.sin(t * 3 + i);
    const grad = ctx.createLinearGradient(0, 0, Math.cos(angle)*len, Math.sin(angle)*len);
    grad.addColorStop(0, `rgba(255,224,102,${fadeIn})`);
    grad.addColorStop(1, `rgba(255,224,102,0)`);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(Math.cos(angle) * 30, Math.sin(angle) * 30);
    ctx.lineTo(Math.cos(angle) * len, Math.sin(angle) * len);
    ctx.stroke();
  }

  // Trophy emoji substitute — big star shape in canvas
  const s = 24 + 4 * Math.sin(t * 2);
  ctx.fillStyle = `rgba(255,224,102,${fadeIn})`;
  ctx.font = `${s}px "Press Start 2P"`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('★', 0, 0);
  ctx.restore();

  // Title text with bounce-in scale
  const scale = Math.min(1, t * 2.5);
  ctx.save();
  ctx.translate(W / 2, H / 2 - 10);
  ctx.scale(scale, scale);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = `rgba(255,224,102,${fadeIn})`;
  ctx.font = '20px "Press Start 2P"';
  ctx.fillText('YOU BEAT', 0, -16);
  ctx.fillText('THE GAME!', 0, 12);
  ctx.restore();

  if (t > 0.5) {
    const a2 = Math.min(1, (t - 0.5) * 2);
    ctx.fillStyle = `rgba(170,255,170,${a2})`;
    ctx.font = '9px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`FINAL SCORE: ${score}`, W / 2, H / 2 + 46);
    ctx.fillStyle = `rgba(170,221,255,${a2})`;
    ctx.font = '7px "Press Start 2P"';
    ctx.fillText(`TIME: ${formatTime(finalTime)}`, W / 2, H / 2 + 66);
  }

  // "Play again" blink after 3s
  if (t > 3) {
    const blinkOn = Math.floor(t * 2) % 2 === 0;
    if (blinkOn) {
      ctx.fillStyle = '#fff';
      ctx.font = '7px "Press Start 2P"';
      ctx.textAlign = 'center';
      ctx.fillText('PRESS ENTER OR CLICK TO PLAY AGAIN', W / 2, H - 30);
    }
  }
}

// ─── GAME LOOP ────────────────────────────────────────────────────────────────
let lastTime = 0;

function update(dt) {
  if (gameState !== 'playing') return;
  if (gameOver || (levelComplete && !ucBeatGame)) return;

  // ── Count-in: Ready / Go ──────────────────────────────────────────────────
  if (countIn) {
    const BEAT_DUR = 60 / BPM; // one quarter-note beat = ~0.714s
    const ac = getAudioCtx();
    const elapsed = ac.currentTime - countInStartTime;
    const newBeat = Math.floor(elapsed / BEAT_DUR) + 1; // beat 1, 2, 3...
    if (newBeat !== countInBeat) {
      countInBeat = newBeat;
    }
    if (elapsed >= BEAT_DUR * 2) {
      // Two beats done — unlock
      countIn = false;
    }
    return; // don't tick timer or update hero during count-in
  }

  elapsedTime += dt;

  if (hero.state === 'flip') {
    hero.flipT += dt * 1.1;  // ~0.9s total flip
    if (hero.flipT >= 1) {
      hero.flipT = 1;
      hero.state = 'idle';
      hero.x = hero.flipStartX;
      hero.y = hero.flipStartY;
      if (!ucBeatGame) {
        finalTime = elapsedTime;
        levelComplete = true;
        stopBackingTrack();
        autoSubmitScore();
        // Both UC and regular levels use canvas score cards now
      }
      // ucBeatGame: flip already stopped backing track; beatAnim takes over
    }
  }

  if (hero.state === 'bounce') {
    hero.bounceT += dt * 1.4; // speed of bounce
    if (hero.bounceT >= 1) {
      hero.bounceT = 1;
      hero.state = 'idle';
      hero.frame = 0;
      // Snap to position above next note
      const targetNote = hero.bounceTarget;
      hero.x = targetNote.x;
      hero.y = heroLandingY(targetNote) - HERO_H - HERO_GAP;
    }
    const t = easeInOut(hero.bounceT);
    hero.x = lerp(hero.bounceStartX, hero.bounceTarget.x, t);
    hero.y = arcY(hero.bounceStartY, heroLandingY(hero.bounceTarget) - HERO_H - HERO_GAP, hero.bounceT, 45);

    // Walk frame animation
    hero.frameTimer += dt;
    if (hero.frameTimer > 0.15) {
      hero.frame = 1 - hero.frame;
      hero.frameTimer = 0;
    }
  }

  // Shake runs independently — can overlap with bounce
  if (hero.shakeTimer > 0) {
    hero.shakeTimer -= dt;
    hero.shakeX = Math.sin(hero.shakeTimer * 60) * 5;
    if (hero.shakeTimer <= 0) {
      if (hero.state === 'shake') hero.state = 'idle';
      hero.shakeX = 0;
    }
  }

  // Camera: smoothly follow hero
  const targetCam = hero.x - W * 0.35;
  camera = lerp(camera, Math.max(0, targetCam), dt * 6);

  // UC pending key sig crossing check
  if (ucActive && ucPendingKeySig && !ucPendingKeySig.crossed && hero.x >= ucPendingKeySig.worldX) {
    ucPendingKeySig.crossed = true;
    ucDisplayStageIdx = ucPendingKeySig.nextStageIdx; // display catches up to generation
    currentBackingFreqs = getBackingFreqs();
    // Fire label — KEY CHANGE or NEW RANGE depending on key sig
    floatingLabels.push({
      x: hero.x, y: hero.y - 40,
      text: ucPendingKeySig.isKeyChange ? 'KEY CHANGE!' : 'NEW RANGE!',
      color: ucPendingKeySig.isKeyChange ? '#44ffff' : '#ffe066',
      vx: 0, vy: -60, life: 2.0,
    });
  }

  // UC beat-game animation tick
  if (ucBeatGame && hero.state === 'idle') ucBeatAnimT += dt;

  // Particles
  updateParticles(dt);
}


function draw(dt) { 
  // 2. Add the reset to stop the text from shifting
  ctx.setTransform(1, 0, 0, 1, 0, 0);

  if (gameState === 'title') { drawTitleScreen(); return; }
  if (gameState === 'octaveSelect') { drawOctaveSelectScreen(); return; }
  if (gameState === 'levelSelect') { drawLevelSelectScreen(); return; }
  if (gameState === 'levelPreview') { drawLevelPreviewScreen(); return; }

  // ── playing ──
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);

  // Staff lines (end at double bar)
  drawStaff(camera);

  // Clef (pinned to left once scrolling begins)
  const clefX = Math.max(8, 16 - camera);
  drawClef(clefX);

  // Key signature
  drawKeySignature(clefX + 64);

  // Notes
  for (const note of notes) {
    drawNote(note, camera);
  }

  // Double bar line (non-UC only — UC has no end bar)
  drawDoubleBarLine(camera);

  // UC scrolling key change: double bar + new key sig
  if (ucActive && ucPendingKeySig) {
    const barSx    = ucPendingKeySig.barX   - camera;
    const keySigSx = ucPendingKeySig.worldX - camera;
    // Clear once it has scrolled fully off the left edge of the screen
    if (keySigSx < -80) {
      ucPendingKeySig = null; // now fully off-screen; pinned key sig takes over
    } else if (barSx < W + 60) {
      // Double bar line — two equal-weight thin lines
      ctx.save();
      ctx.strokeStyle = '#ffe066';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(barSx,     staffLines[0]); ctx.lineTo(barSx,     staffLines[4]); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(barSx + 6, staffLines[0]); ctx.lineTo(barSx + 6, staffLines[4]); ctx.stroke();
      ctx.restore();

      // Only draw new key sig if the key actually changes
      if (ucPendingKeySig.isKeyChange) {
        drawKeySignatureForKeySig(keySigSx, ucPendingKeySig.keySig);
      }
    }
  }

  // Particles and Bouncing Labels
  drawParticles(camera);
  updateAndDrawLabels(dt, camera); // Now works because dt is defined in the header

  // Hero
  {
    const hsx = hero.x - camera + hero.shakeX - HERO_W;
    let hsy = hero.y;
    const sprite = hero.state === 'bounce' && hero.frame === 1 ? SPRITE_WALK : SPRITE_IDLE;
    const spriteW = sprite[0].length * PX;
    const spriteH = sprite.length * PX;

    if (hero.state === 'flip') {
      const ft = hero.flipT;
      hsy = hero.flipStartY - Math.sin(Math.PI * ft) * 70;
      const angle = ft * Math.PI * 2;
      ctx.save();
      ctx.translate(hsx + spriteW / 2, hsy + spriteH / 2);
      ctx.rotate(angle);
      drawSprite(sprite, -spriteW / 2, -spriteH / 2, false);
      ctx.restore();
    } else {
      drawSprite(sprite, hsx, hsy, false);
    }
  }
  
  // HUD
  drawHUD();

  // UC Score Card overlay
  if (ucScoreCard) { drawUcScoreCard(); }
  // UC Beat-Game overlay
  if (ucBeatGame && hero.state === 'idle') {
    drawBeatGameOverlay();
  }

  // Count-in overlay
  if (countIn && countInBeat >= 1) {
    const label = countInBeat === 1 ? 'READY' : 'GO!';
    const color = countInBeat === 1 ? '#ffe066' : '#44ff88';
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Pulsing scale: starts big, shrinks as the beat ages
    const BEAT_DUR = 60 / BPM;
    const ac = getAudioCtx();
    const beatAge = (ac.currentTime - countInStartTime) % BEAT_DUR; // 0..BEAT_DUR
    const scale = 1.4 - 0.4 * (beatAge / BEAT_DUR); // 1.4 → 1.0 over the beat
    ctx.translate(W / 2, H / 2);
    ctx.scale(scale, scale);
    ctx.fillStyle = color;
    ctx.font = '36px "Press Start 2P"';
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillText(label, 3, 3);
    ctx.fillStyle = color;
    ctx.fillText(label, 0, 0);
    ctx.restore();
  }

  // Game Over / Level Complete overlays
  if (gameOver && !ucScoreCard) {
    // Non-UC game over — canvas overlay with retry/menu
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ff4444';
    ctx.font = '20px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 36);
    ctx.font = '8px "Press Start 2P"';
    ctx.fillStyle = '#fff';
    ctx.fillText(`SCORE:  ${score}`, W / 2, H / 2 - 2);
    ctx.fillStyle = '#aaffaa';
    ctx.fillText(`TIME:   ${formatTime(finalTime)}`, W / 2, H / 2 + 18);
    const goBtnW = 160, goBtnH = 38, goBtnGap = 24;
    const goTotalW = goBtnW * 2 + goBtnGap;
    const goBtnY = H / 2 + 40;
    const retryX = W / 2 - goTotalW / 2;
    const goMenuX = retryX + goBtnW + goBtnGap;
    drawNesButton('RETRY', retryX, goBtnY, goBtnW, goBtnH, hoveredBtn === 'RETRY', false);
    retryBtn = { x: retryX, y: goBtnY, w: goBtnW, h: goBtnH };
    drawNesButton('DASHBOARD', goMenuX, goBtnY, goBtnW, goBtnH, hoveredBtn === 'MENU_GO', false);
    goMenuBtn = { x: goMenuX, y: goBtnY, w: goBtnW, h: goBtnH };
  }

  if (levelComplete) {
    // Canvas score card for regular level complete
    ctx.fillStyle = 'rgba(0,0,10,0.92)';
    ctx.fillRect(0, 0, W, H);

    const cW = 500, cH = 360;
    const cX = W/2 - cW/2, cY = H/2 - cH/2;
    ctx.fillStyle = '#000';
    ctx.fillRect(cX+4, cY+4, cW, cH);
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(cX, cY, cW, cH);
    ctx.strokeStyle = '#44ff88';
    ctx.lineWidth = 2;
    ctx.strokeRect(cX, cY, cW, cH);

    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

    // Title
    ctx.fillStyle = '#44ff88';
    ctx.font = '14px "Press Start 2P"';
    ctx.fillText('LEVEL CLEAR!', W/2, cY + 32);

    // Score + time
    ctx.fillStyle = '#fff';
    ctx.font = '11px "Press Start 2P"';
    ctx.fillText('SCORE: ' + score, W/2, cY + 64);
    ctx.fillStyle = '#aaffaa';
    ctx.font = '8px "Press Start 2P"';
    ctx.fillText('TIME: ' + formatTime(finalTime), W/2, cY + 88);

    // Instrument + level
    ctx.fillStyle = '#aaddff';
    ctx.font = '7px "Press Start 2P"';
    ctx.fillText(selectedInstrument.toUpperCase() + '  ·  LEVEL ' + currentLevel, W/2, cY + 110);

    // Divider
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cX+20, cY+124); ctx.lineTo(cX+cW-20, cY+124); ctx.stroke();

    // Auto-submit status
    const scol = scoreSubmitStatus === 'saved' ? '#44ff88' : scoreSubmitStatus === 'error' ? '#ff4444' : '#aaddff';
    ctx.fillStyle = scol; ctx.font = '7px "Press Start 2P"';
    ctx.fillText(
      scoreSubmitStatus === 'saving' ? 'SAVING...' :
      scoreSubmitStatus === 'saved'  ? 'SCORE SAVED!' :
      scoreSubmitStatus === 'error'  ? 'SAVE FAILED' : '',
      W/2, cY + 148);

    // Buttons: MENU  NEXT LEVEL
    const activeLevels = getLevelSet();
    const hasNextLevel = activeLevels[currentLevel + 1] !== undefined;
    const btnW2 = 160, btnH2 = 32, btnGap2 = 12;
    const numB = hasNextLevel ? 2 : 1;
    const totalBW2 = numB * btnW2 + (numB-1) * btnGap2;
    const btnStartX2 = W/2 - totalBW2/2;
    const btnY2 = cY + cH - 48;

    let bx2 = btnStartX2;
    drawNesButton('DASHBOARD', bx2, btnY2, btnW2, btnH2, hoveredBtn === 'LVL_MENU', false);
    lvlCardMenuBtn = { x: bx2, y: btnY2, w: btnW2, h: btnH2 };
    bx2 += btnW2 + btnGap2;

    if (hasNextLevel) {
      drawNesButton('NEXT LEVEL', bx2, btnY2, btnW2, btnH2, hoveredBtn === 'LVL_NEXT', false);
      lvlCardNextBtn = { x: bx2, y: btnY2, w: btnW2, h: btnH2, enabled: true };
    } else {
      lvlCardNextBtn = null;
    }
  }
}

function gameLoop(now) {
  // Calculate the time difference in seconds
  const dt = Math.min(0.1, (now - lastTime) / 1000);
  lastTime = now;

  update(dt);
  draw(dt); // Pass dt to draw so labels and particles can move

  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);

// Mouse helpers
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY,
  };
}

function hitTest(pos, btn) {
  return pos.x >= btn.x && pos.x <= btn.x + btn.w &&
         pos.y >= btn.y && pos.y <= btn.y + btn.h;
}

canvas.addEventListener('mousemove', (e) => {
  const pos = getCanvasPos(e);
  hoveredBtn = null;
  if (gameState === 'title') {
    if (settingsBtn && hitTest(pos, settingsBtn)) { hoveredBtn = 'SETTINGS'; }
    for (const btn of instrBtns) {
      if (hitTest(pos, btn)) { hoveredBtn = btn.label; break; }
    }
  } else if (gameState === 'octaveSelect') {
    if (octaveHighBtn && hitTest(pos, octaveHighBtn)) hoveredBtn = 'OCTAVE_HIGH';
    if (octaveLowBtn  && hitTest(pos, octaveLowBtn))  hoveredBtn = 'OCTAVE_LOW';
    if (octaveBackBtn && hitTest(pos, octaveBackBtn))  hoveredBtn = 'OCTAVE_BACK';
  } else if (gameState === 'levelSelect') {
    for (const btn of levelSelectBtns) {
      if (hitTest(pos, btn)) {
        if (!btn.locked) hoveredBtn = btn.level === UC_LEVEL ? 'UC' : `LVLSEL_${btn.level}`;
        break;
      }
    }
    if (levelSelectBackBtn && hitTest(pos, levelSelectBackBtn)) hoveredBtn = 'LVLSEL_BACK';
  } else if (gameState === 'levelPreview') {
    if (devMenuOpen) {
      for (const btn of devLevelBtns) {
        if (hitTest(pos, btn)) { hoveredBtn = `DEV_LVL_${btn.level}`; break; }
      }
    }
    if (startBtn && hitTest(pos, startBtn)) hoveredBtn = 'START';
    if (otherLevelsBtn && hitTest(pos, otherLevelsBtn)) hoveredBtn = 'OTHER_LEVELS';
    if (previewBackBtn && hitTest(pos, previewBackBtn)) hoveredBtn = 'PREVIEW_BACK';
  } else if (gameState === 'playing') {
    if (gameOver) {
      if (retryBtn && hitTest(pos, retryBtn)) hoveredBtn = 'RETRY';
      else if (goMenuBtn && hitTest(pos, goMenuBtn)) hoveredBtn = 'MENU_GO';
    } else if (levelComplete) {
      if (menuBtn && hitTest(pos, menuBtn)) hoveredBtn = 'MENU';
      else if (nextLevelBtn && nextLevelBtn.enabled && hitTest(pos, nextLevelBtn)) hoveredBtn = 'NEXT';
    } else {
      if (inGameMenuBtn && hitTest(pos, inGameMenuBtn)) { hoveredBtn = 'MENU_INGAME'; }
      else {
        for (const btn of noteBtns) {
          if (hitTestCircle(pos, btn)) { hoveredBtn = `NOTE_${btn.pitch}`; break; }
        }
      }
    }
  }
  canvas.style.cursor = hoveredBtn ? 'pointer' : 'default';
});

canvas.addEventListener('click', (e) => {
  const pos = getCanvasPos(e);

  // UC score card clicks
  if (ucScoreCard) {
    if (ucScoreCardRetryBtn && hitTest(pos, ucScoreCardRetryBtn)) {
      ucScoreCard = false;
      gameOver = false; score = 0;
      startPlaying();
      hoveredBtn = null; return;
    }
    if (ucScoreCardMenuBtn && hitTest(pos, ucScoreCardMenuBtn)) {
      window.location.href = 'dashboard.html';
      return;
    }
    return; // block other clicks while card is showing
  }
  // UC beat-game dismiss
  if (ucBeatGame && ucBeatAnimT > 3 && gameState === 'playing') {
    ucActive = false; ucBeatGame = false;
    score = 0; gameState = 'title';
    return;
  }

  if (gameState === 'title') {
    ucActive = false; // reset UC on return to title
    if (settingsBtn && hitTest(pos, settingsBtn)) { openSettings(); return; }
    for (const btn of instrBtns) {
      if (hitTest(pos, btn)) {
        if (['Violin','Viola','Cello','Bass','Flute','Clarinet','Trumpet','Baritone','Alto Sax','Trombone','Mallet Perc','Piano'].includes(btn.label)) {
          selectedInstrument = btn.label;
          currentLevel = 1;
          // Pre-request MIDI access when Piano is selected
          if (btn.label === 'Piano' && midiStatus === 'idle') requestMidiAccess();
          if (btn.label === 'Mallet Perc') {
            gameState = 'octaveSelect';
          } else {
            gameState = 'levelPreview';
          }
          hoveredBtn = null;
        }
        return;
      }
    }
  } else if (gameState === 'octaveSelect') {
    if (octaveHighBtn && hitTest(pos, octaveHighBtn)) {
      malletOctave = 'high'; gameState = 'levelPreview'; hoveredBtn = null; return;
    }
    if (octaveLowBtn && hitTest(pos, octaveLowBtn)) {
      malletOctave = 'low'; gameState = 'levelPreview'; hoveredBtn = null; return;
    }
    if (octaveBackBtn && hitTest(pos, octaveBackBtn)) { gameState = 'title'; hoveredBtn = null; return; }
  } else if (gameState === 'levelSelect') {
    if (levelSelectBackBtn && hitTest(pos, levelSelectBackBtn)) {
      if (_urlMenu) { window.location.href = 'dashboard.html'; return; }
      gameState = 'title';
      hoveredBtn = null;
      return;
    }
    for (const btn of levelSelectBtns) {
      if (hitTest(pos, btn)) {
        if (btn.locked) { hoveredBtn = null; return; } // locked — ignore click
        if (btn.level === UC_LEVEL) {
          ucActive = true;
          currentLevel = 1;
          gameState = 'playing';
          score = 0;
          startPlaying();
        } else {
          ucActive = false;
          currentLevel = btn.level;
          gameState = 'levelPreview';
        }
        hoveredBtn = null;
        return;
      }
    }
  } else if (gameState === 'levelPreview') {
    if (devMenuOpen) {
      for (const btn of devLevelBtns) {
        if (hitTest(pos, btn)) {
          currentLevel = btn.level;
          devMenuOpen = false;
          hoveredBtn = null;
          return;
        }
      }
    }
    if (startBtn && hitTest(pos, startBtn)) startPlaying();
    if (otherLevelsBtn && hitTest(pos, otherLevelsBtn)) {
      gameState = 'levelSelect';
      hoveredBtn = null;
    }
    if (previewBackBtn && hitTest(pos, previewBackBtn)) {
      window.location.href = 'dashboard.html';
    }
  } else if (gameState === 'playing') {
    if (gameOver) {
      if (retryBtn && hitTest(pos, retryBtn)) {
        if (ucActive) {
          // UC retry: restart UC from scratch
          score = 0;
          startPlaying();
        } else {
          resetGame();
        }
        hoveredBtn = null;
        return;
      }
      if (goMenuBtn && hitTest(pos, goMenuBtn)) {
        window.location.href = 'dashboard.html';
        return;
      }
    } else if (levelComplete) {
      if (lvlCardMenuBtn && hitTest(pos, lvlCardMenuBtn)) {
        window.location.href = 'dashboard.html';
      } else if (lvlCardNextBtn && lvlCardNextBtn.enabled && hitTest(pos, lvlCardNextBtn)) {
        currentLevel++;
        levelComplete = false;
        scoreSubmitStatus = 'idle';
        gameState = 'levelPreview'; hoveredBtn = null;
      }
    } else {
      if (inGameMenuBtn && hitTest(pos, inGameMenuBtn)) {
        if (ucActive) {
          stopBackingTrack();
          ucScoreCard = true;
        } else {
          stopBackingTrack();
          window.location.href = 'dashboard.html';
        }
        hoveredBtn = null;
        return;
      }
      if (selectedInstrument === 'Piano') {
        const pp = hitTestPiano(pos);
        if (pp) { handlePitchInput(pp); return; }
      } else {
        for (const btn of noteBtns) {
          if (hitTestCircle(pos, btn)) { handlePitchInput(btn.pitch); return; }
        }
      }
    }
  }
});

// Touch support for note buttons (prevents 300ms click delay on Chromebooks)
canvas.addEventListener('touchstart', (e) => {
  if (gameState !== 'playing' || levelComplete || countIn || gameOver) return;
  e.preventDefault();
  const touch = e.changedTouches[0];
  const pos = getCanvasPos(touch);
  if (selectedInstrument === 'Piano') {
    const pp = hitTestPiano(pos);
    if (pp) { handlePitchInput(pp); return; }
  } else {
    for (const btn of noteBtns) {
      if (hitTestCircle(pos, btn)) { handlePitchInput(btn.pitch); return; }
    }
  }
}, { passive: false });

// ─── NOTE INPUT HANDLER (keyboard + buttons share this) ───────────────────────

// Called by keyboard — matches on letter only (D accepts both D4 and D5)
function handleNoteInput(key) {
  if (gameState !== 'playing') return;
  if (gameOver || levelComplete) return;
  if (countIn) return;
  if (hero.state !== 'idle' && hero.state !== 'bounce') return;
  if (currentNoteIdx >= notes.length) return;

  const currentNote = notes[currentNoteIdx];
  const correct = key.toUpperCase() === currentNote.name[0]; // keyboard: match base letter only
  resolveInput(correct, currentNote);
}

// Called by on-screen buttons — matches on full pitch (D4 ≠ D5)
function handlePitchInput(pitch) {
  if (gameState !== 'playing') return;
  if (gameOver || levelComplete) return;
  if (countIn) return;
  if (hero.state !== 'idle' && hero.state !== 'bounce') return;
  if (currentNoteIdx >= notes.length) return;

  const currentNote = notes[currentNoteIdx];
  const correct = pitch === currentNote.pitch;
  resolveInput(correct, currentNote);
}

// Shared resolution logic
function resolveInput(correct, currentNote) {
  const bigHit = correct && isOnBeat();
  let labelText = "";
  let labelColor = "";

  if (correct) {
    if (inputMode === 'noteNames') playNoteSound(currentNote.pitch, bigHit);
    score += (bigHit ? 150 : 100);
    notesCorrect++;
    notesAttempted++;
    currentNote.answered = true;
    spawnExplosion(currentNote.x, currentNote.y, bigHit);

    labelText = bigHit ? "+150" : "+100";
    labelColor = bigHit ? "#fff" : "#ffe066";

    currentNoteIdx++;
    ucNoteCount++;

    // ── UC window tracking ──────────────────────────────────────────────
    if (ucActive) {
      ucWindow.push(true);
      if (ucWindow.length > UC_WINDOW_SIZE) ucWindow.shift();
      // Every UC_WINDOW_SIZE notes, check if we advance
      if (ucNoteCount % UC_WINDOW_SIZE === 0 && ucWindow.length === UC_WINDOW_SIZE) {
        const correctCount = ucWindow.filter(Boolean).length;
        if (correctCount >= UC_PASS_THRESHOLD && ucStageIdx < ucStages.length - 1) {
          // Don't advance ucStageIdx yet — place a scrolling key sig marker instead
          const nextStageIdx = ucStageIdx + 1;
          const newKeySig = getLevelSet()[ucStages[nextStageIdx]].keySig;
          // Place between the next note and the one after it
          // Place marker just off the right edge of the visible screen
          // camera ≈ hero.x - W*0.35, so right edge ≈ hero.x + W*0.65
          // Add one NOTE_SPACING so it appears just off the right edge
          // Compare key sigs BEFORE advancing ucStageIdx
          const currentKeySig = getLevelSet()[ucStages[ucStageIdx]].keySig;
          const isKeyChange = newKeySig !== currentKeySig;
          // Add extra spacing BEFORE computing positions so the first new note is already shifted
          if (isKeyChange) ucXOffset += NOTE_SPACING;
          // Now advance generation stage so new notes use the new key
          ucStageIdx = nextStageIdx;
          ucWindow = [];
          // The next note to be generated will be at index notes.length
          // Its world X = CLEF_WIDTH + 70 + notes.length * NOTE_SPACING + ucXOffset
          const nextNoteWorldX = CLEF_WIDTH + 70 + notes.length * NOTE_SPACING + ucXOffset;
          // Place the bar line just before that note
          const barX    = nextNoteWorldX - NOTE_SPACING * 0.5;
          const keySigX = barX + 18;
          ucPendingKeySig = {
            barX,
            worldX: keySigX,
            keySig: newKeySig,
            nextStageIdx,
            crossed: false,
            isKeyChange,
          };
        }
      }
      // Check beat-game condition
      if (score >= UC_TARGET && !ucBeatGame) {
        ucBeatGame = true;
        finalTime = elapsedTime;
        stopBackingTrack();
      }
      // Append next note for continuous play (unless beat game)
      if (!ucBeatGame) {
        const lastPitch = notes[notes.length - 1].pitch;
        notes.push(generateUcNote(lastPitch));
      }
    }

    const nextNote = notes[currentNoteIdx];
    if (nextNote && !ucBeatGame) {
      hero.state = 'bounce';
      hero.bounceStartX = hero.x;
      hero.bounceStartY = hero.y;
      hero.bounceTarget = nextNote;
      hero.bounceT = 0;
      hero.frameTimer = 0;
    } else if (!nextNote || ucBeatGame) {
      // Last note answered or beat game — do the victory flip
      hero.state = 'flip';
      hero.flipStartX = hero.x;
      hero.flipStartY = hero.y;
      hero.flipT = 0;
    }
  } else {
    if (ucActive) {
      ucWindow.push(false);
      if (ucWindow.length > UC_WINDOW_SIZE) ucWindow.shift();
    }
    hearts--;
    score = Math.max(0, score - 50); // Penalty logic
    notesAttempted++;
    missedNotes.push(currentNote.pitch);
    // Only switch to shake if not bouncing — if bouncing, shake runs alongside it
    if (hero.state !== 'bounce') hero.state = 'shake';
    hero.shakeTimer = 0.4;
    
    labelText = "-50";
    labelColor = "#ff4444";

    if (hearts <= 0) {
      gameOver = true;
      finalTime = elapsedTime;
      stopBackingTrack();
      if (ucActive) ucScoreCard = true;
      autoSubmitScore();
    }
  }

  // PUSH THE LABEL (This creates the animation object)
  floatingLabels.push({
    x: currentNote.x,
    y: currentNote.y - 20,
    text: labelText,
    color: labelColor,
    vx: (Math.random() - 0.5) * 100, // Random left/right burst
    vy: -200,                        // Initial jump up
    life: 1.0                        // Lasts 1 second
  });
}


window.addEventListener('keydown', (e) => {
  // UC score card — block keyboard input while showing
  if (ucScoreCard) { e.preventDefault(); return; }
  // Title screen
  if (gameState === 'title') {
    if (e.key === 'Enter' && selectedInstrument) gameState = 'levelPreview';
    return;
  }

  // Level select
  if (gameState === 'levelSelect') {
    if (e.key === 'Escape') { gameState = 'title'; return; }
    return;
  }

  // Level preview
  if (gameState === 'levelPreview') {
    // Secret dev shortcut: Shift+Cmd+L (or Shift+Ctrl+L on Windows)
    if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'L') {
      e.preventDefault();
      devMenuOpen = !devMenuOpen;
      return;
    }
    if (e.key === 'Escape' && devMenuOpen) { devMenuOpen = false; return; }
    if (e.key === 'Enter') startPlaying();
    return;
  }

  // Playing
  if (e.key === 'Enter') {
    if (gameOver) { resetGame(); return; }
    if (levelComplete) {
      const activeLevels = getLevelSet();
      if (activeLevels[currentLevel + 1]) { currentLevel++; scoreSubmitStatus = 'idle'; gameState = 'levelPreview'; }
      else { window.location.href = 'dashboard.html'; }
    }
    return;
  }

  if (gameOver || levelComplete || countIn) return;

  const key = e.key.toUpperCase();
  if (key.length !== 1 || key < 'A' || key > 'G') return;
  e.preventDefault();
  handleNoteInput(key);
});

// ─── START PLAYING ────────────────────────────────────────────────────────────
function startPlaying() {
  devMenuOpen = false;
  gameState = 'playing';
  hoveredBtn = null;
  canvas.style.cursor = 'default';
  resetGameState();
  // Request MIDI access for Piano
  if (selectedInstrument === 'Piano' && midiStatus === 'idle') {
    requestMidiAccess();
  }
  // Start backing track only in note-names mode
  startBackingTrack(); // plays pitched in noteNames mode, percussive click in mic mode
  countInStartTime = getAudioCtx().currentTime;
  countIn = true;
  countInBeat = 0;
}

// ─── RESET ────────────────────────────────────────────────────────────────────
function resetGameState() {
  stopBackingTrack();
  if (ucActive) {
    // UC mode: initialise stages, generate first 7 notes from stage 0
    ucStages = getUcStages();
    ucStageIdx = 0;
    ucDisplayStageIdx = 0;
    ucWindow = [];
    ucNoteCount = 0;
    ucBeatGame = false;
    ucBeatAnimT = 0;
    notes = [];
    let lastPitch = null;
    for (let i = 0; i < UC_WINDOW_SIZE; i++) {
      const n = generateUcNote(lastPitch);
      lastPitch = n.pitch;
      notes.push(n);
    }
    DOUBLE_BAR_X = Infinity; // no double bar in UC
  } else {
    notes = generateLevel();
  }
  currentNoteIdx = 0;
  camera = 0;
  hearts = 6;
  gameOver = false;
  levelComplete = false;
  missedNotes    = [];
  notesCorrect   = 0;
  notesAttempted = 0;
  scoreSubmitStatus = 'idle';
  countIn = true;
  countInBeat = 0;
  countInStartTime = 0;
  elapsedTime = 0;
  finalTime = 0;
  particles = [];
  if (!ucActive) DOUBLE_BAR_X = notes[notes.length - 1].x + NOTE_SPACING * 0.7;
  hero.x = notes[0].x;
  hero.y = heroLandingY(notes[0]) - HERO_H - HERO_GAP;
  hero.state = 'idle';
  hero.shakeX = 0;
  hero.frame = 0;
  hero.bounceT = 0;
  hero.flipT = 0;
}

function resetGame() {
  // After level complete/game over, go back to level preview
  gameState = 'levelPreview';
}

// Focus canvas on load
window.addEventListener('load', () => {
  canvas.focus();


  // Generate favicon from violin sprite
  const fav = document.createElement('canvas');
  fav.width = 32; fav.height = 32;
  const fctx = fav.getContext('2d');

  // Dark background
  fctx.fillStyle = '#0a0a1a';
  fctx.fillRect(0, 0, 32, 32);

  // Draw SPRITE_VIOLIN at 1px per cell, centred
  const FIC = {
    W: '#d4860a', D: '#8b4a00', L: '#f5c84a', N: '#c07020',
    G: '#cccccc', S: '#3a1a00', I: '#e8a030', C: '#222',
    B: '#f5f5dc', R: '#8b6914',
  };
  const cols = SPRITE_VIOLIN[0].length;
  const rows = SPRITE_VIOLIN.length;
  const px = 1;
  const offX = Math.floor((32 - cols * px) / 2);
  const offY = Math.floor((32 - rows * px) / 2);
  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const ch = SPRITE_VIOLIN[row][col];
      if (ch === '_') continue;
      fctx.fillStyle = FIC[ch] || '#fff';
      fctx.fillRect(offX + col * px, offY + row * px, px, px);
    }
  }

  const link = document.createElement('link');
  link.rel = 'icon';
  link.href = fav.toDataURL('image/png');
  document.head.appendChild(link);
});
</script>
</body>
</html>
