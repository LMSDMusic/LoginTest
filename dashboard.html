<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f0f4ff;
      --surface:    #ffffff;
      --blue:       #3b6ef8;
      --blue-dark:  #2a5ce0;
      --blue-light: #e8effe;
      --text:       #1a1f36;
      --muted:      #6b7280;
      --border:     #dde3f0;
      --radius:     14px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.5;
      pointer-events: none;
    }

    /* ── Layout ── */
    .shell {
      max-width: 680px;
      margin: 0 auto;
      padding: 2px 20px 60px;
      position: relative;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .greeting h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .greeting p {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 3px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--blue-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--blue);
      border: 1.5px solid var(--border);
      flex-shrink: 0;
      cursor: pointer;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* ── Up Next ── */
    .up-next {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      text-decoration: none;
    }

    .up-next:hover {
      border-color: var(--blue);
      box-shadow: 0 2px 12px rgba(59,110,248,0.10);
    }

    .up-next:active { transform: scale(0.99); }

    .up-next-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    .up-next-text { flex: 1; min-width: 0; }

    .up-next-text h3 {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .up-next-text p {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .up-next-btn {
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 8px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      pointer-events: none;
    }

    /* ── Module grid ── */
    .module-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }

    .module-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .module-card:hover {
      border-color: var(--blue);
      box-shadow: 0 2px 12px rgba(59,110,248,0.08);
    }

    .module-card:active { transform: scale(0.97); }

    .mod-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .card-title {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
    }

    .card-meta {
      font-size: 0.76rem;
      color: var(--muted);
    }

    .card-meta strong {
      color: var(--text);
      font-weight: 600;
    }

    /* ── Color themes for icons ── */
    .theme-blue   { background: #e8effe; } .theme-blue   .emoji { filter: none; }
    .theme-teal   { background: #e1f5ee; }
    .theme-purple { background: #eeedfe; }
    .theme-amber  { background: #faeeda; }
    .theme-coral  { background: #faece7; }
    .theme-green  { background: #eaf3de; }

    /* ── Loading skeletons ── */
    .skeleton {
      background: linear-gradient(90deg, #e8eeff 25%, #d8e4ff 50%, #e8eeff 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }

    @keyframes shimmer {
      from { background-position: 200% 0; }
      to   { background-position: -200% 0; }
    }

    .skeleton-upnext {
      height: 76px;
      border-radius: var(--radius);
      margin-bottom: 32px;
    }

    .skeleton-card {
      height: 110px;
      border-radius: var(--radius);
    }

    /* ── Error state ── */
    .error-box {
      background: #fff5f5;
      border: 1.5px solid #fed7d7;
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      color: #c53030;
      font-size: 0.88rem;
    }

    /* ── Sign out ── */
    .signout-btn {
      display: block;
      margin: 40px auto 0;
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      color: var(--muted);
      cursor: pointer;
      padding: 8px 16px;
    }

    .signout-btn:hover { color: var(--text); text-decoration: underline; }

  </style>
</head>

<body>
  <div class="shell">

    <!-- Top bar -->
    <div style="text-align:center;">
      <img src="logo.png" alt="Logo" style="height:288px;object-fit:contain;" />
    </div>
    <div class="topbar">
      <div class="greeting">
        <h1 id="greetingName">Loading…</h1>
        <p id="greetingMeta"></p>
      </div>
      <div class="avatar" id="avatarInitials" title="Sign out" onclick="signOut()"></div>
    </div>

    <!-- Up Next -->
    <div class="section-label">Up Next</div>
    <div id="upNextArea"></div>

    <!-- Modules -->
    <div class="section-label">All Modules</div>
    <div id="moduleGrid" class="module-grid"></div>

    <button class="signout-btn" onclick="signOut()">Sign out</button>
  </div>

  <script>
    // ── CONFIG ───────────────────────────────────────────────
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx_REo7dnRZo3fny_xv3uyhCUlImo4-4RM3x8W9Nu0JQHvBNv3HYRlzquLzm-PVCxzg/exec";
    // ─────────────────────────────────────────────────────────

    // Icon + color assigned by index so no sheet changes needed.
    // Add more entries here as you add more modules.
    const MODULE_THEMES = [
      { emoji: "♜",  color: "theme-blue"   },  // Staff Hero  → chess rook
      { emoji: "🥁", color: "theme-teal"   },  // Rhythm Tap  → drums
      { emoji: "🎵", color: "theme-purple" },  // Note ID     → eighth notes
      { emoji: "🎼", color: "theme-amber"  },
      { emoji: "🎸", color: "theme-coral"  },
      { emoji: "🎺", color: "theme-green"  },
    ];

    // ── SESSION CHECK ────────────────────────────────────────
    const studentNumber = sessionStorage.getItem("studentNumber");
    const firstName     = sessionStorage.getItem("studentFirstName");
    const lastName      = sessionStorage.getItem("studentLastName");
    const grade         = sessionStorage.getItem("studentGrade");
    const studentClass  = sessionStorage.getItem("studentClass");

    if (!studentNumber || !firstName) {
      window.location.href = "index.html";
      throw new Error("No session — redirecting.");
    }

    // ── GREETING ─────────────────────────────────────────────
    document.getElementById("greetingName").textContent = "Hello, " + firstName;

    const metaParts = [];
    if (grade)        metaParts.push("Grade " + grade);
    if (studentClass) metaParts.push("Class " + studentClass);
    document.getElementById("greetingMeta").textContent = metaParts.join(" · ");

    const initials = ((firstName[0] || "") + (lastName ? lastName[0] : "")).toUpperCase() || "?";
    document.getElementById("avatarInitials").textContent = initials;

    // ── LOADING SKELETONS ────────────────────────────────────
    function showSkeletons() {
      document.getElementById("upNextArea").innerHTML =
        '<div class="skeleton skeleton-upnext"></div>';

      const grid = document.getElementById("moduleGrid");
      grid.innerHTML = "";
      for (let i = 0; i < 4; i++) {
        const d = document.createElement("div");
        d.className = "skeleton skeleton-card";
        grid.appendChild(d);
      }
    }

    // ── RENDER UP NEXT ───────────────────────────────────────
    function renderUpNext(module, bestScore, theme) {
      const area = document.getElementById("upNextArea");

      if (!module) {
        area.innerHTML = "";
        return;
      }

      const threshold   = MASTERY_THRESHOLD[module.filename] ?? DEFAULT_THRESHOLD;
      const advanced    = bestScore && bestScore.bestPercent >= threshold;

      // Compute the suggested next level from the URL we'll link to
      const nextUrl     = buildModuleUrl(module.filename, bestScore);
      const nextLevel   = (nextUrl.match(/level=([\d.]+)/) || [])[1] || "1";
      const nextMode    = (nextUrl.match(/mode=(\w+)/)     || [])[1] || null;
      // For rhythm, combine level + mode offset to get the true decimal (e.g. 2 + trainer → 2.1)
      const modeOffset  = nextMode === 'trainer' ? 0.1 : nextMode === 'fast' ? 0.3 : nextMode === 'moderate' ? 0.2 : 0;
      const nextLabel   = nextMode
        ? "Level " + (parseFloat(nextLevel) + modeOffset).toFixed(1)
        : "Level " + nextLevel;

      const meta = bestScore
        ? nextLabel + " · Best " + Math.round(bestScore.bestPercent) + "%"
        : nextLabel + " · Not Started";

      const upNextUrl = buildModuleUrl(module.filename, bestScore);
      area.innerHTML = `
        <a class="up-next" href="${upNextUrl}" style="display:flex;">
          <div class="mod-icon up-next-icon ${theme.color}">${theme.emoji}</div>
          <div class="up-next-text">
            <h3>${escHtml(module.title)}</h3>
            <p>${meta}</p>
          </div>
          <button class="up-next-btn">Start →</button>
        </a>`;
    }

    // ── RENDER MODULE GRID ───────────────────────────────────
    function renderGrid(modules, bestScoresMap) {
      const grid = document.getElementById("moduleGrid");
      grid.innerHTML = "";

      modules.forEach((mod, index) => {
        const theme = MODULE_THEMES[index % MODULE_THEMES.length];
        const bs    = bestScoresMap[mod.moduleId];

        let metaHtml;
        if (bs) {
          metaHtml = `${levelLabel(mod.filename, bs.level)} &nbsp;·&nbsp; Best <strong>${Math.round(bs.bestPercent)}%</strong>`;
        } else {
          metaHtml = "Not Started";
        }

        const card = document.createElement("a");
        card.className   = "module-card";
        card.href        = (mod.filename === "rhythm.html")
          ? buildRhythmMenuUrl(bs)
          : (mod.filename === "staffhero.html")
            ? buildStaffHeroMenuUrl(bs)
            : (mod.filename === "pitch.html")
              ? buildPitchMenuUrl(bs)
              : buildModuleUrl(mod.filename, bs);
        card.innerHTML   = `
          <div class="mod-icon ${theme.color}">${theme.emoji}</div>
          <div class="card-title">${escHtml(mod.title)}</div>
          <div class="card-meta">${metaHtml}</div>`;

        grid.appendChild(card);
      });
    }

    // ── UP NEXT LOGIC ────────────────────────────────────────
    // Uses todaysModule (set by teacher) to pick the Up Next module.
    // Falls back to most recently played, then first module.
    function pickUpNext(modules, bestScoresMap, todaysModuleId) {
      // 1. Use teacher's selection if set and valid
      if (todaysModuleId) {
        const teacherPick = modules.find(m => m.moduleId === todaysModuleId);
        if (teacherPick) return teacherPick;
      }

      // 2. Fall back to most recently played
      let latest     = null;
      let latestDate = null;
      modules.forEach(mod => {
        const bs = bestScoresMap[mod.moduleId];
        if (bs && bs.lastAttempt) {
          const d = new Date(bs.lastAttempt);
          if (!latestDate || d > latestDate) {
            latestDate = d;
            latest     = mod;
          }
        }
      });

      // 3. Nothing attempted yet — use first module
      return latest || (modules.length > 0 ? modules[0] : null);
    }

    // ── MAIN: FETCH AND RENDER ───────────────────────────────
    async function loadDashboard() {
      showSkeletons();

      try {
        const response = await fetch(SCRIPT_URL, {
          method:   "POST",
          headers:  { "Content-Type": "text/plain" },
          body:     JSON.stringify({ action: "getProgress", studentNumber }),
          redirect: "follow"
        });

        if (!response.ok) throw new Error("Network error");

        const data = await response.json();

        if (!data.success) throw new Error(data.error || "Unknown error");

        // Build a quick lookup map: moduleId → bestScore
        const bestScoresMap = {};
        (data.bestScores || []).forEach(bs => {
          bestScoresMap[bs.moduleId] = bs;
        });

        const modules = data.modules || [];

        // Up Next
        const upNextModule = pickUpNext(modules, bestScoresMap, data.todaysModule || null);
        const upNextIndex  = modules.indexOf(upNextModule);
        const upNextTheme  = MODULE_THEMES[upNextIndex % MODULE_THEMES.length];
        renderUpNext(upNextModule, bestScoresMap[upNextModule?.moduleId], upNextTheme);

        // Module grid
        renderGrid(modules, bestScoresMap);

      } catch (err) {
        document.getElementById("upNextArea").innerHTML = "";
        document.getElementById("moduleGrid").innerHTML = `
          <div class="error-box" style="grid-column:1/-1;">
            Could not load modules. Please check your connection and refresh.
          </div>`;
      }
    }

    // ── HELPERS ──────────────────────────────────────────────

    // ── MODULE MASTERY CONFIG ──────────────────────────────
    // Minimum percent to advance to the next level, keyed by filename.
    // Add an entry here when you add a new module.
    const MASTERY_THRESHOLD = {
      "staffhero.html" : 81,
      "rhythm.html"    : 81,
      "pitch.html"     : 81,   // module ID in sheet: note_id
    };
    const DEFAULT_THRESHOLD = 81;

    // Builds a URL with suggested level (and mode for rhythm) from BestScores.
    // Returns a human-readable level label.
    // For rhythm, decodes float sub-levels: 1.1 → "Level 1.1"
    // For all others (staff hero etc.), shows integer level: "Level 3"
    function levelLabel(filename, level) {
      if ((filename === "rhythm.html" || filename === "pitch.html") && level > 0) {
        return "Level <strong>" + parseFloat(level).toFixed(1) + "</strong>";
      }
      return "Level <strong>" + level + "</strong>";
    }

    function buildModuleUrl(filename, bestScore) {
      if (filename === "rhythm.html") return buildRhythmUrl(bestScore);
      if (filename === "pitch.html")  return buildPitchUrl(bestScore);
      // For staffhero: always include maxLevel + bestLevel so "Other Levels"
      // button on the level preview screen shows the correctly locked menu.
      if (filename === "staffhero.html") return buildStaffHeroUrl(bestScore);
      if (!bestScore || bestScore.level === 0) return filename + "?level=1";
      const threshold = MASTERY_THRESHOLD[filename] ?? DEFAULT_THRESHOLD;
      const suggestedLevel = bestScore.bestPercent >= threshold
        ? bestScore.level + 1
        : bestScore.level;
      return filename + "?level=" + suggestedLevel;
    }

    // Builds the Up Next URL for Staff Hero — includes maxLevel + bestLevel
    // so the level preview's "Other Levels" button has lock data available.
    function buildStaffHeroUrl(bestScore) {
      if (!bestScore || bestScore.level === 0) {
        return "staffhero.html?level=1&maxLevel=1&bestLevel=0";
      }
      const threshold    = MASTERY_THRESHOLD["staffhero.html"] ?? DEFAULT_THRESHOLD;
      const baseLevel    = Math.floor(bestScore.level);
      const suggested    = bestScore.bestPercent >= threshold ? baseLevel + 1 : baseLevel;
      const maxLevel     = baseLevel + 1; // same rule as menu: one above best
      return "staffhero.html?level=" + suggested + "&maxLevel=" + maxLevel + "&bestLevel=" + baseLevel;
    }

    // Builds the menu URL for rhythm module cards.
    // maxLevel = student's base level + 1 (one level ahead is accessible).
    // bestLevel = their actual best decimal (e.g. 3.2) — used for modal sub-level locking.
    function buildRhythmMenuUrl(bestScore) {
      if (!bestScore || bestScore.level === 0) return "rhythm.html?menu=true&maxLevel=1&bestLevel=0";
      const baseLevel = Math.floor(bestScore.level);
      return "rhythm.html?menu=true&maxLevel=" + (baseLevel + 1) + "&bestLevel=" + bestScore.level.toFixed(1);
    }

    // Returns the ensemble for a given instrument name
    function getEnsembleForInstrument(instrName) {
      const orchInstr = ['Violin','Viola','Cello','Bass'];
      if (orchInstr.includes(instrName)) return 'orchestra';
      return 'band';
    }

    // Builds the menu URL for Pitch module cards.
    function buildPitchMenuUrl(bestScore) {
      const instrName  = sessionStorage.getItem('studentInstrument') || 'Violin';
      const isOrch     = getEnsembleForInstrument(instrName) === 'orchestra';
      if (!bestScore || bestScore.level === 0) {
        return "pitch.html?menu=true&maxLevel=1.1&bestLevel=0";
      }
      const baseLevel  = Math.floor(bestScore.level);
      const subLevel   = Math.round((bestScore.level - baseLevel) * 10);
      // Next level: for orch .1→.2→next base.1; for band .1→next base.1
      let nextBase = baseLevel;
      let nextSub;
      if (bestScore.bestPercent >= (MASTERY_THRESHOLD["pitch.html"] ?? DEFAULT_THRESHOLD)) {
        if (isOrch && subLevel === 1) {
          nextSub = 2; // orch: notes → fingering
        } else {
          nextBase = baseLevel + 1;
          nextSub  = 1; // next quarter, notes first
        }
      } else {
        nextSub = subLevel;
      }
      const maxLevel = (nextBase + nextSub * 0.1).toFixed(1);
      return "pitch.html?menu=true&maxLevel=" + maxLevel + "&bestLevel=" + bestScore.level.toFixed(1);
    }

    // Builds the menu URL for Staff Hero module cards with level locking.
    function buildStaffHeroMenuUrl(bestScore) {
      if (!bestScore || bestScore.level === 0) return "staffhero.html?menu=true&maxLevel=1&bestLevel=0";
      const baseLevel = Math.floor(bestScore.level);
      return "staffhero.html?menu=true&maxLevel=" + (baseLevel + 1) + "&bestLevel=" + baseLevel;
    }

    // Pitch Up Next URL: goes straight to the quiz at the suggested level
    function buildPitchUrl(bestScore) {
      const instrName = sessionStorage.getItem('studentInstrument') || 'Violin';
      const isOrch    = getEnsembleForInstrument(instrName) === 'orchestra';
      if (!bestScore || bestScore.level === 0) return "pitch.html?level=1.1";
      const threshold = MASTERY_THRESHOLD["pitch.html"] ?? DEFAULT_THRESHOLD;
      const baseLevel = Math.floor(bestScore.level);
      const subLevel  = Math.round((bestScore.level - baseLevel) * 10);
      let nextBase = baseLevel, nextSub;
      if (bestScore.bestPercent >= threshold) {
        if (isOrch && subLevel === 1) { nextSub = 2; }
        else { nextBase = baseLevel + 1; nextSub = 1; }
      } else { nextSub = subLevel; }
      return "pitch.html?level=" + (nextBase + nextSub * 0.1).toFixed(1);
    }

    // Rhythm uses float levels: 1.1=trainer, 1.2=moderate, 1.3=fast, 2.1=next level trainer...
    // Advancement steps through sub-levels before moving to the next level.
    function buildRhythmUrl(bestScore) {
      const threshold = MASTERY_THRESHOLD["rhythm.html"] ?? DEFAULT_THRESHOLD;
      if (!bestScore || bestScore.level === 0) return "rhythm.html?level=1&mode=trainer";

      const baseLevel = Math.floor(bestScore.level);
      const subLevel  = Math.round((bestScore.level - baseLevel) * 10); // 1, 2, or 3

      let nextBase = baseLevel;
      let nextSub;

      if (bestScore.bestPercent >= threshold) {
        if (subLevel < 3) {
          nextSub = subLevel + 1;           // advance sub-level: 1→2→3
        } else {
          nextBase = baseLevel + 1;         // advance to next full level
          nextSub  = 1;                     // back to trainer
        }
      } else {
        nextSub = subLevel;                 // stay at same sub-level
      }

      const mode = nextSub === 1 ? "trainer" : nextSub === 2 ? "moderate" : "fast";
      return "rhythm.html?level=" + nextBase + "&mode=" + mode;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function signOut() {
      sessionStorage.clear();
      window.location.href = "index.html";
    }

    // ── INIT ─────────────────────────────────────────────────
    loadDashboard();
  </script>
</body>
</html>
