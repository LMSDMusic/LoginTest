<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f0f4ff;
      --surface:     #ffffff;
      --blue:        #3b6ef8;
      --blue-hover:  #2a5ce0;
      --blue-light:  #e8effe;
      --text:        #1a1f36;
      --text-muted:  #6b7280;
      --border:      #dde3f0;
      --error:       #e53e3e;
      --error-bg:    #fff5f5;
      --success:     #2f855a;
      --success-bg:  #f0fff4;
      --radius:      14px;
      --shadow:      0 4px 24px rgba(59, 110, 248, 0.10);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.5;
      pointer-events: none;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 48px 44px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      animation: cardIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Header ── */
    .card-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: var(--blue-light);
      border-radius: 16px;
      margin-bottom: 16px;
    }

    .logo svg {
      width: 28px;
      height: 28px;
      color: var(--blue);
    }

    .card-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.7rem;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .card-header p {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    /* ── Form Fields ── */
    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      color: var(--text);
      background: #fafbff;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    input::placeholder { color: #b0b8d0; }

    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(59, 110, 248, 0.12);
      background: #fff;
    }

    /* Passcode field wrapper (for show/hide toggle) */
    .input-wrapper {
      position: relative;
    }

    .input-wrapper input { padding-right: 48px; }

    .toggle-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }
    .toggle-btn:hover { color: var(--blue); }
    .toggle-btn svg { width: 18px; height: 18px; }

    /* ── Submit Button ── */
    .btn {
      width: 100%;
      padding: 14px;
      background: var(--blue);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 2px 10px rgba(59, 110, 248, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover:not(:disabled) {
      background: var(--blue-hover);
      box-shadow: 0 4px 16px rgba(59, 110, 248, 0.35);
    }

    .btn:active:not(:disabled) { transform: scale(0.98); }

    .btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    /* Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn.loading .spinner { display: block; }
    .btn.loading .btn-text { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Alert Messages ── */
    .alert {
      border-radius: var(--radius);
      padding: 13px 16px;
      font-size: 0.88rem;
      font-weight: 500;
      margin-top: 18px;
      display: none;
      align-items: flex-start;
      gap: 10px;
      line-height: 1.45;
    }

    .alert.show { display: flex; animation: alertIn 0.2s ease both; }

    @keyframes alertIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .alert-error {
      background: var(--error-bg);
      color: var(--error);
      border: 1px solid #fed7d7;
    }

    .alert-success {
      background: var(--success-bg);
      color: var(--success);
      border: 1px solid #c6f6d5;
    }

    .alert svg { width: 18px; height: 18px; flex-shrink: 0; margin-top: 1px; }

    /* ── Welcome State ── */
    .welcome-wrap {
      text-align: center;
      padding: 8px 0 4px;
      display: none;
    }

    .welcome-wrap.show { display: block; animation: cardIn 0.35s ease both; }

    .welcome-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem;
      color: var(--text);
      margin-bottom: 8px;
    }

    .welcome-name span { color: var(--blue); }

    .welcome-sub {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    .btn-outline {
      width: 100%;
      padding: 12px;
      background: transparent;
      color: var(--blue);
      border: 1.5px solid var(--blue);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-outline:hover { background: var(--blue-light); }

    /* ── Footer ── */
    .card-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }
  </style>
</head>

<body>
  <div class="card">
    <!-- Login Form -->
    <div id="loginSection">
      <div class="card-header">
        <div class="logo">
          <img src="logo.png" alt="Department Logo" style="width:40px;height:40px;object-fit:contain;" />
        </div>
        <h1>Welcome Back</h1>
        <p>Sign in with your student number and passcode</p>
      </div>

      <div class="field">
        <label for="studentNumber">Student Number</label>
        <input
          type="text"
          id="studentNumber"
          placeholder="e.g. 100234"
          autocomplete="username"
          inputmode="numeric"
        />
      </div>

      <div class="field">
        <label for="passcode">Passcode</label>
        <div class="input-wrapper">
          <input
            type="password"
            id="passcode"
            placeholder="Enter your passcode"
            autocomplete="current-password"
          />
          <button class="toggle-btn" id="toggleBtn" type="button" aria-label="Show passcode">
            <!-- Eye icon (shown when password is hidden) -->
            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <!-- Eye-off icon (shown when password is visible) -->
            <svg id="eyeOffIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="btn" id="loginBtn" type="button">
        <span class="btn-text">Sign In</span>
        <div class="spinner"></div>
      </button>

      <div class="alert alert-error" id="errorAlert">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="errorText">Incorrect student number or passcode. Please try again.</span>
      </div>
    </div>

    <!-- Welcome State (shown after successful login) -->
    <div class="welcome-wrap" id="welcomeSection">
      <div class="logo" style="margin: 0 auto 20px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </div>
      <p class="welcome-name">Hello, <span id="welcomeName"></span>!</p>
      <p class="welcome-sub">You're signed in successfully.</p>

      <!--
        ── DEVELOPER NOTE ──────────────────────────────────────────
        Replace the button below with whatever action should happen
        after login — e.g. redirect to your main site page:
          window.location.href = "dashboard.html";
        The student's info is in sessionStorage:
          sessionStorage.getItem("studentFirstName")
          sessionStorage.getItem("studentLastName")
          sessionStorage.getItem("studentNumber")
        ────────────────────────────────────────────────────────────
      -->
      <button class="btn" onclick="goToDashboard()">
        <span class="btn-text">Continue →</span>
      </button>
      <br/>
      <button class="btn-outline" onclick="signOut()">Sign out</button>
    </div>

    <div class="card-footer">
      Trouble signing in? Ask your teacher for help.
    </div>
  </div>

  <script>
    // ── CONFIGURATION ─────────────────────────────────────────
    // Paste your deployed Apps Script Web App URL here.
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx_REo7dnRZo3fny_xv3uyhCUlImo4-4RM3x8W9Nu0JQHvBNv3HYRlzquLzm-PVCxzg/exec";
    // ──────────────────────────────────────────────────────────

    const loginBtn      = document.getElementById("loginBtn");
    const errorAlert    = document.getElementById("errorAlert");
    const errorText     = document.getElementById("errorText");
    const loginSection  = document.getElementById("loginSection");
    const welcomeSection= document.getElementById("welcomeSection");
    const welcomeName   = document.getElementById("welcomeName");
    const toggleBtn     = document.getElementById("toggleBtn");
    const passcodeInput = document.getElementById("passcode");
    const eyeIcon       = document.getElementById("eyeIcon");
    const eyeOffIcon    = document.getElementById("eyeOffIcon");

    // Show/hide passcode toggle
    toggleBtn.addEventListener("click", () => {
      const isHidden = passcodeInput.type === "password";
      passcodeInput.type = isHidden ? "text" : "password";
      eyeIcon.style.display    = isHidden ? "none"  : "block";
      eyeOffIcon.style.display = isHidden ? "block" : "none";
    });

    // Allow Enter key to submit
    document.addEventListener("keydown", e => {
      if (e.key === "Enter" && loginSection.style.display !== "none") handleLogin();
    });

    // ── Login Handler ──────────────────────────────────────────
    async function handleLogin() {
      const studentNumber = document.getElementById("studentNumber").value.trim();
      const passcode      = passcodeInput.value.trim();

      hideError();

      if (!studentNumber || !passcode) {
        showError("Please enter both your student number and passcode.");
        return;
      }

      setLoading(true);

      try {
        const response = await fetch(SCRIPT_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" }, // avoids CORS preflight with Apps Script
          body: JSON.stringify({ action: "login", studentNumber, passcode }),
          redirect: "follow"
        });

        if (!response.ok) throw new Error("Network error");

        const data = await response.json();

        if (data.success) {
          // Store in sessionStorage (cleared when tab closes)
          sessionStorage.setItem("studentFirstName", data.firstName);
          sessionStorage.setItem("studentLastName",  data.lastName);
          sessionStorage.setItem("studentNumber",    studentNumber);
          sessionStorage.setItem("studentGrade",      data.grade);
          sessionStorage.setItem("studentClass",      data.class);
          sessionStorage.setItem("studentInstrument", data.instrument || "Violin");

          welcomeName.textContent = data.firstName;
          loginSection.style.display  = "none";
          welcomeSection.classList.add("show");

        } else {
          const messages = {
            invalid_credentials: "Incorrect student number or passcode. Please try again.",
            locked_out:          "Too many failed attempts. Please wait 15 minutes or ask your teacher to unlock your account.",
            missing_fields:      "Please enter both your student number and passcode.",
            server_error:        "Something went wrong. Please try again in a moment."
          };
          showError(messages[data.error] || messages.server_error);
        }

      } catch (err) {
        showError("Could not connect. Please check your internet and try again.");
      }

      setLoading(false);
    }

    loginBtn.addEventListener("click", handleLogin);

    // ── Helpers ────────────────────────────────────────────────
    function setLoading(on) {
      loginBtn.disabled = on;
      loginBtn.classList.toggle("loading", on);
    }

    function showError(msg) {
      errorText.textContent = msg;
      errorAlert.classList.add("show");
    }

    function hideError() {
      errorAlert.classList.remove("show");
    }

    function signOut() {
      sessionStorage.clear();
      welcomeSection.classList.remove("show");
      loginSection.style.display = "block";
      document.getElementById("studentNumber").value = "";
      passcodeInput.value = "";
    }

    // Replace this with your actual post-login destination
    function goToDashboard() {
      window.location.href = "dashboard.html";
    }

    // ── Auto-login if already signed in this session ───────────
    window.addEventListener("DOMContentLoaded", () => {
      const firstName = sessionStorage.getItem("studentFirstName");
      if (firstName) {
        welcomeName.textContent = firstName;
        loginSection.style.display  = "none";
        welcomeSection.classList.add("show");
      }
    });
  </script>
</body>
</html>
