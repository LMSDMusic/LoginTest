<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhythm Reader</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap');

  :root {
    --bg:         #f0f4ff;
    --surface:    #ffffff;
    --blue:       #3b6ef8;
    --blue-dark:  #2a5ce0;
    --blue-light: #e8effe;
    --text:       #1a1f36;
    --muted:      #6b7280;
    --border:     #dde3f0;
    --green:      #2f855a;
    --red:        #c53030;
    /* legacy aliases kept for any remaining references */
    --cream:      #f0f4ff;
    --parchment:  #dde3f0;
    --navy:       #1a1f36;
    --navy-mid:   #2a5ce0;
    --gold:       #3b6ef8;
    --gold-light: #e8effe;
    --text: #1a1a2e;
    --muted: #6b6b8a;
    --ink: #1a1a2e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--bg);
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    background-image: repeating-linear-gradient(transparent, transparent 39px, #c8c0b0 39px, #c8c0b0 40px);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    padding: 2rem 1.25rem;
    overflow-y: auto;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.6rem, 5vw, 2.2rem);
    color: var(--text);
    text-align: center;
    margin-bottom: 1.5rem;
    letter-spacing: 0.01em;
  }

  /* ── MENU ── */
  #menu-screen {
    display: flex; flex-direction: column; align-items: stretch;
    gap: .75rem; width: 100%; max-width: 480px; margin: auto; padding: 1rem 0;
  }
  .menu-sub {
    font-size: .88rem; color: var(--muted); margin-bottom: .5rem;
    text-align: center; letter-spacing: .02em;
  }
  .lvl-btn {
    width: 100%; background: white;
    border: 2px solid var(--border);
    border-radius: 14px; padding: 1rem 1.25rem;
    cursor: pointer; text-align: left;
    display: flex; align-items: center; gap: 1rem;
    transition: all .2s ease;
    box-shadow: 0 2px 8px rgba(26,39,68,.06);
    box-sizing: border-box;
  }
  .lvl-btn:hover {
    border-color: var(--text);
    box-shadow: 0 4px 16px rgba(26,39,68,.12);
    transform: translateY(-2px);
  }
  .lvl-num {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Serif Display', serif; font-size: 1.4rem;
    color: #fff; flex-shrink: 0;
  }
  .l1 .lvl-num { background: linear-gradient(135deg,#2d7a5f,#1a2744); }
  .l2 .lvl-num { background: linear-gradient(135deg,#c8973a,#b03a2e); }
  .l3 .lvl-num { background: linear-gradient(135deg,#2c3e6b,#2d7a5f); }
  .l4 .lvl-num { background: linear-gradient(135deg,#c8973a,#2c3e6b); }
  .l5 .lvl-num { background: linear-gradient(135deg,#b03a2e,#2c3e6b); }
  .l6 .lvl-num { background: linear-gradient(135deg,#1a2744,#c8973a); }
  .l7 .lvl-num { background: linear-gradient(135deg,#2d7a5f,#1a2744); }
  .l8 .lvl-num { background: linear-gradient(135deg,#c8973a,#b03a2e); }
  .l9 .lvl-num { background: linear-gradient(135deg,#2c3e6b,#c8973a); }
  .l10 .lvl-num { background: linear-gradient(135deg,#b03a2e,#2d7a5f); font-size: 1.1rem; }
  .challenge-btn {
    border-color: var(--blue) !important;
    background: linear-gradient(135deg, #fffdf5, #fff8e8) !important;
  }
  .challenge-btn:hover {
    border-color: var(--text) !important;
    background: white !important;
  }
  .lvl-pair {
    display: flex; flex-direction: column; gap: .75rem; width: 100%;
  }
  .lvl-pair .lvl-btn {
    width: 100%; flex: none;
  }
  .lvl-pair .lvl-btn svg {
    max-width: 100%;
  }
  .lvl-info { flex: 1; text-align: center; display: flex; flex-direction: column; align-items: center; }
  .lvl-info h3 { font-family: 'DM Serif Display', serif; font-weight: 700; font-size: .95rem; color: var(--text); margin-bottom: 0; }
  .lvl-info p  { font-size: .8rem; color: var(--muted); margin: 0; }
  .lvl-info svg { display: block; margin: 6px auto 0; }

  /* ── GAME ── */
  #game-screen {
    display: none; flex-direction: column; align-items: center;
    width: 100%; max-width: 740px;
  }
  .game-header {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; margin-bottom: .75rem;
  }
  .lvl-badge {
    font-size: .75rem; font-weight: 700; color: var(--blue);
    letter-spacing: .08em; text-transform: uppercase;
  }
  .rhy-counter { font-size: .75rem; font-weight: 500; color: var(--muted); }
  .progress-dots { display: flex; gap: 6px; align-items: center; }
  .pdot {
    width: 11px; height: 11px; border-radius: 50%;
    background: var(--border); border: 1.5px solid #c8bfb0; transition: all .3s;
  }
  .pdot.current  { background: var(--blue); border-color: var(--blue); box-shadow: 0 0 0 3px rgba(200,151,58,.2); }
  .pdot.scored-a { background: var(--green); border-color: var(--green); }
  .pdot.scored-b { background: #2d7a8a; border-color: #2d7a8a; }
  .pdot.scored-c { background: var(--blue); border-color: var(--blue); }
  .pdot.scored-d { background: var(--red); border-color: var(--red); }

  #score-display {
    font-family: 'DM Serif Display', serif;
    font-weight: 700; font-size: 1.2rem; color: var(--text);
    margin-bottom: 1rem; min-height: 1.6rem; text-align: center;
  }
  .staff-wrap {
    background: white;
    border: 2px solid var(--border);
    border-radius: 14px; padding: 1rem 1.5rem;
    width: 100%;
    box-shadow: 0 4px 16px rgba(26,39,68,.08);
    margin-bottom: 1.25rem;
  }
  #notation-svg { width: 100%; height: 130px; display: block; }

  #countdown-display {
    height: 4.4rem; display: flex; align-items: center; justify-content: center;
    margin-bottom: .75rem;
  }
  #countdown-word {
    font-family: 'DM Serif Display', serif;
    font-size: 3.2rem; font-weight: 700;
    color: var(--blue);
    opacity: 0; transform: scale(0.7);
    transition: opacity .08s, transform .08s;
    letter-spacing: 0.04em;
  }
  #countdown-word.flash { opacity: 1; transform: scale(1); }
  #countdown-word.go-word { color: var(--green); }

  #status {
    font-size: .82rem; font-weight: 600; color: var(--muted);
    letter-spacing: .08em; text-transform: uppercase; text-align: center;
    min-height: 1.4rem; margin-bottom: .75rem;
  }
  #status.active { color: var(--text); }
  #status.go     { color: var(--green); font-weight: 700; }
  #status.done   { color: var(--text); font-weight: 700; }
  #status.listen { color: var(--blue); font-weight: 700; }

  .tap-flash {
    position: fixed; inset: 0; pointer-events: none; z-index: 100;
    background: rgba(255,255,255,.06); opacity: 0; transition: opacity .15s;
  }
  .tap-flash.lit { opacity: 1; }

  #btn:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }
  #btn {
    background: var(--text);
    border: none; color: white;
    font-family: 'DM Sans', sans-serif; font-weight: 700;
    font-size: 1rem; letter-spacing: .04em;
    padding: .85rem 2.8rem;
    border-radius: 10px; cursor: pointer;
    transition: background .2s, transform .15s, box-shadow .15s;
    box-shadow: 0 4px 16px rgba(26,39,68,.25);
    margin-top: .25rem;
  }
  #btn:hover  { background: var(--blue-dark); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(26,39,68,.3); }
  #btn:active { transform: translateY(0); }

  .game-nav-btns {
    display: flex; gap: .5rem; justify-content: center; margin-top: .5rem;
  }
  .game-nav-btn {
    background: none; border: 1.5px solid var(--blue); color: var(--blue);
    font-family: 'DM Sans', sans-serif; font-size: .75rem; font-weight: 600;
    padding: .35rem 1rem; border-radius: 20px; cursor: pointer;
    letter-spacing: .04em; transition: background .15s, color .15s;
  }
  .game-nav-btn:hover { background: var(--blue); color: white; }
  .game-nav-btn:disabled { opacity: 0.25; cursor: default; pointer-events: none; }
  #result-detail {
    font-size: .8rem; font-weight: 500; color: var(--muted);
    text-align: center; min-height: 1.2rem; margin-top: .6rem;
  }

  /* ── RESULTS ── */
  #results-screen {
    display: none; flex-direction: column; align-items: center;
    gap: 1.2rem; width: 100%; max-width: 460px;
  }
  .res-card {
    background: white; border-radius: 16px; padding: 2rem 2rem 1.5rem; width: 100%;
    box-shadow: 0 4px 16px rgba(26,39,68,.1); text-align: center;
    border: 2px solid var(--border);
  }
  .res-card h2 {
    font-family: 'DM Serif Display', serif; font-size: 1.6rem;
    color: var(--text); margin-bottom: .2rem;
  }
  .res-lvl-label {
    font-size: .75rem; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.5rem;
  }
  .avg-score {
    font-family: 'DM Serif Display', serif; font-size: 4rem;
    line-height: 1; margin-bottom: .2rem;
  }
  .avg-label {
    font-size: .75rem; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.6rem;
  }
  .grade-a { color: var(--green); }
  .grade-b { color: #2d7a8a; }
  .grade-c { color: var(--blue); }
  .grade-d { color: var(--red); }
  .bars { display: flex; justify-content: center; gap: .6rem; align-items: flex-end; margin-bottom: .5rem; }
  .bar-wrap  { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bar-track { width: 32px; height: 64px; background: var(--border); border-radius: 6px; overflow: hidden; display: flex; align-items: flex-end; }
  .bar-fill  { width: 100%; border-radius: 6px; transition: height .7s cubic-bezier(.34,1.56,.64,1); }
  .bar-pct   { font-size: .7rem; font-weight: 700; color: var(--muted); }
  .bar-n     { font-size: .7rem; color: var(--muted); }

  /* ── Level options modal ── */
  #level-modal {
    position: fixed; inset: 0; z-index: 200;
    align-items: center; justify-content: center; padding: 1.5rem;
  }
  .modal-backdrop {
    position: absolute; inset: 0; background: rgba(26,39,68,.45);
  }
  .modal-card {
    position: relative; background: white; border-radius: 18px;
    padding: 1.75rem 1.5rem; width: 100%; max-width: 360px;
    box-shadow: 0 20px 60px rgba(26,39,68,.25);
    animation: slideUp .25s ease;
  }
  .modal-title {
    font-family: 'DM Serif Display', serif; font-size: 1.3rem;
    color: var(--text); text-align: center; margin-bottom: .2rem;
  }
  .modal-sub {
    font-size: .82rem; color: var(--muted); text-align: center;
    margin-bottom: 1.25rem; letter-spacing: .04em;
  }
  .modal-options { display: flex; flex-direction: column; gap: .6rem; }
  .modal-opt {
    display: flex; align-items: center; gap: .85rem;
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 12px; padding: .85rem 1rem;
    cursor: pointer; transition: all .18s ease; text-align: left; width: 100%;
  }
  .modal-opt:hover { background: white; border-color: var(--text); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(26,39,68,.1); }
  .modal-opt-icon  { font-size: 1.4rem; flex-shrink: 0; }
  .modal-opt-label { font-family: 'DM Serif Display', serif; font-size: 1rem; color: var(--text); font-weight: 700; flex: 1; }
  .modal-opt-bpm   { font-size: .78rem; color: var(--muted); font-weight: 600; letter-spacing: .04em; }
  .modal-cancel {
    display: block; width: 100%; margin-top: .85rem; padding: .7rem;
    background: none; border: 1.5px solid var(--border); border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: .9rem; color: var(--muted);
    cursor: pointer; transition: all .15s;
  }
  .modal-cancel:hover { border-color: var(--text); color: var(--text); }


  /* ── Locked level buttons ── */
  .lvl-btn.locked {
    pointer-events: none;
    cursor: default;
    position: relative;
  }
  .lvl-btn.locked .lock-icon {
    display: flex !important;
  }
  .lock-icon {
    display: none;
    position: absolute;
    inset: 0;
    align-items: center;
    justify-content: center;
    z-index: 2;
    pointer-events: none;
    background: rgba(59, 110, 248, 0.08);
    border-radius: inherit;
  }
  .lock-icon svg {
    opacity: 0.35;
  }

  /* ── Locked modal options ── */
  .modal-opt.locked {
    pointer-events: none;
    cursor: default;
    position: relative;
  }
  .modal-opt.locked .modal-lock {
    display: flex !important;
  }
  .modal-lock {
    display: none;
    position: absolute;
    inset: 0;
    align-items: center;
    justify-content: center;
    z-index: 2;
    background: rgba(59, 110, 248, 0.08);
    border-radius: inherit;
  }
  .modal-lock svg {
    opacity: 0.35;
  }
</style>
</head>
<body>
<div class="tap-flash" id="tapFlash"></div>
<h1>Rhythm Reader</h1>

<!-- ONBOARDING -->

<!-- MENU -->
<div id="menu-screen">
  <p class="menu-sub">Choose a level to begin</p>
  <div style="text-align:center;margin-bottom:.75rem;">
    <a href="dashboard.html" style="font-size:.82rem;color:var(--blue);font-weight:600;text-decoration:none;">← Back to Dashboard</a>
  </div>

  <button class="lvl-btn l1" onclick="openModal(1)">
    <div class="lvl-num" style="background:linear-gradient(135deg,#2d7a5f,#1a2744)">1</div>
    <div class="lvl-info">
      <h3>Quarter &amp; Eighth</h3>
      <svg viewBox="0 0 190 54" width="190" height="44" style="display:block;margin:6px auto 0">
                        <line x1="8" y1="10" x2="182" y2="10" stroke="#1a1a2e" stroke-width=".8"/>
                        <line x1="8" y1="18" x2="182" y2="18" stroke="#1a1a2e" stroke-width=".8"/>
                        <line x1="8" y1="26" x2="182" y2="26" stroke="#1a1a2e" stroke-width=".8"/>
                        <line x1="8" y1="34" x2="182" y2="34" stroke="#1a1a2e" stroke-width=".8"/>
                        <line x1="8" y1="42" x2="182" y2="42" stroke="#1a1a2e" stroke-width=".8"/>
                        <text x="20" y="24" font-family="Georgia,serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a2e">4</text>
                        <text x="20" y="42" font-family="Georgia,serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a2e">4</text>
                        <ellipse cx="62" cy="26" rx="6" ry="4.2" transform="rotate(-15,62,26)" fill="#1a1a2e"/>
                        <line x1="56.5" y1="27.5" x2="56.5" y2="50" stroke="#1a1a2e" stroke-width="1.4"/>
                        <ellipse cx="110" cy="26" rx="6" ry="4.2" transform="rotate(-15,110,26)" fill="#1a1a2e"/>
                        <line x1="104.5" y1="27.5" x2="104.5" y2="50" stroke="#1a1a2e" stroke-width="1.4"/>
                        <ellipse cx="146" cy="26" rx="6" ry="4.2" transform="rotate(-15,146,26)" fill="#1a1a2e"/>
                        <line x1="140.5" y1="27.5" x2="140.5" y2="50" stroke="#1a1a2e" stroke-width="1.4"/>
                        <rect x="103.75" y="47" width="37.5" height="4.5" fill="#1a1a2e" rx="1"/>
                      </svg>
    </div>
  </button>

  <button class="lvl-btn l2" onclick="openModal(2)">
    <div class="lvl-num" style="background:linear-gradient(135deg,#c8973a,#b03a2e)">2</div>
    <div class="lvl-info">
      <h3>Quarter, Eighth, Quarter Rest</h3>
      <svg viewBox="0 0 200 54" width="200" height="44" style="display:block;margin:6px auto 0">
                      <line x1="8" y1="10" x2="192" y2="10" stroke="#1a1a2e" stroke-width=".8"/>
                      <line x1="8" y1="18" x2="192" y2="18" stroke="#1a1a2e" stroke-width=".8"/>
                      <line x1="8" y1="26" x2="192" y2="26" stroke="#1a1a2e" stroke-width=".8"/>
                      <line x1="8" y1="34" x2="192" y2="34" stroke="#1a1a2e" stroke-width=".8"/>
                      <line x1="8" y1="42" x2="192" y2="42" stroke="#1a1a2e" stroke-width=".8"/>
                      <text x="20" y="24" font-family="Georgia,serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a2e">4</text>
                      <text x="20" y="42" font-family="Georgia,serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a2e">4</text>
                      <!-- quarter -->
                      <ellipse cx="50" cy="26" rx="6" ry="4.2" transform="rotate(-15,50,26)" fill="#1a1a2e"/>
                      <line x1="44.5" y1="27.5" x2="44.5" y2="50" stroke="#1a1a2e" stroke-width="1.4"/>
                      <!-- beamed eighths -->
                      <ellipse cx="92" cy="26" rx="6" ry="4.2" transform="rotate(-15,92,26)" fill="#1a1a2e"/>
                      <line x1="86.5" y1="27.5" x2="86.5" y2="50" stroke="#1a1a2e" stroke-width="1.4"/>
                      <ellipse cx="126" cy="26" rx="6" ry="4.2" transform="rotate(-15,126,26)" fill="#1a1a2e"/>
                      <line x1="120.5" y1="27.5" x2="120.5" y2="50" stroke="#1a1a2e" stroke-width="1.4"/>
                      <rect x="85.75" y="47" width="35.5" height="4.5" fill="#1a1a2e" rx="1"/>
                      <!-- quarter rest -->
                      <rect class="menu-rest-placeholder" data-x="166" width="0" height="0"/>
                    </svg>
    </div>
  </button>

  <button class="lvl-btn l3" onclick="openModal(3)">
    <div class="lvl-num" style="background:linear-gradient(135deg,#2c3e6b,#2d7a5f)">3</div>
    <div class="lvl-info">
      <h3>Half &amp; Quarter Rest</h3>
      <svg viewBox="0 0 210 54" width="210" height="44" style="display:block;margin:6px auto 0">
                      <line x1="8" y1="10" x2="202" y2="10" stroke="#1a1a2e" stroke-width=".8"/>
                      <line x1="8" y1="18" x2="202" y2="18" stroke="#1a1a2e" stroke-width=".8"/>
                      <line x1="8" y1="26" x2="202" y2="26" stroke="#1a1a2e" stroke-width=".8"/>
                      <line x1="8" y1="34" x2="202" y2="34" stroke="#1a1a2e" stroke-width=".8"/>
                      <line x1="8" y1="42" x2="202" y2="42" stroke="#1a1a2e" stroke-width=".8"/>
                      <text x="20" y="24" font-family="Georgia,serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a2e">4</text>
                      <text x="20" y="42" font-family="Georgia,serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a2e">4</text>
                      <!-- half -->
                      <ellipse cx="46" cy="26" rx="6" ry="4.2" transform="rotate(-15,46,26)" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
                      <line x1="39.5" y1="27.5" x2="39.5" y2="50" stroke="#1a1a2e" stroke-width="1.4"/>
                      <!-- quarter -->
                      <ellipse cx="82" cy="26" rx="6" ry="4.2" transform="rotate(-15,82,26)" fill="#1a1a2e"/>
                      <line x1="76.5" y1="27.5" x2="76.5" y2="50" stroke="#1a1a2e" stroke-width="1.4"/>
                      <!-- beamed eighths -->
                      <ellipse cx="116" cy="26" rx="6" ry="4.2" transform="rotate(-15,116,26)" fill="#1a1a2e"/>
                      <line x1="110.5" y1="27.5" x2="110.5" y2="50" stroke="#1a1a2e" stroke-width="1.4"/>
                      <ellipse cx="146" cy="26" rx="6" ry="4.2" transform="rotate(-15,146,26)" fill="#1a1a2e"/>
                      <line x1="140.5" y1="27.5" x2="140.5" y2="50" stroke="#1a1a2e" stroke-width="1.4"/>
                      <rect x="109.75" y="47" width="31.5" height="4.5" fill="#1a1a2e" rx="1"/>
                      <!-- quarter rest -->
                      <rect class="menu-rest-placeholder" data-x="178" width="0" height="0"/>
                    </svg>
    </div>
  </button>

  <button class="lvl-btn l4" onclick="openModal(4)">
    <div class="lvl-num" style="background:linear-gradient(135deg,#c8973a,#2c3e6b)">4</div>
    <div class="lvl-info">
      <h3>3/4 Time</h3>
      <svg viewBox="0 0 170 54" width="170" height="44" style="display:block;margin:6px auto 0">
                      <line x1="8" y1="10" x2="162" y2="10" stroke="#1a1a2e" stroke-width=".8"/>
                      <line x1="8" y1="18" x2="162" y2="18" stroke="#1a1a2e" stroke-width=".8"/>

<!-- GAME -->
<div id="game-screen">
  <div class="game-header">
    <span class="lvl-badge" id="lvl-badge">Level 1</span>
    <div class="progress-dots" id="progress-dots"></div>
    <span class="rhy-counter" id="rhy-counter">1 of 5</span>
  </div>
  <div id="score-display"></div>
  <div class="staff-wrap">
    <svg id="notation-svg" viewBox="0 0 680 110" preserveAspectRatio="xMidYMid meet"></svg>
  </div>
  <div id="countdown-display"><span id="countdown-word"></span></div>
  <div id="status"></div>
  <button id="btn">Start</button>
  <div class="game-nav-btns">
    <button class="game-nav-btn" onclick="chooseLevel(currentLevel)">Restart</button>
    <button class="game-nav-btn" onclick="window.location.href='dashboard.html'">Dashboard</button>
  </div>
  <div id="result-detail"></div>
</div>

<!-- RESULTS -->
<div id="results-screen">
  <div class="res-card">
    <h2>Level Complete!</h2>
    <div class="res-lvl-label" id="res-lvl-label"></div>
    <div class="avg-score" id="res-avg"></div>
    <div class="avg-label">Average Score</div>
    <div class="bars" id="res-bars"></div>
    <div class="submit-status" id="submit-status" style="margin-top:.75rem"></div>
  </div>
  <div style="display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;margin-top:.5rem;">
    <button style="padding:.75rem 1.8rem;border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;border:none;background:var(--text);color:white;box-shadow:0 4px 16px rgba(26,39,68,.25);" onclick="retryLevel()">Try Again</button>
    <button style="padding:.75rem 1.8rem;border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;border:2px solid var(--border);background:var(--border);color:var(--text);" onclick="window.location.href='dashboard.html'">Dashboard</button>
  </div>

// ── Session & Submission ─────────────────────────────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx_REo7dnRZo3fny_xv3uyhCUlImo4-4RM3x8W9Nu0JQHvBNv3HYRlzquLzm-PVCxzg/exec';

// Redirect to login if no session

// Read level + mode from URL params (passed by dashboard)

// Tracks the current sub-level mode (trainer / moderate / fast)
let currentMode = 'moderate';

// Returns the decimal level string for display: e.g. "1.2" for Level 1 Moderate
function decimalLevel() {
  const base   = LEVELS[currentLevel].trainerFor || Number(currentLevel);
  const offset = currentMode === 'trainer' ? 0.1 : currentMode === 'fast' ? 0.3 : 0.2;
  return (base + offset).toFixed(1);
}

// Applies transparent lock overlay to level buttons above student's max accessible level.
// maxLevel = floor(bestScore.level) + 1, passed as integer in URL param.
function applyLevelLocks() {
  if (!_maxLevel) return;
  const maxBase = parseInt(_maxLevel); // levels up to this are accessible
  for (let i = 1; i <= 10; i++) {
    const btn = document.querySelector('.lvl-btn.l' + i);
    if (!btn) continue;
    if (i > maxBase) {
      btn.classList.add('locked');
      // Add lock icon span if not already there
      if (!btn.querySelector('.lock-icon')) {
        const icon = document.createElement('span');
        icon.className = 'lock-icon';
        icon.innerHTML = `<svg width="36" height="44" viewBox="0 0 36 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="18" width="32" height="24" rx="4" fill="#3b6ef8"/>
          <path d="M10 18V13C10 8.03 13.13 4 18 4C22.87 4 26 8.03 26 13V18" stroke="#3b6ef8" stroke-width="3.5" stroke-linecap="round" fill="none"/>
          <circle cx="18" cy="30" r="3.5" fill="white"/>
          <rect x="16.25" y="30" width="3.5" height="5" rx="1" fill="white"/>
        </svg>`;
        btn.appendChild(icon);
      }
    }
  }
}

// Locks modal sub-levels based on sequential progression.
// Rules:
//   level < bestBase:      all accessible (already passed)
//   level = bestBase:      sub-levels up to bestSub accessible, rest locked
//   level = bestBase + 1:  only Trainer accessible (first time at this level)
//   level > bestBase + 1:  button was already locked (shouldn't reach here)
function applyModalLocks(lvl) {
  const opts     = document.querySelectorAll('.modal-opt');
  const bestBase = Math.floor(_bestLevel);
  const bestSub  = Math.round((_bestLevel - bestBase) * 10); // 1,2,3

  opts.forEach((opt, i) => {
    const subOffset = i + 1; // Trainer=1, Moderate=2, Fast=3
    let locked = false;

    if (_bestLevel === 0) {
      // Never played — only Trainer accessible at level 1, rest locked
      locked = !(lvl === 1 && subOffset === 1);
    } else if (lvl < bestBase) {
      locked = false; // below best — all open
    } else if (lvl === bestBase) {
      locked = subOffset > bestSub; // up to their best sub-level
    } else if (lvl === bestBase + 1) {
      locked = subOffset > 1; // one above best — Trainer only
    } else {
      locked = true; // shouldn't be reachable but just in case
    }

    opt.classList.toggle('locked', locked);

    // Add/remove lock overlay
    let lockEl = opt.querySelector('.modal-lock');
    if (locked) {
      if (!lockEl) {
        lockEl = document.createElement('span');
        lockEl.className = 'modal-lock';
        lockEl.innerHTML = `<svg width="22" height="28" viewBox="0 0 36 44" fill="none" xmlns="http://www.w3.org/2000/svg">

          <circle cx="18" cy="30" r="3.5" fill="white"/>
          <rect x="16.25" y="30" width="3.5" height="5" rx="1" fill="white"/>
        </svg>`;
        opt.style.position = 'relative';
        opt.appendChild(lockEl);
      }
      lockEl.style.display = 'flex';
    } else if (lockEl) {
      lockEl.style.display = 'none';
    }
  });
}

// Called on page load — jump straight to level/mode if URL params present

  showScreen('menu-screen');

    navigateRhythmHash(window.location.hash);

}

// Auto-submits score to Apps Script using session data.
// Level encoding: level * 1 + modeOffset
//   Trainer  → level + 0.1  (e.g. Level 3 Trainer  = 3.1)
//   Moderate → level + 0.2  (e.g. Level 3 Moderate = 3.2)
//   Fast     → level + 0.3  (e.g. Level 3 Fast     = 3.3)
// This lets MAXIFS in BestScores correctly rank levels numerically.
async function autoSubmitScore() {
  const studentNumber = sessionStorage.getItem('studentNumber');
  if (!studentNumber) return;

  const statusEl = document.getElementById('submit-status');
  if (statusEl) { statusEl.textContent = 'Saving…'; }

  const avg = levelScores.length
    ? Math.round(levelScores.reduce((a,b) => a+b, 0) / levelScores.length)
    : 0;

  const baseLevel = LEVELS[currentLevel].trainerFor || currentLevel;
  const modeOffset = currentMode === 'trainer' ? 0.1 : currentMode === 'fast' ? 0.3 : 0.2;
  const levelVal = baseLevel + modeOffset;

  const totalSec = levelElapsed
    ? (()=>{ const parts = levelElapsed.match(/(?:(\d+)m\s*)?(\d+)s/); return parts ? parseInt(parts[1]||0)*60 + parseInt(parts[2]) : 0; })()
    : 0;

  try {
    const res = await fetch(SCRIPT_URL, {
      method:   'POST',
      headers:  { 'Content-Type': 'text/plain' },
      body:     JSON.stringify({
        action:          'logAttempt',
        studentNumber,
        moduleId:        'rhythm_tap',
        level:           levelVal,
        score:           0, // rhythm_tap has no raw score — percent is the measure
        percent:         avg,
        durationSeconds: totalSec,
        missedItems:     ''
      }),
      redirect: 'follow'
    });
    const data = await res.json();
    if (statusEl) {
      statusEl.textContent = data.success ? '✓ Score saved' : '✗ Save failed';
    }
  } catch(e) {
    if (statusEl) statusEl.textContent = '✗ Save failed';
  }
}

const actx = new (window.AudioContext || window.webkitAudioContext)();
function playClick(accent, time) {
  time = time || actx.currentTime;
  const osc = actx.createOscillator(), g = actx.createGain();
  osc.connect(g); g.connect(actx.destination);
  osc.frequency.value = accent ? 1200 : 800; osc.type = 'square';
  g.gain.setValueAtTime(accent ? 0.3 : 0.15, time);
  g.gain.exponentialRampToValueAtTime(0.001, time + 0.04);
  osc.start(time); osc.stop(time + 0.05);
}
function playTap() {
  const t = actx.currentTime;
  const osc = actx.createOscillator(), g = actx.createGain();
  osc.connect(g); g.connect(actx.destination);
  osc.frequency.value = 600; osc.type = 'sine';
  g.gain.setValueAtTime(0.2, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
  osc.start(t); osc.stop(t + 0.08);
}

function gradeClass(s) {

// ── Rhythm generator ──────────────────────────────────────────────────────────
function generateMeasure(offset, size) {
  size = size || 4;
  const allowed = LEVELS[currentLevel].types;
  const POOL = [
    {type:'quarter',  beats:1   },
    {type:'eighth',   beats:0.5 },
    {type:'half',     beats:2   },
    {type:'dotted-half', beats:3},
    {type:'qrest',    beats:1   },
    {type:'sixteenth',beats:0.25},
    {type:'mixed16',  beats:1   },  // 2×16th + 1×8th = 1 beat
    {type:'dotted-combo', beats:2}, // dotted quarter (1.5) + eighth (0.5)
    {type:'synco2',   beats:2   },  // 8th+quarter+8th or 8th+dotted-quarter = 2 beats
  ].filter(t => allowed.includes(t.type));

  const notes = []; let left = size;
  while (left > 0) {
    const avail = POOL.filter(n => n.beats <= left);
    const wts   = avail.map(n =>
      n.type==='quarter'      ? 35 :
      n.type==='eighth'       ? 25 :
      n.type==='half'         ? (left>=2?20:0) :
      n.type==='dotted-half'  ? (left>=3?15:0) :
      n.type==='sixteenth'    ? (left>=1?15:0) :
      n.type==='mixed16'      ? (left>=1?20:0) :
      n.type==='dotted-combo' ? (left>=2?25:0) :
      n.type==='synco2'       ? (left>=2?25:0) :
      10);  // qrest
    const tot = wts.reduce((a,b)=>a+b,0);
    let r = Math.random()*tot, idx=0;
    for (let i=0;i<wts.length;i++){r-=wts[i];if(r<=0){idx=i;break;}}
    const c = avail[idx];
    if (c.type==='eighth') {
      if (left>=1) {
        notes.push({...c, startBeat:offset+(size-left)}); left-=.5;
        notes.push({...c, startBeat:offset+(size-left)}); left-=.5;
      } else {
        notes.push({type:'qrest',beats:1,startBeat:offset+(size-left)}); left-=.5;
      }
    } else if (c.type==='sixteenth') {
      if (left>=1) {
        for (let k=0;k<4;k++){
          notes.push({...c, startBeat:offset+(size-left)}); left-=0.25;
        }
      } else {
        notes.push({type:'qrest',beats:left,startBeat:offset+(size-left)}); left=0;
      }
    } else if (c.type==='mixed16') {
      // randomly: [16th,16th,8th] or [8th,16th,16th]
      const variant = Math.random() < 0.5 ? 'sse' : 'ess'; // s=sixteenth e=eighth
      const pattern = variant==='sse'
        ? [{type:'sixteenth',beats:0.25},{type:'sixteenth',beats:0.25},{type:'eighth',beats:0.5}]
        : [{type:'eighth',beats:0.5},{type:'sixteenth',beats:0.25},{type:'sixteenth',beats:0.25}];
      pattern.forEach((n,k) => {
        // tag each note with its group variant so renderer can find the sixteenth pair
        notes.push({...n, startBeat:offset+(size-left), mixed16:variant, mixed16pos:k});
        left-=n.beats;
      });
    } else if (c.type==='dotted-combo') {
      // dotted quarter (1.5 beats) + single eighth (0.5 beats) = 2 beats total
      notes.push({type:'dotted-quarter', beats:1.5, startBeat:offset+(size-left), comboGroup:true});
      left -= 1.5;
      notes.push({type:'combo-eighth',   beats:0.5, startBeat:offset+(size-left), comboGroup:true});
      left -= 0.5;
    } else if (c.type==='synco2') {
      // randomly: eqe (8th+quarter+8th) or edq (8th+dotted-quarter)
      const variant = Math.random() < 0.5 ? 'eqe' : 'edq';
      const pattern = variant === 'eqe'
        ? [{type:'eighth',beats:0.5},{type:'quarter',beats:1},{type:'eighth',beats:0.5}]
        : [{type:'eighth',beats:0.5},{type:'dotted-quarter',beats:1.5}];
      pattern.forEach((n,k) => {
        notes.push({...n, startBeat:offset+(size-left), synco2:variant, synco2pos:k});
        left -= n.beats;
      });
    } else {
      notes.push({...c, startBeat:offset+(size-left)}); left-=c.beats;
    }
  }
  return notes;
}
const LEVEL_REQUIRED = { '1t': null, 1: null, '2t': null, 2: 'qrest', '3t': null, 3: 'half', '4t': null, 4: null, '5t': null, 5: 'sixteenth', '6t': null, 6: 'sixteenth', '7t': null, 7: 'mixed16', '8t': null, 8: 'dotted-combo', '9t': null, 9: 'dotted-combo', '10t': 'synco2', 10: 'synco2' };

function generateRhythm() {
  const required = LEVEL_REQUIRED[currentLevel];
  const bpm = LEVELS[currentLevel].beats;
  let r;
  do {
    r = [...generateMeasure(0, bpm), ...generateMeasure(bpm, bpm)];
  } while (required && !r.some(n =>
    required === 'mixed16'      ? n.mixed16 :
    required === 'synco2'       ? n.synco2 :
    required === 'dotted-combo' ? n.type === 'dotted-quarter' :
    n.type === required
  ));
  return r;
}
function computeExpectedTaps(r) { return r.filter(n=>n.type!=='qrest').map(n=>n.startBeat*BEAT_MS); }

// ── SVG layout ────────────────────────────────────────────────────────────────
const NS='http://www.w3.org/2000/svg', INK='#1a1a1a';
const STAFF_TOP=30, LINE_GAP=11, STAFF_L=30, STAFF_R=645;
const MID_BAR=STAFF_L+(STAFF_R-STAFF_L)/2;
const HEAD_Y=STAFF_TOP+LINE_GAP*2, STEM_LEN=30;
function sY(l){ return STAFF_TOP+l*LINE_GAP; }
// noteX now takes a pre-computed xPositions map built from the rhythm
let noteXMap = {};
function buildNoteXMap(r) {
  const MIN_SIXTEENTH_WEIGHT = 0.35;
  const weights = r.map(n => {
    if (n.type === 'sixteenth')      return MIN_SIXTEENTH_WEIGHT;
    if (n.type === 'qrest')          return 1.4;
    if (n.mixed16) return n.type === 'eighth' ? 0.6 : MIN_SIXTEENTH_WEIGHT;
    if (n.synco2)  return n.type === 'quarter' ? 1.0 : n.type === 'dotted-quarter' ? 1.5 : 0.5;
    if (n.type === 'dotted-quarter') return 1.5;
    if (n.type === 'dotted-half')    return 3;
    if (n.type === 'combo-eighth')   return 0.7;
    return n.beats;
  });

  const bpm = LEVELS[currentLevel].beats || 4;
  const m1end = r.findIndex(n => n.startBeat >= bpm);
  const split  = m1end === -1 ? r.length : m1end;

  const off = 20;
  const m1s = STAFF_L + 42 + off, m1e = MID_BAR - 18;
  const m2s = MID_BAR + 18 + off, m2e = STAFF_R - 14;

  function assignX(startGlobal, endGlobal, start, end) {
    const ws    = weights.slice(startGlobal, endGlobal);
    const total = ws.reduce((a,b) => a+b, 0);
    let acc = 0;
    for (let i = startGlobal; i < endGlobal; i++) {
      const wi = weights[i];
      noteXMap[i] = start + (acc + wi/2) / total * (end - start);
      acc += wi;
    }
  }
  assignX(0,     split,    m1s, m1e);

function noteX(beat, type, idx) {

function svgEl(tag,attrs){

}
function drawStaff(svg){
  for(let i=0;i<5;i++) svg.appendChild(svgEl('line',{x1:STAFF_L,y1:sY(i),x2:STAFF_R,y2:sY(i),stroke:INK,'stroke-width':1}));
  svg.appendChild(svgEl('line',{x1:STAFF_L,  y1:sY(0),x2:STAFF_L,  y2:sY(4),stroke:INK,'stroke-width':2}));
  svg.appendChild(svgEl('line',{x1:MID_BAR,  y1:sY(0),x2:MID_BAR,  y2:sY(4),stroke:INK,'stroke-width':1.5}));
  svg.appendChild(svgEl('line',{x1:STAFF_R-4,y1:sY(0),x2:STAFF_R-4,y2:sY(4),stroke:INK,'stroke-width':1.5}));
  svg.appendChild(svgEl('line',{x1:STAFF_R,  y1:sY(0),x2:STAFF_R,  y2:sY(4),stroke:INK,'stroke-width':3.5}));
}
function drawTimeSig(svg){
  const top = (LEVELS[currentLevel].beats || 4).toString();
  [0,1].forEach(i=>{
    const t=svgEl('text',{x:STAFF_L+16,y:sY(i===0?1:3)+7,'font-family':'Georgia,serif',
      'font-size':26,'font-weight':'bold','text-anchor':'middle',fill:INK});

  });
}

function drawQRest(svg,x,g){
  const top=sY(0)+1, bot=sY(4)+2, h=bot-top;
  const imgH=h*.72, imgW=imgH*.3441;
  const img=document.createElementNS(NS,'image');
  img.setAttribute('x', x-imgW/2);
  img.setAttribute('y', top+(h-imgH)/2);
  img.setAttribute('width',  imgW);
  img.setAttribute('height', imgH);
  img.setAttribute('href','data:image/png;base64,'+QREST_B64);
  img.setAttribute('class','qrest-img');
  g.appendChild(img);
}
function drawSingleEighth(svg, x, idx) {
  // Image is 344×274px. Notehead center is at (0.532, 0.349) of full image.
  // We want head center at (x, HEAD_Y) and head to match quarter size (rx:6.5,ry:4.5).
  // Content spans rows 65-273 (h=208) out of 274, matching SVG note height ~34.5px.
  const imgH = 48.9;
  const imgW = 61.4;
  const imgX = x - 0.532 * imgW;
  const imgY = HEAD_Y - 0.349 * imgH;
  const g = svgEl('g', {id:'note-'+idx});
  const img = document.createElementNS(NS, 'image');
  img.setAttribute('x', imgX);
  img.setAttribute('y', imgY);
  img.setAttribute('width',  imgW);
  img.setAttribute('height', imgH);
  img.setAttribute('href', 'data:image/png;base64,' + EIGHTH_B64);
  g.appendChild(img);
  svg.appendChild(g);
}


function drawNote(svg,note,idx,beamed,r){
  const measureIdx = r ? r.slice(0,idx).filter(n=>n.startBeat<4 === note.startBeat<4).length : idx;
  const x=noteX(note.startBeat, note.type, idx), hy=HEAD_Y;
  const g=svgEl('g',{id:'note-'+idx});
  if (note.type==='qrest') { drawQRest(svg,x,g); svg.appendChild(g); return; }
  if (note.type==='combo-eighth' || (note.synco2 && note.type==='eighth')) { drawSingleEighth(svg,x,idx); return; }
  if (note.type==='half' || note.type==='dotted-half') {
    g.appendChild(svgEl('ellipse',{cx:x,cy:hy,rx:7,ry:5,transform:'rotate(-15,'+x+','+hy+')',fill:'none',stroke:INK,'stroke-width':1.5}));
    const sx=x-7, sy2=hy+STEM_LEN;
    g.appendChild(svgEl('line',{x1:sx,y1:hy+2,x2:sx,y2:sy2,stroke:INK,'stroke-width':1.5}));
    if (note.type==='dotted-half') {
      g.appendChild(svgEl('circle',{cx:x+11,cy:hy-3,r:2,fill:INK}));
    }
  } else if (note.type==='dotted-quarter') {
    // identical to quarter (filled, stem at x-5.5) plus a dot
    g.appendChild(svgEl('ellipse',{cx:x,cy:hy,rx:7,ry:5,transform:'rotate(-15,'+x+','+hy+')',fill:INK}));
    const sx=x-5.5, sy2=hy+STEM_LEN;
    g.appendChild(svgEl('line',{x1:sx,y1:hy+2,x2:sx,y2:sy2,stroke:INK,'stroke-width':1.5}));
    g.appendChild(svgEl('circle',{cx:x+10,cy:hy-3,r:1.8,fill:INK}));
  } else {
    // quarter, eighth, sixteenth — filled head, stem at x-5.5
    g.appendChild(svgEl('ellipse',{cx:x,cy:hy,rx:7,ry:5,transform:'rotate(-15,'+x+','+hy+')',fill:INK}));
    const sx=x-5.5, sy2=hy+STEM_LEN;
    g.appendChild(svgEl('line',{x1:sx,y1:hy+2,x2:sx,y2:sy2,stroke:INK,'stroke-width':1.5}));
    if (note.type==='eighth' && !beamed){
      const p=document.createElementNS(NS,'path');
      p.setAttribute('d','M'+sx+','+sy2+' C'+(sx+14)+','+(sy2-5)+' '+(sx+12)+','+(sy2-15)+' '+(sx+3)+','+(sy2-22));
      p.setAttribute('stroke',INK); p.setAttribute('stroke-width',1.8); p.setAttribute('fill','none');
      g.appendChild(p);
    }
    if (note.type==='sixteenth' && !beamed){
      [0,8].forEach(off=>{
        const p=document.createElementNS(NS,'path');
        p.setAttribute('d','M'+sx+','+(sy2-off)+' C'+(sx+14)+','+(sy2-off-5)+' '+(sx+12)+','+(sy2-off-15)+' '+(sx+3)+','+(sy2-off-22));
        p.setAttribute('stroke',INK); p.setAttribute('stroke-width',1.8); p.setAttribute('fill','none');
        g.appendChild(p);
      });
    }
  }
  svg.appendChild(g);
}
function drawBeam(svg,indices,r){
  if(indices.length<2)return;
  const firstType = r[indices[0]].type;
  const isSixteenth = firstType==='sixteenth' && !r[indices[0]].mixed16;
  const isMixed16   = !!r[indices[0]].mixed16 || (r[indices[1]] && r[indices[1]].mixed16);
  const by=HEAD_Y+STEM_LEN;
  const x1=noteX(r[indices[0]].startBeat, r[indices[0]].type, indices[0])-5.5-0.75;
  const x2=noteX(r[indices[indices.length-1]].startBeat, r[indices[indices.length-1]].type, indices[indices.length-1])-5.5+0.75;
  // primary beam spans all notes
  svg.appendChild(svgEl('rect',{x:x1,y:by-3,width:x2-x1,height:5.5,fill:INK,rx:1}));
  // second full beam for pure sixteenth groups
  if(isSixteenth){
    svg.appendChild(svgEl('rect',{x:x1,y:by-11,width:x2-x1,height:5.5,fill:INK,rx:1}));
  }
  // partial second beam for mixed16 — only over the two sixteenth noteheads
  if(isMixed16){
    const variant = r[indices.find(i=>r[i].mixed16)].mixed16;
    let sxIndices;
    if(variant==='sse'){
      // first two notes are sixteenths
      sxIndices = [indices[0], indices[1]];
    } else {
      // last two notes are sixteenths
      sxIndices = [indices[1], indices[2]];
    }
    const px1=noteX(r[sxIndices[0]].startBeat, r[sxIndices[0]].type, sxIndices[0])-5.5-0.75;
    const px2=noteX(r[sxIndices[1]].startBeat, r[sxIndices[1]].type, sxIndices[1])-5.5+0.75;
    svg.appendChild(svgEl('rect',{x:px1,y:by-11,width:px2-px1,height:5.5,fill:INK,rx:1}));
  }
}
function renderNotation(r){
  const svg=document.getElementById('notation-svg');
  svg.innerHTML=''; drawStaff(svg); drawTimeSig(svg);
  buildNoteXMap(r);
  const groups=[]; let i=0;
  while(i<r.length){
    if(r[i].type==='sixteenth' && !r[i].mixed16){
      groups.push({kind:'sixteenth-beam',indices:[i,i+1,i+2,i+3]}); i+=4;
    } else if(r[i].mixed16 && r[i].mixed16pos===0){
      groups.push({kind:'mixed16-beam',indices:[i,i+1,i+2],variant:r[i].mixed16}); i+=3;
    } else if(r[i].synco2 && r[i].synco2pos===0){
      const variant = r[i].synco2;
      const count = variant === 'eqe' ? 3 : 2;
      groups.push({kind:'synco2-beam', indices: Array.from({length:count},(_,k)=>i+k), variant});
      i += count;
    } else if(r[i].type==='eighth' && !r[i].mixed16){
      const bpm2 = LEVELS[currentLevel].beats || 4;
      const pair=i+1<r.length && r[i+1].type==='eighth' && !r[i+1].mixed16 &&
                 Math.floor(r[i].startBeat/bpm2)===Math.floor(r[i+1].startBeat/bpm2);
      if(pair){ groups.push({kind:'beam',indices:[i,i+1]}); i+=2; }
      else    { groups.push({kind:'single',index:i}); i++; }
    } else if(r[i].type==='dotted-quarter' || r[i].type==='combo-eighth'){
      groups.push({kind:'single',index:i}); i++;
    } else { groups.push({kind:'single',index:i}); i++; }
  }
  groups.forEach(g=>{
    if(g.kind==='single'){ drawNote(svg,r[g.index],g.index,false,r); }
    else if(g.kind==='synco2-beam'){
      // all synco2 variants: unbeamed individual notes
      g.indices.forEach(idx=>drawNote(svg,r[idx],idx,false,r));
    }
    else { g.indices.forEach(idx=>drawNote(svg,r[idx],idx,true,r)); drawBeam(svg,g.indices,r); }
  });
}

// ── Continuous score → colour ─────────────────────────────────────────────────
// score: 0.0 (miss) → 1.0 (perfect)
// 1.0–0.7 : green → gold   |   0.7–0.0 : gold → red
function scoreToColour(score) {
  // With 90/10 weighting, a hit note scores 0.9-1.0, a miss scores 0.0
  // Anything ≥0.5 is a hit → show green; below that → red
  let r, g, b;
  if (score >= 0.5) {
    // 0.5–1.0 : gold → green
    const t = (score - 0.5) / 0.5;
    r = Math.round(200 + t * (52  - 200));
    g = Math.round(151 + t * (193 - 151));
    b = Math.round( 20 + t * (122 -  20));
  } else {
    // 0.0–0.5 : red → gold
    const t = score / 0.5;
    r = Math.round(176 + t * (200 - 176));
    g = Math.round( 58 + t * (151 -  58));
    b = Math.round( 46 + t * ( 20 -  46));
  }
  return 'rgb('+r+','+g+','+b+')';
}
function scoreToFilter(score) {
  // Approximate CSS filter to recolour the quarter-rest image
  // green=hit(1.0), gold=mid(0.7), red=miss(0.0)
  if (score >= 0.85) return 'invert(56%) sepia(93%) saturate(400%) hue-rotate(87deg) brightness(95%)';
  if (score >= 0.5)  return 'invert(55%) sepia(80%) saturate(500%) hue-rotate(0deg) brightness(100%)';
  return                     'invert(22%) sepia(95%) saturate(600%) hue-rotate(340deg) brightness(90%)';
}

function colourNote(idx, score) {
  const g = document.getElementById('note-'+idx); if (!g) return;
  const c  = scoreToColour(score);
  const fv = scoreToFilter(score);
  g.querySelectorAll('ellipse,circle,rect,line,path,text,image').forEach(e => {
    const tag=e.tagName, fill=e.getAttribute('fill');
    if (tag==='image') { e.style.filter=fv; return; }
    if (tag==='path' && fill && fill!=='none') e.setAttribute('fill', c);
    else if (tag==='path'||tag==='line') { if (e.getAttribute('stroke')!=='none') e.setAttribute('stroke', c); }
    if (tag==='circle'||tag==='rect'||tag==='text') e.setAttribute('fill', c);
    if (tag==='ellipse') { fill==='none' ? e.setAttribute('stroke',c) : e.setAttribute('fill',c); }
  });
}
function colourNoteHeld(idx){
  const g=document.getElementById('note-'+idx); if(!g)return;
  const c='#3a9e8f';
  g.querySelectorAll('ellipse,circle,rect,line,path,text,image').forEach(e=>{
    const tag=e.tagName,fill=e.getAttribute('fill');
    if(tag==='image'){e.style.filter='invert(56%) sepia(60%) saturate(300%) hue-rotate(140deg)';return;}
    if(tag==='path'&&fill&&fill!=='none') e.setAttribute('fill',c);
    else if(tag==='path'||tag==='line'){if(e.getAttribute('stroke')!=='none')e.setAttribute('stroke',c);}
    if(tag==='circle'||tag==='rect'||tag==='text') e.setAttribute('fill',c);
    if(tag==='ellipse'){ fill==='none'?e.setAttribute('stroke',c):e.setAttribute('fill',c); }
  });
}



// ── Beat lights ───────────────────────────────────────────────────────────────
// ── Countdown display ─────────────────────────────────────────────────────────
const COUNTDOWN_WORDS_4 = ['1', '2', 'Ready', 'Go!'];
const COUNTDOWN_WORDS_3 = ['1', 'Ready', 'Go!'];
const COUNTDOWN_WORDS_LISTEN_4 = ['1', '2', 'Listen', '…'];
const COUNTDOWN_WORDS_LISTEN_3 = ['1', 'Listen', '…'];

function lightNoteGreen(idx, durationMs) {
  const GREEN = '#2d7a5f';
  const INK_C = '#1a1a1a';
  const g = document.getElementById('note-'+idx); if (!g) return;
  // Light up green
  g.querySelectorAll('ellipse,circle,rect,line,path,image').forEach(e => {
    const tag = e.tagName, fill = e.getAttribute('fill');
    if (tag === 'image') { e.style.filter = 'invert(39%) sepia(50%) saturate(400%) hue-rotate(110deg)'; return; }
    if (fill && fill !== 'none') e.setAttribute('fill', GREEN);
    const stroke = e.getAttribute('stroke');
    if (stroke && stroke !== 'none') e.setAttribute('stroke', GREEN);
  });
  // Fade back to ink after duration
  setTimeout(() => {
    g.querySelectorAll('ellipse,circle,rect,line,path,image').forEach(e => {
      const tag = e.tagName, fill = e.getAttribute('fill');
      if (tag === 'image') { e.style.filter = ''; return; }
      if (fill && fill !== 'none') e.setAttribute('fill', INK_C);
      const stroke = e.getAttribute('stroke');
      if (stroke && stroke !== 'none') e.setAttribute('stroke', INK_C);
    });
  }, durationMs);
}

function flashCountdownWord(beatIndex, words) {
  const el = document.getElementById('countdown-word');
  const word = words[beatIndex];
  const isGo = beatIndex === words.length - 1;
  el.textContent = word;
  el.className = isGo ? 'go-word' : '';
  void el.offsetWidth;
  el.classList.add('flash');
  setTimeout(() => el.classList.remove('flash'), BEAT_MS * 0.8);
}

function clearCountdown() {
  const el = document.getElementById('countdown-word');
  el.classList.remove('flash');
  el.textContent = '';
}

// ── Start round ───────────────────────────────────────────────────────────────
function playNoteClick(time) {
  // Same sound as a player tap — sine at 600Hz, short decay
  const osc = actx.createOscillator(), g = actx.createGain();
  osc.connect(g); g.connect(actx.destination);
  osc.frequency.value = 600; osc.type = 'sine';
  g.gain.setValueAtTime(0.2, time);
  g.gain.exponentialRampToValueAtTime(0.001, time + 0.07);
  osc.start(time); osc.stop(time + 0.08);
}

function startTrainerRound(){
  if(actx.state==='suspended') actx.resume();
  if(!rhythmReady){ rhythm=generateRhythm(); }
  rhythmReady=false;
  expectedTaps=computeExpectedTaps(rhythm);
  tapResults=[]; playerTaps=[]; pressNoteIdx=-1; releaseScores={};
  renderNotation(rhythm); refreshHeader();
  document.getElementById('score-display').textContent='';
  document.getElementById('result-detail').textContent='';
  document.getElementById('status').className='active';
  document.getElementById('status').textContent='';
  document.getElementById('btn').style.display='none';
  document.getElementById('btn').disabled=true;
  document.querySelectorAll('.game-nav-btn').forEach(b => b.disabled = true);
  clearCountdown();

  const bpm = LEVELS[currentLevel].beats || 4;
  const countInWords       = bpm === 3 ? COUNTDOWN_WORDS_3       : COUNTDOWN_WORDS_4;
  const listenCountInWords = bpm === 3 ? COUNTDOWN_WORDS_LISTEN_3 : COUNTDOWN_WORDS_LISTEN_4;
  const countInBeats = countInWords.length;
  const totalMs = totalBeats() * BEAT_MS;
  const gapMs = 0; // go straight into count-in after demo

  gamePhase = 'countdown';

  // ── Phase 1: count-in for DEMO — show static "Listen" throughout ──
  document.getElementById('countdown-word').textContent = 'Listen';
  document.getElementById('countdown-word').className = '';
  document.getElementById('countdown-word').classList.add('flash');
  for(let i=0;i<countInBeats;i++){
    playClick(i===0, actx.currentTime+(i*BEAT_MS)/1000);
  }

  // ── Phase 2: play demo (metronome + note clicks + note highlights) ──
  const demoStart = countInBeats * BEAT_MS;
  // Metronome beats during demo
  for(let i=0;i<totalBeats();i++){
    playClick(i%bpm===0, actx.currentTime+(demoStart+i*BEAT_MS)/1000);
  }
  // Note-attack clicks + green highlight on each note
  rhythm.forEach((n, noteIdx) => {
    if(n.type==='qrest') return;
    const noteMs = demoStart + n.startBeat * BEAT_MS;
    playNoteClick(actx.currentTime + noteMs/1000);
    const durationMs = Math.max(n.beats * BEAT_MS * 0.85, 120);
    setTimeout(() => lightNoteGreen(noteIdx, durationMs), noteMs);
  });

  // Clear "Listen" when demo ends, then show tap count-in
  setTimeout(() => clearCountdown(), demoStart + totalMs);

  // Status shows TAP when demo ends and tap count-in begins
  setTimeout(()=>{
    if(gamePhase==='idle'||gamePhase==='done') return;
    gamePhase='demo';
  }, demoStart);

  // ── Phase 3: gap + second count-in ──
  const tapCountInStart = demoStart + totalMs + gapMs;
  for(let i=0;i<countInBeats;i++){
    const t = tapCountInStart + i*BEAT_MS;
    playClick(i===0, actx.currentTime+t/1000);
    setTimeout(()=>{ if(gamePhase==='idle'||gamePhase==='done') return; flashCountdownWord(i, countInWords); }, t);
  }

  // ── Phase 4: tapping phase ──
  const tapStart = tapCountInStart + countInBeats*BEAT_MS;
  startTime = performance.now() + tapStart;

  for(let i=0;i<totalBeats();i++){
    const delay = tapStart + i*BEAT_MS;
    playClick(i%bpm===0, actx.currentTime+delay/1000);
    setTimeout(()=>{
      if(gamePhase==='idle'||gamePhase==='done') return;
      if(i===0){
        gamePhase='playing';
        if(roundIndex===0 && levelStartTime===0) levelStartTime=performance.now();
        clearCountdown();
        document.getElementById('status').className='go';
        document.getElementById('status').textContent='TAP! (Spacebar)';
      }
    }, delay);
  }

  // ── End of round ──
  setTimeout(()=>{
    if(gamePhase==='playing'||gamePhase==='countdown'||gamePhase==='demo'){
      gamePhase='done'; clearCountdown(); finishRound();
    }
  }, tapStart + totalBeats()*BEAT_MS + 350);
}

// ── Level options modal ───────────────────────────────────────────────────────
let pendingLevel = 1;

function openModal(lvl) {
  pendingLevel = lvl;

}

function startLevelMode(mode) {

  backingTrack = null;

  else                         { BPM = 90;  BEAT_MS = 60000 / BPM; }

}










function startRound(){
  if(actx.state==='suspended') actx.resume();
  if(!rhythmReady){ rhythm=generateRhythm(); }
  rhythmReady=false;
  expectedTaps=computeExpectedTaps(rhythm);
  tapResults=[]; playerTaps=[]; pressNoteIdx=-1; releaseScores={};
  renderNotation(rhythm); refreshHeader();
  document.getElementById('score-display').textContent='';
  document.getElementById('result-detail').textContent='';
  document.getElementById('status').className='active';
  document.getElementById('status').textContent='';
  document.getElementById('btn').style.display='none';
  document.getElementById('btn').disabled=true;
  document.querySelectorAll('.game-nav-btn').forEach(b => b.disabled = true);
  clearCountdown();

  const bpm = LEVELS[currentLevel].beats || 4;
  const countInWords = bpm === 3 ? COUNTDOWN_WORDS_3 : COUNTDOWN_WORDS_4;
  const countInBeats = countInWords.length;

  startTime=performance.now()+countInBeats*BEAT_MS;
  gamePhase='countdown';

  for(let i=0;i<countInBeats;i++){
    playClick(i===0, actx.currentTime+(i*BEAT_MS)/1000);
    setTimeout(()=>flashCountdownWord(i, countInWords), i*BEAT_MS);
  }
  for(let i=0;i<totalBeats();i++){
    const delay=countInBeats*BEAT_MS+i*BEAT_MS;
    playClick(i%LEVELS[currentLevel].beats===0, actx.currentTime+delay/1000);
    setTimeout(()=>{
      if(gamePhase==='idle'||gamePhase==='done') return;
      if(i===0){
        gamePhase='playing';
        if(roundIndex === 0 && levelStartTime === 0) levelStartTime = performance.now();
        clearCountdown();
        document.getElementById('status').className='go';
        document.getElementById('status').textContent='TAP! (Spacebar)';
      }
    }, delay);
  }
  setTimeout(()=>{
    if(gamePhase==='playing'||gamePhase==='countdown'){ gamePhase='done'; clearCountdown(); finishRound(); }
  }, countInBeats*BEAT_MS+totalBeats()*BEAT_MS+350);
}

// ── Continuous tap scoring ────────────────────────────────────────────────────
// Returns 0.0–1.0 for attack timing
function atkScore(errorMs) {
  const e = Math.abs(errorMs);
  if (e <= PERFECT_ATK) return 1.0;
  if (e >= MISS_WIN)    return 0.0;
  return 1.0 - (e - PERFECT_ATK) / (MISS_WIN - PERFECT_ATK);
}
// Returns 0.0–1.0 for release timing
function relScore(errorMs) {
  const e = Math.abs(errorMs);
  if (e <= PERFECT_REL) return 1.0;
  if (e >= MISS_WIN)    return 0.0;
  return 1.0 - (e - PERFECT_REL) / (MISS_WIN - PERFECT_REL);
}

// tapResults[i] = { atkScore, atkElapsed, noteIdx } for each expected tap
// releaseScores[noteIdx] = relScore (filled in by handleRelease)
let releaseScores = {};

// ── Tap handlers ──────────────────────────────────────────────────────────────
function handlePress(){
  if(gamePhase!=='playing'&&gamePhase!=='countdown') return;
  const elapsed=performance.now()-startTime;
  document.getElementById('tapFlash').classList.add('lit');
  setTimeout(()=>document.getElementById('tapFlash').classList.remove('lit'),80);
  playTap(); playerTaps.push(elapsed);

  // Find closest expected tap
  let bestIdx=-1, bestDist=Infinity;
  expectedTaps.forEach((et,i)=>{ const d=Math.abs(elapsed-et); if(d<bestDist){bestDist=d;bestIdx=i;} });
  pressNoteIdx=-1;
  if(bestIdx<0) return;

  // Too far from any note = extra tap
  if(bestDist>=MISS_WIN){ tapResults.push('extra'); return; }

  // Map tap index → rhythm note index
  let noteIdx=-1, cnt=0;
  for(let i=0;i<rhythm.length;i++){
    if(rhythm[i].type!=='qrest'){ if(cnt===bestIdx){noteIdx=i;break;} cnt++; }
  }

  const aScore = atkScore(bestDist);
  tapResults[bestIdx] = { atkScore: aScore, noteIdx };
  pressNoteIdx = noteIdx;

  // Show teal "held" glow while key is down; resolve on release
  colourNoteHeld(noteIdx);
}

function handleRelease(){
  if(pressNoteIdx<0) return;
  const noteIdx   = pressNoteIdx; pressNoteIdx = -1;
  const elapsed   = performance.now()-startTime;
  const note      = rhythm[noteIdx];
  const releaseET = (note.startBeat + note.beats) * BEAT_MS;
  const rSc       = relScore(elapsed - releaseET);

  releaseScores[noteIdx] = rSc;

  // Find the tapResults entry for this note
  let tapIdx=-1, cnt=0;
  for(let i=0;i<rhythm.length;i++){
    if(rhythm[i].type!=='qrest'){
      if(i===noteIdx){ tapIdx=cnt; break; }
      cnt++;
    }
  }

  const aSc     = (tapIdx>=0 && tapResults[tapIdx] && typeof tapResults[tapIdx]==='object')
    ? tapResults[tapIdx].atkScore : 0;
  const combined = aSc*0.8 + rSc*0.2;
  colourNote(noteIdx, combined);
}

// ── Scoring ───────────────────────────────────────────────────────────────────
function computeScore(){
  const total=expectedTaps.length; if(!total) return 100;
  let sum=0;
  for(let i=0;i<total;i++){
    const entry=tapResults[i];
    if(!entry||entry==='extra'){ 
      // missed note — colour it red
      let cnt=0;
      for(let j=0;j<rhythm.length;j++){
        if(rhythm[j].type!=='qrest'){ if(cnt===i){ colourNote(j,0); break; } cnt++; }
      }
      sum+=0; continue;
    }
    const aSc = entry.atkScore || 0;
    const rSc = releaseScores[entry.noteIdx] !== undefined ? releaseScores[entry.noteIdx] : 0;
    const noteScore = aSc*0.9 + rSc*0.1;
    // If no release was recorded yet (key still held at round end), finalise colour now
    if(releaseScores[entry.noteIdx]===undefined) colourNote(entry.noteIdx, noteScore);
    sum += noteScore;
  }
  const extras=tapResults.filter(r=>r==='extra').length;
  return Math.round((sum/(total+extras))*100);
}

function finishRound(){
  const score=computeScore();



  levelScores.push(score);
  refreshHeader();

  const extras=tapResults.filter(r=>r==='extra').length;
  const total=expectedTaps.length;
  // Count notes by score range for display
  let perfect=0, good=0, poor=0, missed=0;
  for(let i=0;i<total;i++){
    const entry=tapResults[i];
    if(!entry||entry==='extra'){ missed++; continue; }
    const atk=entry.atkScore||0;
    const rel=releaseScores[entry.noteIdx]!==undefined?releaseScores[entry.noteIdx]:0;
    const ns=atk*0.9+rel*0.1;    if(ns>=0.9) perfect++; else if(ns>=0.6) good++; else if(ns>0) poor++; else missed++;
  }

  document.getElementById('score-display').textContent='Score: '+score+'%';
  document.getElementById('result-detail').textContent=
    '★ '+perfect+' perfect  ✓ '+good+' good  ~ '+poor+' poor  ✗ '+missed+' miss'+(extras?' +'+extras+' extra':'');

  const isLast=roundIndex>=ROUNDS-1;
  document.getElementById('status').className='done';

  if(isLast){
    document.getElementById('status').textContent='Level complete!';
    document.getElementById('btn').style.display='none';
    setTimeout(()=>{
      document.getElementById('btn').style.display='';
      document.getElementById('btn').disabled=false;
      document.getElementById('btn').onclick=startRound;
      document.querySelectorAll('.game-nav-btn').forEach(b => b.disabled = false);
      showResults();
    }, 1800);
  } else {
    roundIndex++;
    refreshHeader();
    document.getElementById('status').textContent='Round '+roundIndex+' done — keep going!';
    document.getElementById('btn').textContent='Next Rhythm';
    document.getElementById('btn').onclick= LEVELS[currentLevel].trainerFor ? startTrainerRound : startRound;
    document.getElementById('btn').disabled=false;
    document.getElementById('btn').style.display='';
    document.querySelectorAll('.game-nav-btn').forEach(b => b.disabled = false);
  }
}

// ── Keyboard ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.code!=='Space') return;
  e.preventDefault(); if(e.repeat) return;
  keyIsDown=true;
  if(gamePhase==='playing'||gamePhase==='countdown') handlePress();
  else if(gamePhase==='idle'||gamePhase==='done'){
    if(document.getElementById('game-screen').style.display!=='none')
      document.getElementById('btn').click();
  }
});
document.addEventListener('keyup',e=>{
  if(e.code!=='Space') return;
  keyIsDown=false; handleRelease();
});

// ── Inject real quarter-rest image into menu SVGs on load ─────────────────────
function injectMenuRests() {
  document.querySelectorAll('.menu-rest-placeholder').forEach(el => {
    const x  = parseFloat(el.getAttribute('data-x'));
    const img = document.createElementNS('http://www.w3.org/2000/svg','image');
    // staff spans y=10..42, height=32px in menu SVG coords; rest is 90% of that
    const h = 32 * 0.72, w = h * 0.3441;
    img.setAttribute('x', x - w/2);
    img.setAttribute('y', 10 + (32 - h)/2);
    img.setAttribute('width',  w);
    img.setAttribute('height', h);
    img.setAttribute('href', 'data:image/png;base64,' + QREST_B64);
    el.parentNode.replaceChild(img, el);
  });
}
function injectMenuEighths() {
  const imgH = 48.9, imgW = 61.4;
  const headFracX = 0.532, headFracY = 0.349, headY = 26;
  document.querySelectorAll('.menu-eighth-placeholder').forEach(el => {
    const cx = parseFloat(el.getAttribute('data-cx'));
    const img = document.createElementNS('http://www.w3.org/2000/svg', 'image');
    img.setAttribute('x',      cx - headFracX * imgW);
    img.setAttribute('y',      headY - headFracY * imgH);
    img.setAttribute('width',  imgW);
    img.setAttribute('height', imgH);
    img.setAttribute('href', 'data:image/png;base64,' + EIGHTH_B64);
    el.parentNode.replaceChild(img, el);
  });
}
document.addEventListener('DOMContentLoaded', injectMenuEighths);

// ── HASH ROUTING ─────────────────────────────────────────────────────────────
function setRhythmHash(route) {
  window._settingHash = true;
  window.location.hash = route ? '#rhythm/' + route : '#rhythm/';
  setTimeout(function() { window._settingHash = false; }, 50);
}

function navigateRhythmHash(hash) {
  hash = hash.replace(/^#\/?/, '');
  if (hash.startsWith('rhythm/')) hash = hash.slice(7);
  if (!hash || hash === 'rhythm') return; // just show menu, initApp handles that

  var m = hash.match(/^level([1-9])$/);
  if (m) {
    var lvl = parseInt(m[1]);
    if (LEVELS[lvl]) { openModal(lvl); }
  }
}

window.addEventListener('hashchange', function() {
  if (window._settingHash) return;
  navigateRhythmHash(window.location.hash);
});

initApp();
