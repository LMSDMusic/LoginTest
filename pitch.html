<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LMSD Common Music Assessments: Pitch</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #f0f4ff;
    --surface:    #ffffff;
    --blue:       #3b6ef8;
    --blue-dark:  #2a5ce0;
    --blue-light: #e8effe;
    --text:       #1a1f36;
    --muted:      #6b7280;
    --border:     #dde3f0;
    --green:      #2f855a;
    --red:        #c53030;
    --cream:      #f0f4ff;
    --parchment:  #dde3f0;
    --navy:       #1a1f36;
    --navy-mid:   #2a5ce0;
    --gold:       #3b6ef8;
    --gold-light: #e8effe;
    /* Ensemble themes */
    --orch-bg:     #f0ecf8;
    --orch-border: #c9bce8;
    --orch-icon:   #6b4faa;
    --orch-hover:  #e6dff5;
    --band-bg:     #fdf4e3;
    --band-border: #e8d099;
    --band-icon:   #a07820;
    --band-hover:  #faefd4;
    /* Instrument colors */
    --violin-color: #a33030;
    --viola-color:  #2a7a6a;
    --cello-color:  #b06a10;
    --bass-color:   #1a5c7a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--cream);
    background-image: repeating-linear-gradient(transparent, transparent 39px, #c8c0b0 39px, #c8c0b0 40px);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    padding: 20px;
  }

  .card {
    background: white;
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(26,39,68,0.15), 0 2px 8px rgba(26,39,68,0.08);
    max-width: 580px;
    width: 100%;
    overflow: hidden;
    animation: slideUp 0.4s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── HEADER ── */
  .header {
    background: var(--navy);
    padding: 20px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .header h1 {
    font-family: 'DM Serif Display', serif;
    color: white;
    font-size: 1.15rem;
    letter-spacing: 0.02em;
    line-height: 1.3;
  }
  .header h1 span {
    display: block;
    font-size: 0.75rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.04em;
    margin-bottom: 2px;
  }
  .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .key-badge {
    background: var(--gold);
    color: var(--navy);
    font-size: 0.72rem;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .back-btn {
    background: rgba(255,255,255,0.15);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 5px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .back-btn:hover { background: rgba(255,255,255,0.28); }

  /* ── PROGRESS ── */
  .progress-bar-wrap { background: var(--parchment); height: 6px; }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    transition: width 0.5s ease;
  }

  /* ── SHARED MENU STYLES ── */
  .menu-body { padding: 32px 28px; animation: slideUp 0.35s ease; }
  .menu-intro {
    font-family: 'DM Serif Display', serif;
    font-size: 1.35rem;
    color: var(--navy);
    margin-bottom: 5px;
  }
  .menu-sub { color: var(--muted); font-size: 0.88rem; margin-bottom: 24px; line-height: 1.5; }


  /* ── FOLDER CARDS (home / group screens) ── */
  .folder-cards { display: flex; flex-direction: column; gap: 12px; }
  .folder-card {
    display: flex; align-items: center; gap: 16px;
    background: var(--cream); border: 2px solid var(--parchment);
    border-radius: 14px; padding: 18px 20px;
    cursor: pointer; transition: all 0.2s ease; text-align: left;
  }
  .folder-card:hover {
    border-color: var(--navy); background: white;
    box-shadow: 0 4px 16px rgba(26,39,68,0.12); transform: translateY(-2px);
  }
  .folder-card.orch { background: var(--orch-bg); border-color: var(--orch-border); }
  .folder-card.orch:hover { background: var(--orch-hover); border-color: var(--orch-icon); }
  .folder-card.orch .folder-icon { background: var(--orch-icon); }
  .folder-card.orch .folder-arrow { color: var(--orch-icon); }
  .folder-card.band { background: var(--band-bg); border-color: var(--band-border); }
  .folder-card.band:hover { background: var(--band-hover); border-color: var(--band-icon); }
  .folder-card.band .folder-icon { background: var(--band-icon); }
  .folder-card.band .folder-arrow { color: var(--band-icon); }
  .folder-icon {
    font-size: 1.5rem; width: 50px; height: 50px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--navy); border-radius: 12px;
  }
  .folder-info { flex: 1; }
  .folder-title { font-family: 'DM Serif Display', serif; font-size: 1.05rem; color: var(--navy); margin-bottom: 2px; }
  .folder-desc  { font-size: 0.8rem; color: var(--muted); }
  .folder-arrow { color: var(--muted); font-size: 1.4rem; }
  .folder-card:hover .folder-arrow { color: var(--navy); }

  /* ── QUIZ CARDS (instrument level) ── */
  .quiz-cards { display: flex; flex-direction: column; gap: 12px; }
  .quiz-quarter-divider {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted);
    padding: 4px 0 2px 2px; margin-top: 8px;
    border-top: 1px solid var(--parchment);
  }
  .quiz-quarter-divider:first-child { margin-top: 0; border-top: none; }
  .quiz-card {
    display: flex; align-items: center; gap: 16px;
    background: var(--cream); border: 2px solid var(--parchment);
    border-radius: 14px; padding: 16px 20px;
    cursor: pointer; transition: all 0.2s ease; text-align: left;
  }
  .quiz-card:hover {
    background: white; box-shadow: 0 4px 16px rgba(26,39,68,0.12); transform: translateY(-2px);
  }
  .quiz-card-icon {
    font-size: 1.6rem; width: 48px; height: 48px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--navy); border-radius: 10px; color: white;
  }
  /* Instrument card: tinted background + border, icon stays navy */
  .quiz-card.violin { background: #f9f0f0; border-color: #d9b0b0; }
  .quiz-card.violin:hover { background: #f4e3e3; border-color: var(--violin-color); }
  .quiz-card.viola  { background: #eef6f5; border-color: #a8cdc8; }
  .quiz-card.viola:hover  { background: #ddf0ed; border-color: var(--viola-color); }
  .quiz-card.cello  { background: #fdf5ea; border-color: #dfc49a; }
  .quiz-card.cello:hover  { background: #faecd5; border-color: var(--cello-color); }
  .quiz-card.bass   { background: #eef4f8; border-color: #9bbfcf; }
  .quiz-card.bass:hover   { background: #daeaf3; border-color: var(--bass-color); }
  .quiz-card-title { font-family: 'DM Serif Display', serif; font-size: 1rem; color: var(--navy); margin-bottom: 2px; }
  .quiz-card-desc  { font-size: 0.78rem; color: var(--muted); }
  .quiz-card-arrow { color: var(--muted); font-size: 1.4rem; margin-left: auto; flex-shrink: 0; }
  .quiz-card:hover .quiz-card-arrow { color: var(--navy); }

  /* ── QUIZ BODY ── */
  .body { padding: 28px; }
  .question-label {
    font-size: 0.78rem; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
  }
  .question-text {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem; color: var(--navy); margin-bottom: 20px;
  }
  .staff-container {
    background: var(--cream);
    border: 2px solid var(--parchment);
    border-radius: 12px;
    padding: 12px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px; min-height: 210px;
  }
  .staff-img { height: 180px; object-fit: contain; display: block; }

  .answers-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px; margin-bottom: 20px;
  }
  /* 7-option layout (Q1/Q2): 4+3 */
  .answers-grid.opts-7 .answer-btn:nth-child(5) { grid-column: 1; }
  .answers-grid.opts-7 .answer-btn:nth-child(6) { grid-column: 2; }
  .answers-grid.opts-7 .answer-btn:nth-child(7) { grid-column: 3; }
  /* 9-option layout (Q3/Q4): 4 columns, C and F notes paired */
  .answers-grid.opts-9 { grid-template-columns: repeat(4, 1fr); }
  /* Pair cell: two small stacked buttons sharing one grid column */
  .btn-pair {
    display: flex;
    flex-direction: row;
    gap: 5px;
  }
  .btn-pair .answer-btn {
    padding: 14px 2px;
    font-size: 0.78rem;
    flex: 1;
    min-width: 0;
  }

  /* Fingering layout: all buttons in one row, compact */
  .answers-grid.opts-finger {
    grid-template-columns: repeat(var(--finger-cols), 1fr);
    gap: 6px;
  }
  .answers-grid.opts-finger .answer-btn {
    padding: 10px 4px;
    font-size: 0.78rem;
  }

  .answer-btn {
    background: var(--parchment);
    border: 2px solid transparent;
    border-radius: 10px; padding: 14px 8px;
    font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600;
    color: var(--navy); cursor: pointer; transition: all 0.18s ease; text-align: center;
  }
  .answer-btn:hover:not(:disabled) {
    background: var(--navy); color: white; border-color: var(--navy);
    transform: translateY(-2px); box-shadow: 0 4px 12px rgba(26,39,68,0.2);
  }
  .answer-btn.correct        { background: var(--green); color: white; border-color: var(--green); }
  .answer-btn.wrong          { background: var(--red);   color: white; border-color: var(--red); }
  .answer-btn.reveal-correct { background: var(--green); color: white; border-color: var(--green); opacity: 0.7; }
  .answer-btn:disabled       { cursor: default; transform: none; }
  .answer-btn.trainer-locked { visibility: hidden; pointer-events: none; }

  .feedback {
    min-height: 36px; font-size: 1.1rem; font-weight: 700;
    text-align: center; margin-bottom: 4px; line-height: 36px;
  }
  .feedback.correct { color: var(--green); }
  .feedback.wrong   { color: var(--red); }

  .next-btn {
    display: block; width: 100%; padding: 14px;
    background: var(--navy); color: white; border: none; border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600;
    cursor: pointer; transition: background 0.2s, transform 0.15s;
    letter-spacing: 0.03em; margin-top: 16px;
  }
  .next-btn:hover    { background: var(--navy-mid); transform: translateY(-1px); }
  .next-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

  /* ── SCORE SCREEN ── */
  .score-screen { padding: 36px 28px; text-align: center; animation: slideUp 0.4s ease; }
  .score-circle {
    width: 120px; height: 120px; border-radius: 50%; background: var(--navy);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    margin: 0 auto 24px; box-shadow: 0 8px 24px rgba(26,39,68,0.3);
  }
  .score-num   { font-family: 'DM Serif Display', serif; font-size: 2.2rem; color: var(--gold-light); line-height: 1; }
  .score-denom { font-size: 0.8rem; color: rgba(255,255,255,0.6); margin-top: 2px; }
  .score-title { font-family: 'DM Serif Display', serif; font-size: 1.7rem; color: var(--navy); margin-bottom: 8px; }
  .score-sub   { color: var(--muted); font-size: 0.95rem; margin-bottom: 28px; line-height: 1.5; }
  .results-list {
    text-align: left; background: var(--cream); border-radius: 12px;
    padding: 16px; margin-bottom: 16px; max-height: 240px; overflow-y: auto;
  }
  .result-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid var(--parchment); font-size: 0.9rem;
  }
  .result-item:last-child { border-bottom: none; }
  .q-label { color: var(--muted); font-size: 0.8rem; }
  .r-note  { font-weight: 600; color: var(--navy); }
  .r-icon  { font-size: 1rem; }

  .score-btn-row { display: flex; gap: 10px; }
  .score-time { font-size: 0.85rem; color: var(--muted); margin-bottom: 20px; letter-spacing: 0.02em; }
  .replay-btn {
    flex: 1; padding: 14px; background: var(--gold); color: var(--navy);
    border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif;
    font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.2s;
  }
  .replay-btn:hover { background: var(--gold-light); }
  .menu-btn {
    flex: 1; padding: 14px; background: var(--parchment); color: var(--navy);
    border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif;
    font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s;
  }
  .menu-btn:hover { background: #ddd8ce; }
  /* ── TRAINER ── */
  .trainer-progress {
    display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
    padding: 10px 16px 4px; margin-bottom: 2px;
  }
  .trainer-pip {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 36px; height: 32px; border-radius: 8px; padding: 0 10px;
    font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 700;
    border: 2px solid #ccc; background: var(--parchment); color: #bbb;
    transition: all 0.3s ease;
  }
  .trainer-pip.unlocked {
    background: var(--navy); color: var(--gold-light); border-color: var(--navy);
  }
  .trainer-pip.new-note {
    background: var(--gold); color: var(--navy); border-color: var(--gold);
    animation: pip-pop 0.45s ease;
  }
  @keyframes pip-pop {
    0%   { transform: scale(0.7); }
    60%  { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  .trainer-streak {
    font-size: 0.78rem; color: var(--muted); text-align: center;
    min-height: 18px; margin-bottom: 2px; letter-spacing: 0.02em;
  }
  .trainer-new-note-banner {
    position: absolute; top: 6px; left: 0; right: 0;
    font-size: 1.1rem; font-weight: 700; text-align: center; line-height: 36px;
    color: var(--green); pointer-events: none;
  }
  .trainer-card {
    border: 2px solid var(--gold);
    background: linear-gradient(135deg, #fffdf0 0%, #fff8e0 100%);
  }
  .trainer-card:hover {
    background: linear-gradient(135deg, #fff8d6 0%, #ffeea0 100%);
    border-color: #c8a000;
  }
  .congrats-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center; z-index: 100;
    animation: fadeIn 0.3s ease;
  }
  .congrats-box {
    background: white; border-radius: 20px; padding: 40px 36px;
    text-align: center; max-width: 320px; width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: slideUp 0.4s ease;
  }
  .congrats-emoji { font-size: 3rem; margin-bottom: 12px; }
  .congrats-title { font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: var(--navy); margin-bottom: 8px; }
  .congrats-sub   { color: var(--muted); font-size: 0.95rem; margin-bottom: 24px; line-height: 1.5; }
  .congrats-btn   {
    width: 100%; padding: 14px; background: var(--navy); color: white;
    border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif;
    font-size: 1rem; font-weight: 700; cursor: pointer;
  }
  .congrats-btn:hover { background: var(--navy-mid); }
  /* ── SUBMISSION PANEL ── */
  .saved-student {
    background: #f0f7ff; border: 1.5px solid #b3d4f5; border-radius: 8px;
    padding: 10px 14px; margin-bottom: 12px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .saved-student-name { font-weight: 600; color: var(--navy); font-size: 0.95rem; }
  .saved-student-sub  { font-size: 0.78rem; color: var(--muted); margin-top: 1px; }
  .not-you-btn {
    background: none; border: 1.5px solid #b3d4f5; border-radius: 6px;
    color: var(--navy); font-size: 0.78rem; font-weight: 600;
    padding: 4px 10px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
  }
  .not-you-btn:hover { background: #ddeeff; }
  .chor      { --ens-color: #6a3d9a; }
  .chor-inst { --inst-color: #6a3d9a; }
  .quiz-card.chor-inst { background: #f5f0fb; border-color: #c9aeed; }
  .quiz-card.chor-inst:hover { background: #ede5f7; border-color: #6a3d9a; }
  .folder-card.chor { background: #f5f0fb; border-color: #c9aeed; }
  .folder-card.chor:hover { background: #ede5f7; border-color: #6a3d9a; }
  .band-inst { --inst-color: #c75000; --inst-light: #fff3ed; }
  .quiz-card.band-inst { background: #fff3ed; border-color: #f0b99a; }
  .quiz-card.band-inst:hover { background: #ffe8d6; border-color: #c75000; }
  .submit-panel {
    background: var(--cream); border: 2px solid var(--parchment);
    border-radius: 12px; padding: 20px; margin-bottom: 16px; text-align: left;
  }
  .submit-panel-title {
    font-family: 'DM Serif Display', serif; font-size: 1rem;
    color: var(--navy); margin-bottom: 14px;
  }
  .submit-field { margin-bottom: 12px; }
  .submit-field label {
    display: block; font-size: 0.78rem; font-weight: 600;
    color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 5px;
  }
  .submit-field select,
  .submit-field input[type="text"] {
    width: 100%; padding: 10px 12px;
    border: 2px solid var(--parchment); border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
    color: var(--navy); background: white;
    transition: border-color 0.2s; outline: none;
  }
  .submit-field select:focus,
  .submit-field input[type="text"]:focus { border-color: var(--navy); }
  .submit-btn {
    display: block; width: 100%; padding: 14px;
    background: var(--green); color: white; border: none; border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600;
    cursor: pointer; transition: background 0.2s; margin-bottom: 12px;
  }
  .submit-btn:hover:not(:disabled) { background: #236650; }
  .submit-btn:disabled { opacity: 0.5; cursor: default; }
  .submit-status {
    text-align: center; font-size: 0.9rem; font-weight: 600;
    min-height: 22px; margin-bottom: 8px;
  }
  .submit-status.success { color: var(--green); }
  .submit-status.error   { color: var(--red); }

  /* ── PROFILE MODAL ── */
  .profile-overlay {
    position: fixed; inset: 0; background: rgba(20,30,60,0.55);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; padding: 20px; overflow-y: auto;
  }
  .onboarding-card {
    background: white; border: 2px solid var(--parchment);
    border-radius: 16px; padding: 2rem; width: 100%; max-width: 460px;
    box-shadow: 0 8px 48px rgba(26,39,68,0.25);
  }
  .onboarding-title {
    font-family: 'DM Serif Display', serif; font-size: 1.3rem;
    color: var(--navy); margin-bottom: .4rem;
  }
  .onboarding-sub {
    font-size: .85rem; color: var(--muted); margin-bottom: 1.25rem; line-height: 1.5;
  }
  .student-num-wrap {
    display: flex; align-items: center;
    border: 2px solid var(--parchment); border-radius: 8px;
    background: white; overflow: hidden;
    transition: border-color 0.2s; width: 100%;
  }
  .student-num-wrap:focus-within { border-color: var(--navy); }
  .student-num-prefix, .student-num-suffix {
    padding: 10px 8px;
    font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
    color: var(--muted); background: var(--cream);
    white-space: nowrap; user-select: none; flex-shrink: 0;
  }
  .student-num-prefix { border-right: 1.5px solid var(--parchment); }
  .student-num-suffix { border-left: 1.5px solid var(--parchment); flex: 1; }
  .student-num-wrap input[type="text"] {
    width: 6.5ch !important; flex-shrink: 0 !important;
    border: none !important; border-radius: 0 !important;
    padding: 10px 4px !important;
    font-size: 0.95rem; color: var(--navy); background: white;
    text-align: center; outline: none;
  }
  /* ── INFO CARD (menus) ── */
  .info-card {
    background: var(--cream); border: 1.5px solid var(--parchment);
    border-radius: 10px; padding: 10px 14px; margin: 0 28px 4px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;

function buildMultiKeyQuiz(clefType, pool, isBassTransposed, count) {
  // Build all (note × key) combinations, shuffle, take `count`
  count = count || 15;
  const all = [];
  for (const keyId of KEY_IDS) {
    const keyDef = KEYS[keyId];
    const clefImg = keyDef.clef[clefType];
    for (const note of pool) {
      // Skip note+key combinations outside the curriculum scope
      if (note.excludeInKeys && note.excludeInKeys.includes(keyId)) continue;
      const answer = applyKey(note.noteName, keyId);
      // For bass (transposed), shift label down one octave
      let label = note.label;
      if (isBassTransposed) {
        label = label.replace(/\d/, n => String(parseInt(n) - 1));
      }
      all.push({
        noteFile: note.noteFile,
        clefImg,
        clefLabel: keyDef.label,
        keyLabel: keyDef.label,
        answer,
        label,
      });
    }
  }
  // Fisher-Yates shuffle then take 15
  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [all[i], all[j]] = [all[j], all[i]];
  }
  return all.slice(0, count);
}



// ── FINGERING QUIZ BUILDERS ───────────────────────────────────────
// buildFixedFingeringQuiz: for single-key quarters (Q1, Q2)
// fingerByFile: { 'images/note5.png': '0', ... }
function buildFixedFingeringQuiz(pool, fingerByFile, stringByFile) {
  const shuffled = [...pool];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled.map(note => ({
    noteFile:     note.noteFile,
    answer:       fingerByFile[note.noteFile],
    answerString: stringByFile ? stringByFile[note.noteFile] : undefined,
    label:        note.label,
  }));
}

// buildMultiKeyFingeringQuiz: for multi-key quarters (Q3, Q4)
// baseFingerByFile: { 'images/note5.png': '0', ... } — finger when note is natural/default
// lowTwoFiles: set of noteFiles where noteName is F or C
//   — in those cases: if key has that note sharped → '2', else → 'Low 2'
// lowTwoNoteName: the noteName ('F' or 'C') associated with each lowTwoFile
function buildMultiKeyFingeringQuiz(clefType, pool, baseFingerByFile, lowTwoMap, isBassTransposed, count, lowOneMap, sharpThreeMap, sharpFourMap, sharpShiftMap, stringByFile) {
  // lowTwoMap:    { noteFile: noteLetter } — violin/viola: sharped → '2', natural → 'Low 2'
  // lowOneMap:    { noteFile: noteLetter } — violin: sharped → '1', natural → 'Low 1'
  // sharpThreeMap:{ noteFile: noteLetter } — cello: sharped → '3', natural → '2'
  // sharpFourMap: { noteFile: noteLetter } — bass: sharped → '4', natural → '2'
  // sharpShiftMap:{ noteFile: noteLetter } — bass: sharped → 'Shift 2', natural → 'Shift 1'
  lowTwoMap     = lowTwoMap     || {};
  lowOneMap     = lowOneMap     || {};
  sharpThreeMap = sharpThreeMap || {};
  sharpFourMap  = sharpFourMap  || {};
  sharpShiftMap = sharpShiftMap || {};
  count = count || 15;
  const all = [];
  for (const keyId of KEY_IDS) {
    const keyDef  = KEYS[keyId];
    const clefImg = keyDef.clef[clefType];
    for (const note of pool) {
      // Skip note+key combinations outside the curriculum scope
      if (note.excludeInKeys && note.excludeInKeys.includes(keyId)) continue;
      let finger;
      if (sharpShiftMap.hasOwnProperty(note.noteFile)) {
        const noteLetter = sharpShiftMap[note.noteFile];
        finger = keyDef.sharps.includes(noteLetter) ? 'Shift 2' : 'Shift 1';
      } else if (sharpFourMap.hasOwnProperty(note.noteFile)) {
        const noteLetter = sharpFourMap[note.noteFile];
        finger = keyDef.sharps.includes(noteLetter) ? '4' : '2';
      } else if (sharpThreeMap.hasOwnProperty(note.noteFile)) {
        const noteLetter = sharpThreeMap[note.noteFile];
        finger = keyDef.sharps.includes(noteLetter) ? '3' : '2';
      } else if (lowTwoMap.hasOwnProperty(note.noteFile)) {
        const noteLetter = lowTwoMap[note.noteFile];
        finger = keyDef.sharps.includes(noteLetter) ? '2' : 'Low 2';
      } else if (lowOneMap.hasOwnProperty(note.noteFile)) {
        const noteLetter = lowOneMap[note.noteFile];
        finger = keyDef.sharps.includes(noteLetter) ? '1' : 'Low 1';
      } else {
        finger = baseFingerByFile[note.noteFile];
      }
      let label = note.label;
      if (isBassTransposed) {
        label = label.replace(/\d/, n => String(parseInt(n) - 1));
      }
      all.push({
        noteFile:     note.noteFile,
        clefImg,
        clefLabel:    keyDef.label,
        keyLabel:     keyDef.label,
        answer:       finger,
        answerString: stringByFile ? stringByFile[note.noteFile] : undefined,
        label,
      });
    }
  }
  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [all[i], all[j]] = [all[j], all[i]];
  }
  return all.slice(0, count);
}

// ── HELPERS ──────────────────────────────────────────────────────
function buildRandomQuiz(pool) {
  // Fisher-Yates shuffle — every note appears exactly once, no repeats
  const shuffled = [...pool];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled;
}

function getMessage(sc, total) {
  const pct = sc / total;
  if (pct === 1)   return "Perfect score! Outstanding musicianship! 🎶";
  if (pct >= 0.75) return "Great work! You're reading notes well.";
  if (pct >= 0.5)  return "Good effort! Keep practicing the staff.";
  return "Keep practicing — you'll get there! 🎵";
}

function formatTime(ms) {
  const totalSec = Math.round(ms / 1000);
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  if (m === 0) return `${s}s`;
  return `${m}m ${s.toString().padStart(2, '0')}s`;
}

  const ic  = activeInstrument.colorClass;

  const quarterDefs = [
    { id: 'q1', label: 'Quarter 1' },
    { id: 'q2', label: 'Quarter 2' },
    { id: 'q3', label: 'Quarter 3' },
    { id: 'q4', label: 'Quarter 4' },
  ];

  // Collect all (quarter × quizId) combinations for this instrument
  const quizIds = activeInstrument.quizIds || [instrumentId];

  let cardsHtml = '';
  let lastQuarter = null;
  for (const q of quarterDefs) {
    const key      = quizKey(ensembleId, grade, q.id);
    const folderId = FOLDER_MAP[key];
    const folder   = folderId ? getFolder(folderId) : null;

    // Check if this quarter has any content worth showing
    const hasAny = quizIds.some(function(qId) {
      return !!(folder && folder.quizzes.find(function(qz){ return qz.id === qId; }));
    });
    if (!hasAny && !folder) continue; // skip quarters with no folder at all

    // Quarter divider
    if (q.id !== lastQuarter) {
      lastQuarter = q.id;
      cardsHtml += '<div class="quiz-quarter-divider">' + q.label + '</div>';
    }

    for (const qId of quizIds) {
      const quiz  = folder ? folder.quizzes.find(function(qz){ return qz.id === qId; }) : null;
      const ready = !!(folder && quiz);

      // Label: "Quarter 1 – Note Names" or "Quarter 1 – Fingering"
      const isFingerQuiz = qId.includes('fingering');
      const typeLabel    = isFingerQuiz ? 'Fingering' : 'Note Names';
      const cardTitle    = q.label + ' \u2013 ' + typeLabel;

      const clickAttr = ready ? 'onclick="launchQuiz(\'' + folderId + '\',\'' + qId + '\')"' : '';
      const styleAttr = ready ? '' : 'opacity:0.6;cursor:default';
      const desc      = ready ? quiz.desc : 'Coming soon';
      const arrow     = ready ? '\u203a' : '';

      // If this quiz has a trainer, inject a Trainer card right before the quiz card
      if (ready && quiz.trainer && !isFingerQuiz) {
        cardsHtml +=
          '<div class="quiz-card ' + ic + ' trainer-card" onclick="launchTrainer(\'' + folderId + '\',\'' + qId + '\')">' +
            '<div class="quiz-card-icon" style="font-size:0.72rem;font-weight:700;line-height:1.2;text-align:center;">' +

            '</div>' +
            '<div>' +
              '<div class="quiz-card-title">' + q.label + ' \u2013 Note Trainer</div>' +
              '<div class="quiz-card-desc">Learn notes step-by-step · Progressive unlock</div>' +
            '</div>' +
            '<div class="quiz-card-arrow">\u203a</div>' +
          '</div>';
      }

      cardsHtml +=
        '<div class="quiz-card ' + ic + '" ' + clickAttr + ' style="' + styleAttr + '">' +
          '<div class="quiz-card-icon" style="font-size:0.72rem;font-weight:700;line-height:1.2;text-align:center;">' +
            q.label.replace('Quarter ','Q') + '<br>' + (isFingerQuiz ? '\uD83C\uDFBB' : '\uD83C\uDFBC') +
          '</div>' +
          '<div>' +
            '<div class="quiz-card-title">' + cardTitle + '</div>' +
            '<div class="quiz-card-desc">' + desc + '</div>' +
          '</div>' +
          '<div class="quiz-card-arrow">' + arrow + '</div>' +
        '</div>';
    }
  }

  const ensTitle  = activeEnsemble.title;
  const instTitle = activeInstrument.title;
  document.getElementById('app').innerHTML =

}

// ── TRAINER ENGINE ───────────────────────────────────────────────
// State
let trainerNotes      = [];   // full ordered sequence from quiz.trainerNotes
let trainerUnlocked   = 0;    // index of highest unlocked note (0-based; 0 = first note active)
let trainerNewStreak  = 0;    // correct answers on the newest note since it was introduced
let trainerAnswered   = false;
let trainerMode       = false; // true only when trainer is actively running
let trainerForceNew   = false; // true when the next question must be the newest note
let trainerShownBanner = new Set(); // indices of notes whose "New Note" banner has been shown
let trainerFolder     = null;
let trainerQuiz       = null;
let trainerCurrentQ   = null; // { noteFile, answer, label }
let trainerLastAnswer = null; // answer of last question shown (for no-repeat suppression)

function launchTrainer(folderId, quizId) {
  trainerFolder  = getFolder(folderId);
  trainerQuiz    = trainerFolder.quizzes.find(q => q.id === quizId);
  trainerNotes   = trainerQuiz.trainerNotes.slice();
  trainerUnlocked  = 0;
  trainerNewStreak = 0;
  trainerAnswered  = false;
  trainerLastAnswer = null;
  trainerMode      = true;
  trainerForceNew  = true;  // always ask the first note first
  trainerShownBanner = new Set();
  quizStartTime    = Date.now();  // reuse quizStartTime for elapsed time on completion
  activeFolder  = trainerFolder;
  activeQuiz    = trainerQuiz;
  // Set hash so exit/back works
  if (activeEnsemble && activeGrade && activeInstrument) {
    const qm   = folderId.match(/q([0-9])/);
    const qnum = qm ? 'q' + qm[1] : folderId;
    setHash(activeEnsemble.id + '/' + activeGrade + '/' + activeInstrument.id + '/' + qnum + '/trainer');
  }
  renderTrainer();
}

function trainerPickQuestion() {
  // Pick a random note from the unlocked set (indices 0..trainerUnlocked)
  // Suppress repeating the same answer as the last question, unless only one note is available
  const pool = trainerNotes.slice(0, trainerUnlocked + 1);
  if (pool.length === 1) return pool[0];
  const noRepeat = pool.filter(n => n.answer !== trainerLastAnswer);
  const candidates = noRepeat.length > 0 ? noRepeat : pool;
  return candidates[Math.floor(Math.random() * candidates.length)];
}

function trainerVisibleOptions() {
  // Always return ALL noteOptions so button positions never shift.
  // Locked buttons are rendered but invisible (via 'trainer-locked' class).
  return trainerQuiz.noteOptions;
}

function buildTrainerAnswerButtons(opts) {
  // Same layout logic as buildAnswerButtons but locked notes get invisible placeholder buttons
  const unlocked = trainerNotes.slice(0, trainerUnlocked + 1).map(n => n.answer);
  const NOTE_ORDER = ['A\u266d','A','B\u266d','B','C','C#','D','E\u266d','E','F','F#','G'];

  const letterMap = {};
  opts.forEach(function(n) {
    var letter = n.replace(/[\u266d#]/g, '');
    if (!letterMap[letter]) letterMap[letter] = [];
    letterMap[letter].push(n);
  });

  var isNoteQuiz = opts.some(function(n) { return NOTE_ORDER.includes(n); });
  if (!isNoteQuiz) {
    return opts.map(function(n) {
      var isLocked = !unlocked.includes(n);
      var cls = 'answer-btn' + (isLocked ? ' trainer-locked' : '');
      var dis = isLocked ? ' disabled' : '';
      return '<button class="' + cls + '" data-value="' + n + '"' + dis + ' onclick="selectAnswer(\'' + n + '\', this)">' + n + '</button>';
    }).join('');
  }

  var seen = {};
  var slots = [];
  NOTE_ORDER.forEach(function(n) {
    if (!opts.includes(n)) return;
    var letter = n.replace(/[\u266d#]/g, '');
    if (seen[letter]) return;
    seen[letter] = true;
    var variants = letterMap[letter] || [n];
    if (variants.length > 1) {
      var btns = variants.map(function(v) {
        var isLocked = !unlocked.includes(v);
        var cls = 'answer-btn' + (isLocked ? ' trainer-locked' : '');
        var dis = isLocked ? ' disabled' : '';
        return '<button class="' + cls + '" data-value="' + v + '"' + dis + ' onclick="selectAnswer(\'' + v + '\', this)">' + displayNote(v) + '</button>';
      }).join('');
      slots.push('<div class="btn-pair">' + btns + '</div>');
    } else {
      var isLocked = !unlocked.includes(n);
      var cls = 'answer-btn' + (isLocked ? ' trainer-locked' : '');
      var dis = isLocked ? ' disabled' : '';
      slots.push('<button class="' + cls + '" data-value="' + n + '"' + dis + ' onclick="selectAnswer(\'' + n + '\', this)">' + displayNote(n) + '</button>');
    }
  });
  return slots.join('');
}

function renderTrainer(animateNewNote) {
  trainerAnswered  = false;
  // If forced, always ask the newest note first; otherwise pick randomly
  if (trainerForceNew) {
    trainerCurrentQ = trainerNotes[trainerUnlocked];
    trainerForceNew = false;
  } else {
    trainerCurrentQ = trainerPickQuestion();
  }
  trainerLastAnswer = trainerCurrentQ.answer;

  const q         = trainerCurrentQ;
  const clefImg   = q.clefImg   || trainerQuiz.clefImg;
  const clefLabel = q.clefLabel || trainerQuiz.clefLabel;
  const opts      = trainerVisibleOptions();
  const newNote   = trainerNotes[trainerUnlocked].answer;
  const isNewNote = q.answer === newNote;

  // Progress pips
  const pipsHtml = trainerNotes.map(function(n, i) {
    let cls = 'trainer-pip';
    if (i < trainerUnlocked) cls += ' unlocked';
    else if (i === trainerUnlocked) cls += (animateNewNote && i > 0) ? ' new-note' : ' unlocked';
    return '<div class="' + cls + '">' + displayNote(n.answer) + '</div>';
  }).join('');

  const threshold  = trainerUnlocked === 0 ? 2 : 3;
  const remaining  = threshold - trainerNewStreak;
  const streakHint = trainerUnlocked < trainerNotes.length - 1
    ? (remaining === 1
        ? '⭐ One more correct \u2018' + displayNote(newNote) + '\u2019 to unlock the next note!'
        : remaining === 2
          ? '⭐ Two more correct \u2018' + displayNote(newNote) + '\u2019 to unlock the next note!'
          : 'Identify \u2018' + displayNote(newNote) + '\u2019 correctly ' + threshold + ' times to unlock the next note')
    : '';

  const isNewNoteQ = q.answer === newNote;
  const showBanner = isNewNoteQ && !trainerShownBanner.has(trainerUnlocked);
  if (showBanner) trainerShownBanner.add(trainerUnlocked);
  const newNoteBanner = showBanner
    ? '<div class="trainer-new-note-banner">New Note: ' + displayNote(newNote) + '</div>'
    : '';

  // Build buttons — all notes always rendered, locked ones invisible
  const btnsHtml = buildTrainerAnswerButtons(opts);

  const gridClass = opts.length >= 6 ? 'answers-grid opts-7' : 'answers-grid';

  // Full render
  document.getElementById('app').innerHTML =
    '<div class="header">' +
      '<h1>' +
        '<span>' + trainerFolder.title + ' \u2013 ' + trainerFolder.subtitle + '</span>' +
        '🎓 Note Trainer: ' + trainerQuiz.title +
        nameStripHTML() +
      '</h1>' +
      '<div class="header-right">' +
        '<span class="key-badge">' + clefLabel + '</span>' +
        '<button class="back-btn" onclick="renderLevelMenu()">✕ Exit</button>' +
      '</div>' +
    '</div>' +
    '<div class="trainer-progress" id="trainer-progress">' + pipsHtml + '</div>' +
    '<div class="trainer-streak" id="trainer-streak">' + streakHint + '</div>' +
    '<div class="body">' +
      '<div class="question-text" style="margin-top:4px;">What note is shown on the staff?</div>' +
      '<div class="staff-container" style="position:relative;">' +
        newNoteBanner +
        '<img src="' + clefImg + '" id="staff-clef" class="staff-img" alt="Clef" />' +
        '<img src="' + q.noteFile + '" id="staff-note" class="staff-img" alt="Note on staff" />' +
      '</div>' +
      '<div class="' + gridClass + '" id="answers-grid">' + btnsHtml + '</div>' +
      '<div class="feedback" id="feedback"></div>' +
    '</div>';
}


function nextQuestion() {
  currentQ++;
  answered = false;
  currentQ < totalQ() ? renderQuestion() : renderScore();
}

function selectTrainerAnswer(chosen, btn) {
  if (trainerAnswered) return;
  trainerAnswered = true;

  const q       = trainerCurrentQ;
  const correct = chosen === q.answer;
  const newNote = trainerNotes[trainerUnlocked].answer;

  document.querySelectorAll('.answer-btn').forEach(b => b.disabled = true);

  if (correct) {
    btn.classList.add('correct');
    document.getElementById('feedback').textContent = '✓ Correct!';
    document.getElementById('feedback').className   = 'feedback correct';

    // Track streak only for the newest (unlocked frontier) note
    if (q.answer === newNote) {
      trainerNewStreak++;
    } else {
      // Correct on an already-mastered note — streak for new note unaffected
    }

    // Check if we should unlock the next note
    // First note only needs 2 correct (only one button visible); all others need 3
    const threshold    = trainerUnlocked === 0 ? 2 : 3;
    const lastNote     = trainerUnlocked >= trainerNotes.length - 1;
    const shouldUnlock = !lastNote && trainerNewStreak >= threshold;

    if (shouldUnlock) {
      trainerUnlocked++;
      trainerNewStreak = 0;
      trainerForceNew  = true;  // next question must be the newly unlocked note
      setTimeout(function() { renderTrainer(true); }, 900);
    } else if (lastNote && trainerNewStreak >= threshold) {
      // All notes mastered!
      setTimeout(showCongratsOverlay, 900);
    } else {
      setTimeout(function() { renderTrainer(false); }, 900);
    }
  } else {
    btn.classList.add('wrong');
    // Reveal the correct button
    document.querySelectorAll('.answer-btn').forEach(b => {
      if (b.dataset && b.dataset.value === q.answer) b.classList.add('reveal-correct');
    });
    document.getElementById('feedback').textContent = '✗ The answer is ' + displayNote(q.answer) + '.';
    document.getElementById('feedback').className   = 'feedback wrong';
    // Reset streak if wrong on the new note
    if (q.answer === newNote) trainerNewStreak = 0;
    setTimeout(function() { renderTrainer(false); }, 1200);
  }
}

function showCongratsOverlay() {
  const elapsed = formatTime(Date.now() - quizStartTime);

  // Submit trainer completion to spreadsheet

      score:        trainerNotes.length + '/' + trainerNotes.length,

// ── NOTE FINGERBOARD SVG ─────────────────────────────────────────
// Same layout as fingering fingerboard but buttons show note names.
// Enharmonic pairs (btn.notes = ['F','F#']) render as two small stacked circles.
function buildNoteFingerboardSVG(fb) {
  const R    = 18;
  const HALF = R * 2 + 8 + R;
  const LABEL_X  = 20;
  const OPEN_X   = 70;
  const NUT_X    = OPEN_X + R + 16;
  const FRET1_X  = NUT_X + HALF;
  const maxSemis = fb.maxSemis || 6;
  const LINE_END = FRET1_X + maxSemis * HALF + R + 20;
  const SVG_W    = LINE_END + 20;
  const lastStr  = fb.strings[fb.strings.length - 1];
  const SVG_H    = lastStr.y + 35;

  function btnX(semi) {
    return semi === 0 ? OPEN_X : FRET1_X + (semi - 1) * HALF;
  }

  const ns = 'http://www.w3.org/2000/svg';
  function el(tag, attrs) {
    const e = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }
  function txtEl(content, x, y, attrs) {
    const e = el('text', Object.assign({x, y}, attrs));
    e.textContent = content;
    return e;
  }

  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const nutColor    = isDark ? '#B4B2A9' : '#444441';
  const labelColor  = isDark ? '#B4B2A9' : '#2C2C2A';
  const stringColor = isDark ? '#888780' : '#888780';
  const activeBg    = isDark ? '#CECBF6' : '#EEEDFE';
  const activeStroke= isDark ? '#3C3489' : '#7F77DD';
  const activeTxt   = isDark ? '#3C3489' : '#534AB7';

  const svg = el('svg', {
    viewBox: '0 0 ' + SVG_W + ' ' + SVG_H,
    xmlns: ns,
    style: 'width:100%;height:220px;display:block;',
    id: 'note-fingerboard-svg',
  });

  // Nut
  const nutTop = fb.strings[0].y - 16;
  const nutBot = lastStr.y + 16;
  svg.appendChild(el('rect', {x: NUT_X - 4, y: nutTop, width: 8, height: nutBot - nutTop, rx: 2, fill: nutColor}));

  fb.strings.forEach(function(str) {
    svg.appendChild(el('line', {x1: NUT_X, y1: str.y, x2: LINE_END, y2: str.y, stroke: stringColor, 'stroke-width': 1.5}));
    svg.appendChild(txtEl(str.name, LABEL_X, str.y + 6, {'text-anchor': 'middle', 'font-size': '15', 'font-weight': '500', fill: labelColor}));

    str.buttons.forEach(function(btn) {
      const cx = btnX(btn.semi);
      const note = btn.note;
      const isLong = note.length > 1;
      const g = el('g', {'class': 'nfb-btn', 'data-value': note, style: 'cursor:pointer'});
      g.appendChild(el('circle', {cx, cy: str.y, r: R, fill: activeBg, stroke: activeStroke, 'stroke-width': 1.5}));
      g.appendChild(txtEl(note, cx, str.y + (isLong ? 4 : 6), {
        'text-anchor': 'middle', 'font-size': isLong ? '11' : '18', 'font-weight': '700', fill: activeTxt,
        style: 'pointer-events:none',
      }));
      const sName = str.name;
      g.setAttribute('data-string', sName);
      g.addEventListener('click', function() { selectAnswer(note, g, sName); });
      svg.appendChild(g);
    });
  });

  return svg;
}

function renderNoteFingerboard(fb) {
  const grid = document.getElementById('answers-grid');
  if (!grid) return;
  grid.innerHTML = '';
  grid.className = 'answers-grid fingerboard-grid';
  grid.style.cssText = 'display:block;width:100%;margin-bottom:20px;';
  grid.appendChild(buildNoteFingerboardSVG(fb));
}

// Hook selectAnswer to handle SVG fb-btn elements
const _origSelectAnswer = selectAnswer;
function selectAnswer(chosen, btn, chosenString) {
  if (trainerMode) { selectTrainerAnswer(chosen, btn); return; }
  if (answered) return;
  answered = true;

  const q = questions[currentQ];
  // If question has answerString, both finger AND string must match
  const correctFinger = chosen === q.answer;
  const correctString = !q.answerString || chosenString === q.answerString;
  const correct = correctFinger && correctString;
  if (correct) score++;
  results.push({ label: q.label, keyLabel: q.keyLabel || null, chosen, chosenString: chosenString || null, correct, correctAnswer: q.answer, correctString: q.answerString || null });

  // Handle SVG fb-btn, nfb-btn, and regular answer-btn
  const isFb  = btn && btn.classList.contains('fb-btn');
  const isNfb = btn && btn.classList.contains('nfb-btn');
  if (isFb || isNfb) {
    const btnClass = isFb ? '.fb-btn' : '.nfb-btn';
    document.querySelectorAll(btnClass).forEach(function(b) {
      b.style.pointerEvents = 'none';
      if (!correct && b.dataset.value === q.answer && (!isFb || b.dataset.string === q.answerString)) {
        b.querySelector('circle').setAttribute('fill', '#1D9E75');
        b.querySelector('circle').setAttribute('stroke', '#0F6E56');
        b.querySelectorAll('text').forEach(function(t) { t.setAttribute('fill', '#fff'); });
      }
    });
    const circ = btn.querySelector('circle');
    const txts = btn.querySelectorAll('text');
    if (correct) {
      circ.setAttribute('fill', '#1D9E75'); circ.setAttribute('stroke', '#0F6E56');
      txts.forEach(function(t) { t.setAttribute('fill', '#fff'); });
    } else {
      circ.setAttribute('fill', '#E24B4A'); circ.setAttribute('stroke', '#A32D2D');
      txts.forEach(function(t) { t.setAttribute('fill', '#fff'); });
    }
  } else {
    document.querySelectorAll('.answer-btn').forEach(function(b) {
      b.disabled = true;
      if (b.dataset && b.dataset.value === q.answer && !correct) b.classList.add('reveal-correct');
    });
    if (correct) { btn.classList.add('correct'); } else { btn.classList.add('wrong'); }
  }

  if (correct) {
    document.getElementById('feedback').textContent = '✓ Correct!';
    document.getElementById('feedback').className = 'feedback correct';
  } else {
    const stringHint = q.answerString ? ' on the ' + q.answerString + ' string' : '';
    document.getElementById('feedback').textContent = '✗ The correct answer is ' + q.answer + stringHint + '.';
    document.getElementById('feedback').className = 'feedback wrong';
  }

  setTimeout(nextQuestion, 1000);
}

function buildAnswerButtons(opts) {
  // Detect pairs: any letter appearing as both flat+natural or natural+sharp
  // renders as a half-size btn-pair. Works for any option count.
  const NOTE_ORDER = ['A♭','A','B♭','B','C','C#','D','E♭','E','F','F#','G'];

  // Group variants by letter
  const letterMap = {};
  opts.forEach(function(n) {
    var letter = n.replace(/[♭#]/g, '');
    if (!letterMap[letter]) letterMap[letter] = [];
    letterMap[letter].push(n);
  });

  // If no opts appear in NOTE_ORDER (e.g. fingering: '0','1','Low 2'), render as-is
  var isNoteQuiz = opts.some(function(n) { return NOTE_ORDER.includes(n); });
  if (!isNoteQuiz) {
    return opts.map(function(n) {
      return '<button class="answer-btn" data-value="' + n + '" onclick="selectAnswer(\'' + n + '\', this)">' + n + '</button>';
    }).join('');
  }

  // Build ordered slots, collapsing pairs into one slot
  var seen = {};
  var slots = [];
  NOTE_ORDER.forEach(function(n) {
    if (!opts.includes(n)) return;
    var letter = n.replace(/[♭#]/g, '');
    if (seen[letter]) return;
    seen[letter] = true;
    slots.push(letterMap[letter]);
  });

  return slots.map(function(variants) {
    if (variants.length === 1) {
      var n = variants[0];
      return '<button class="answer-btn" data-value="' + n + '" onclick="selectAnswer(\'' + n + '\', this)">' + displayNote(n) + '</button>';
    }
    // Sort: flat first, then natural, then sharp
    var sorted = variants.slice().sort(function(a, b) {
      if (a.includes('♭')) return -1;
      if (b.includes('♭')) return 1;
      if (b.includes('#')) return -1;
      return 1;
    });
    return '<div class="btn-pair">' + sorted.map(function(n) {
      return '<button class="answer-btn" data-value="' + n + '" onclick="selectAnswer(\'' + n + '\', this)">' + displayNote(n) + '</button>';
    }).join('') + '</div>';
  }).join('');
}

function renderQuestion() {
  const q        = questions[currentQ];

  const isFingerGrid = !fb && !nfb && opts.some(function(o) { return ['0','1','2','3','4','Low 1','Low 2','Shift 1','Shift 2','Shift 4'].includes(o); });
  const gridClass = (fb || nfb)
    ? 'answers-grid fingerboard-grid'
    : isFingerGrid
      ? 'answers-grid opts-finger'

  // First question: build full HTML
  if (currentQ === 0 || !document.getElementById('staff-clef')) {
    document.getElementById('app').innerHTML = `

          <img src="${q.noteFile}" id="staff-note" class="staff-img" alt="Note on staff" />
        </div>

        <div class="${gridClass}" id="answers-grid" style="${isFingerGrid ? '--finger-cols:' + opts.length : ''}">
          ${(fb || nfb) ? '' : buildAnswerButtons(opts)}
        </div>

        <div class="feedback" id="feedback"></div>
      </div>
    `;
    if (fb) renderFingerboard(fb);
    else if (nfb) renderNoteFingerboard(nfb);
    return;
  }

  // Subsequent questions: update only what changes, leaving clef img in place
  document.getElementById('progress-bar').style.width  = progress + '%';
  document.getElementById('question-label').textContent = 'Question ' + (currentQ + 1) + ' of ' + totalQ();
  document.getElementById('key-badge').textContent      = clefLabel;
  document.getElementById('feedback').textContent       = '';
  document.getElementById('feedback').className         = 'feedback';

  // Only update clef src if it actually changed (prevents flicker on same-key questions)
  const clefEl = document.getElementById('staff-clef');
  if (clefEl.src !== clefImg && !clefEl.src.endsWith('/' + clefImg)) {
    clefEl.src = clefImg;
  }
  document.getElementById('staff-note').src = q.noteFile;

  const grid = document.getElementById('answers-grid');
  grid.className = gridClass;
  if (fb) {
    renderFingerboard(fb);
  } else if (nfb) {
    renderNoteFingerboard(nfb);
  } else {
    if (isFingerGrid) grid.style.setProperty('--finger-cols', opts.length);
    grid.innerHTML = buildAnswerButtons(opts);
  }
}

// ── SCREEN: SCORE ────────────────────────────────────────────────
// Returns note label with accidental applied based on key signature
// e.g. noteWithKey('F4', 'G Major') → 'F#4'
//      noteWithKey('C5', 'D Major') → 'C#5'
//      noteWithKey('B3', 'G Major') → 'B3'
// keyLabel may be a full key name ('D Major') or null — if null, falls back
// to extracting the key from activeQuiz.clefLabel ('Treble Clef · D Major')
function noteWithKey(label, keyLabel) {
  // Resolve key name: use per-question keyLabel, or extract from quiz clefLabel
  let keyName = keyLabel;
  if (!keyName && activeQuiz && activeQuiz.clefLabel) {
    const parts = activeQuiz.clefLabel.split('·');
    keyName = parts[parts.length - 1].trim();
  }
  if (!keyName) return label;
  const keyEntry = Object.values(KEYS).find(k => k.label === keyName);
  if (!keyEntry) return label;
  const match = label.match(/^([A-G])(\d)$/);
  if (!match) return label;
  const noteLetter = match[1];
  const octave     = match[2];
  if (keyEntry.sharps.includes(noteLetter)) return noteLetter + '#' + octave;
  if (keyEntry.flats.includes(noteLetter))  return noteLetter + '♭' + octave;
  return label;
}

async function autoSubmitScore() {
  const studentNumber = sessionStorage.getItem('studentNumber');
  if (!studentNumber) return;

  const levelVal  = getCurrentLevel();
  const pct       = totalQ() > 0 ? Math.round(score / totalQ() * 100) : 0;
  const totalSec  = elapsed ? (function() {
    const m = elapsed.match(/(?:(\d+)m\s*)?(\d+)s/);
    return m ? parseInt(m[1] || 0) * 60 + parseInt(m[2]) : 0;
  })() : 0;
  const missedList = results
    .filter(r => !r.correct)
    .map(r => r.label + (r.keyLabel ? ' (' + r.keyLabel + ')' : ''))
    .join(',') || '';

  const el = document.getElementById('submit-status');
  if (el) el.textContent = 'Saving…';

  try {
    const res = await fetch(SCRIPT_URL, {
      method:   'POST',
      headers:  { 'Content-Type': 'text/plain' },
      body:     JSON.stringify({
        action:          'logAttempt',
        studentNumber,
        moduleId:        'pitch_tap',
        level:           levelVal,
        score:           score,
        percent:         pct,
        durationSeconds: totalSec,
        missedItems:     missedList
      }),
      redirect: 'follow'
    });
    const data = await res.json();
    if (el) el.textContent = data.success ? '✓ Score saved' : '✗ Save failed';
  } catch(e) {
    if (el) el.textContent = '✗ Save failed';
  }
}

// ── HASH ROUTING ─────────────────────────────────────────────────
function setHash(hash) {
  window._settingHash = true;
  window.location.hash = hash ? '#pitch/' + hash : '#pitch/';
  setTimeout(function() { window._settingHash = false; }, 50);
}

function navigateToHash(hash) {
  hash = hash.replace(/^#\/?/, '');
  // Accept both #pitch/... and bare #ensemble/... (backward compat)
  if (hash.startsWith('pitch/')) hash = hash.slice(6);
  if (!hash || hash === 'pitch') { renderHome(); return; }
  var parts       = hash.split('/');
  var ensembleId  = parts[0];
  var grade       = parts[1];
  var instrumentId= parts[2];
  var quarter     = parts[3];
  var type        = parts[4];

  var ensemble = ENSEMBLES.find(function(e) { return e.id === ensembleId; });
  if (!ensemble) { renderHome(); return; }
  if (!grade) { renderGrade(ensembleId); return; }
  if (!GRADES.includes(grade)) { renderGrade(ensembleId); return; }
  if (!instrumentId) { renderInstrument(ensembleId, grade); return; }
  var instrument = INSTRUMENTS.find(function(i) { return i.id === instrumentId; });
  if (!instrument) { renderInstrument(ensembleId, grade); return; }
  if (!quarter || !type) { renderQuarters(ensembleId, grade, instrumentId); return; }

  var key      = quizKey(ensembleId, grade, quarter);
  var folderId = FOLDER_MAP[key];
  if (!folderId) { renderQuarters(ensembleId, grade, instrumentId); return; }
  var folder = getFolder(folderId);
  if (!folder) { renderQuarters(ensembleId, grade, instrumentId); return; }

  var quizId = (type === 'finger') ? instrumentId + '-fingering' : instrumentId;
  var quiz   = folder.quizzes.find(function(q) { return q.id === quizId; });
  if (!quiz) { renderQuarters(ensembleId, grade, instrumentId); return; }

  activeEnsemble   = ensemble;
  activeGrade      = grade;
  activeInstrument = instrument;
  launchQuiz(folderId, quizId);
}

window.addEventListener('hashchange', function() {
  if (window._settingHash) return;
  navigateToHash(window.location.hash);
});

// orchOnly: true means band students skip this entry.

  { level: 3.2, grade: '5th', quarter: 'q3', type: 'fingering', label: '5th Grade · Q3 · Fingering', orchOnly: true },
  { level: 4.1, grade: '5th', quarter: 'q4', type: 'notes',     label: '5th Grade · Q4 · Notes' },

  { level: 8.1, grade: '6th', quarter: 'q4', type: 'notes',     label: '6th Grade · Q4 · Notes' },

];

// Returns the INSTRUMENTS entry for the current student's instrument
function getStudentInstrument() {
  const name = sessionStorage.getItem('studentInstrument') || 'Violin';
  return INSTRUMENTS.find(i => i.title === name) || INSTRUMENTS[0];
}

// Returns folderId + quizId for a given LEVEL_SEQUENCE entry and instrument
function getLevelQuiz(entry, instr) {
  const folderId = FOLDER_MAP[instr.ensembleId + '|' + entry.grade + '|' + entry.quarter];
  if (!folderId) return null;
  const quizId = (entry.type === 'fingering') ? instr.quizIds[1] : instr.quizIds[0];
  if (!quizId) return null;
  const folder = getFolder(folderId);
  if (!folder) return null;
  const quiz = folder.quizzes.find(q => q.id === quizId);
  if (!quiz) return null;
  return { folderId, quizId };
}

// Returns the decimal level for the currently active quiz
function getCurrentLevel() {
  if (!activeFolder || !activeQuiz) return 0;
  const instr = getStudentInstrument();
  const type  = activeQuiz.id.includes('images/fingering') || activeQuiz.id.includes('fingering') ? 'fingering' : 'notes';
  const entry = LEVEL_SEQUENCE.find(e => {
    if (e.type !== type) return false;
    const fid = FOLDER_MAP[instr.ensembleId + '|' + e.grade + '|' + e.quarter];
    return fid === activeFolder.id;
  });
  return entry ? entry.level : 0;
}

// Launches quiz directly from a decimal level value
function launchLevel(levelVal) {
  const entry = LEVEL_SEQUENCE.find(e => Math.abs(e.level - levelVal) < 0.05);
  if (!entry) { renderLevelMenu(); return; }
  const instr = getStudentInstrument();
  const q     = getLevelQuiz(entry, instr);
  if (!q) { renderLevelMenu(); return; }
  activeInstrument = instr;
  activeEnsemble   = ENSEMBLES.find(e => e.id === instr.ensembleId);
  activeGrade      = entry.grade;
  startQuiz(q.folderId, q.quizId);
}

// ── LEVEL MENU SCREEN ─────────────────────────────────────────────────────────
function renderLevelMenu() {
  const instr    = getStudentInstrument();
  const isOrch   = instr.ensembleId === 'orchestra';
  const maxBase  = _maxLevel ? parseInt(_maxLevel) : null;
  const bestBase = Math.floor(_bestLevel);
  const bestSub  = Math.round((_bestLevel - bestBase) * 10);

  // Filter levels for this instrument type
  const levels = LEVEL_SEQUENCE.filter(e => isOrch || !e.orchOnly);

  let cards = levels.map(entry => {
    const locked   = maxBase && (
      Math.floor(entry.level) > maxBase ||
      (Math.floor(entry.level) === maxBase && Math.round((entry.level - Math.floor(entry.level)) * 10) > Math.round((_maxLevel - maxBase) * 10))
    );
    const available = getLevelQuiz(entry, instr) !== null;
    if (!available) return ''; // quiz not built yet

    const levelStr = entry.level.toFixed(1);
    const lockSvg  = locked ? `
      <span style="position:absolute;inset:0;background:rgba(59,110,248,0.08);border-radius:12px;display:flex;align-items:center;justify-content:center;z-index:2;">
        <svg width="22" height="28" viewBox="0 0 36 44" fill="none">
          <rect x="2" y="18" width="32" height="24" rx="4" fill="#3b6ef8" opacity="0.7"/>
          <path d="M10 18V13C10 8.03 13.13 4 18 4C22.87 4 26 8.03 26 13V18" stroke="#3b6ef8" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.7"/>
          <circle cx="18" cy="30" r="3.5" fill="white"/>
          <rect x="16.25" y="30" width="3.5" height="5" rx="1" fill="white"/>
        </svg>
      </span>` : '';

    const typeColor = entry.type === 'fingering' ? '#7c3aed' : '#3b6ef8';
    const typeLabel = entry.type === 'fingering' ? 'Fingering' : 'Notes';

    return `
      <div onclick="${locked ? '' : 'launchLevel(' + entry.level + ')'}"
        style="position:relative;display:flex;align-items:center;gap:14px;
               padding:14px 16px;background:#fff;border:1.5px solid #dde3f0;
               border-radius:12px;cursor:${locked ? 'default' : 'pointer'};
               transition:border-color 0.15s,box-shadow 0.15s;-webkit-tap-highlight-color:transparent;"
        onmouseenter="if(!${locked}) this.style.borderColor='#3b6ef8'"
        onmouseleave="this.style.borderColor='#dde3f0'">
        <div style="width:44px;height:44px;border-radius:10px;background:#e8effe;
                    display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <span style="font-family:'DM Serif Display',serif;font-weight:700;color:#3b6ef8;font-size:1rem;">${levelStr}</span>
        </div>
        <div style="flex:1;min-width:0;">
          <div style="font-weight:600;font-size:0.9rem;color:#1a1f36;">${entry.label.split(' · ').slice(0,2).join(' · ')}</div>
          <div style="font-size:0.76rem;margin-top:2px;">
            <span style="background:${typeColor}1a;color:${typeColor};padding:2px 8px;border-radius:99px;font-weight:600;">${typeLabel}</span>
          </div>
        </div>
        <span style="color:#6b7280;font-size:1.2rem;">${locked ? '' : '›'}</span>
        ${lockSvg}
      </div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div style="font-family:'DM Sans',sans-serif;padding:20px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
        <div>
          <div style="font-family:'DM Serif Display',serif;font-size:1.4rem;color:#1a1f36;letter-spacing:-0.02em;">Note ID</div>
          <div style="font-size:0.8rem;color:#6b7280;margin-top:2px;">${instr.title} · Choose a level</div>
        </div>
        <a href="dashboard.html" style="font-size:0.78rem;color:#3b6ef8;font-weight:600;text-decoration:none;">← Dashboard</a>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px;">${cards}</div>
    </div>`;
}
